                    requires_granted_consent: { type: boolean, const: true }
                    provider_call_enabled: { type: boolean, const: false }
                    preview_only: { type: boolean, const: true }
            field_mappings:
              type: array
              items:
                type: object
                additionalProperties: false
                properties:
                  acp_field: { type: string }
                  grantex_source: { type: string }
                  status: { type: string, enum: [mapped, blocked, unsupported] }
                  evidence: { type: string }
                  blockers:
                    type: array
                    items: { type: string }
            latest_payment_intent_summary:
              type: object
              additionalProperties: false
              properties:
                present: { type: boolean }
                status: { type: string, nullable: true }
                amount_minor_units: { type: integer, nullable: true }
                currency: { type: string, nullable: true }
                provider_environment: { type: string, enum: [sandbox], nullable: true }
                policy_decision_present: { type: boolean }
                checkout_url_exposed: { type: boolean, const: false }
                provider_payment_reference_exposed: { type: boolean, const: false }
                provider_metadata_exposed: { type: boolean, const: false }
                provider_raw_status_exposed: { type: boolean, const: false }
                passport_reference_exposed: { type: boolean, const: false }
        allowed_capabilities:
          type: array
          items:
            type: string
            enum: [acp_shape_preview_read, cart_shape_mapping_preview, checkout_shape_mapping_preview]
        blocked_capabilities:
          type: array
          items: { type: string }
        unsupported_fields:
          type: array
          items:
            type: object
            additionalProperties: false
            properties:
              acp_field: { type: string }
              blocker: { type: string }
              reason: { type: string }
        controls:
          type: object
          additionalProperties: false
          properties:
            sandbox_only: { type: boolean, const: true }
            acp_publication_enabled: { type: boolean, const: false }
            acp_certification_claim: { type: string, enum: [none] }
            public_checkout_enabled: { type: boolean, const: false }
            payment_intent_creation_enabled_by_preview: { type: boolean, const: false }
            checkout_link_creation_enabled_by_preview: { type: boolean, const: false }
            provider_call_enabled_by_preview: { type: boolean, const: false }
            live_payment_enabled_by_preview: { type: boolean, const: false }
            live_plural_enabled_by_preview: { type: boolean, const: false }
            provider_credentials_exposed: { type: boolean, const: false }
            production_allowlist_written: { type: boolean, const: false }
        blockers:
          type: array
          items: { type: string }
        remediation_items:
          type: array
          items: { type: string }
        source_reference:
          type: object
          additionalProperties: false
          properties:
            system: { type: string, enum: [grantex] }
            canonical_state: { type: string, enum: [cart_checkout_passport_policy_payment_foundations] }
            endpoint_template: { type: string }
            tenant_scoped: { type: boolean, const: true }
        evidence_summary:
          type: object
          additionalProperties: false
          properties:
            active_policy_count: { type: integer, minimum: 0 }
            granted_checkout_consent_count: { type: integer, minimum: 0 }
            active_checkout_passport_count: { type: integer, minimum: 0 }
            unrevoked_checkout_passport_count: { type: integer, minimum: 0 }
            sandbox_cart_count: { type: integer, minimum: 0 }
            sandbox_payment_intent_count: { type: integer, minimum: 0 }
            latest_cart_line_item_count: { type: integer, minimum: 0 }
            latest_payment_intent_present: { type: boolean }
            sandbox_only: { type: boolean, const: true }
            read_only: { type: boolean, const: true }
            payment_enabled: { type: boolean, const: false }
            provider_called: { type: boolean, const: false }

    Ap2EvidencePreview:
      type: object
      additionalProperties: false
      description: >-
        C6M AP2-style evidence preview generated from Grantex Commerce
        Passport, consent, policy decision, cart hash, amount cap, merchant
        state, agent identity, audit reference, and idempotency evidence. It is
        deterministic unsigned preview metadata only. It is not AP2
        certification, not AP2 publication, not payment-network submission, and
        not a signed production mandate. It does not enable public discovery,
        production Commerce V1, checkout/payment creation, live payments, live
        Plural, provider calls, provider credentials, production config, or
        allowlists.
      properties:
        status: { type: string, enum: [preview_only, blocked] }
        message: { type: string }
        preview_only: { type: boolean, const: true }
        profile_style: { type: string, enum: [ap2_style_evidence_preview] }
        profile_version: { type: string, enum: [c6m-preview-1] }
        ap2_certification_claim: { type: string, enum: [none] }
        ap2_publication_enabled: { type: boolean, const: false }
        ap2_signed_mandate_created: { type: boolean, const: false }
        signed_production_mandate_created: { type: boolean, const: false }
        signature_status: { type: string, enum: [unsigned_preview] }
        signing_key_used: { type: boolean, const: false }
        payment_network_submission_enabled: { type: boolean, const: false }
        public_discovery_enabled: { type: boolean, const: false }
        checkout_payment_enabled: { type: boolean, const: false }
        live_provider_enabled: { type: boolean, const: false }
        live_plural_enabled: { type: boolean, const: false }
        provider_credentials_exposed: { type: boolean, const: false }
        production_allowlist_written: { type: boolean, const: false }
        live_mode_status: { type: string, enum: [not_live] }
        production_approval_status: { type: string, enum: [not_approved] }
        certification_claims:
          type: array
          maxItems: 0
          items: { type: string }
        generated_at: { type: string, format: date-time }
        evidence_package:
          type: object
          additionalProperties: false
          properties:
            format: { type: string, enum: [ap2_style_unsigned_evidence_preview] }
            deterministic: { type: boolean, const: true }
            signed: { type: boolean, const: false }
            hash_algorithm: { type: string, enum: [sha256] }
            evidence_hash: { type: string, pattern: "^[a-f0-9]{64}$", nullable: true }
            signing_key_reference: { type: "null" }
            production_mandate_reference: { type: "null" }
            includes:
              type: array
              items:
                type: string
                enum:
                  - commerce_passport
                  - consent_record
                  - policy_decision
                  - cart_hash
                  - amount_cap
                  - merchant_state
                  - agent_identity
                  - audit_reference
                  - idempotency_replay
        merchant_state:
          type: object
          additionalProperties: false
          properties:
            display_name: { type: string, nullable: true }
            environment: { type: string, enum: [sandbox, live] }
            country_code: { type: string, pattern: "^[A-Z]{2}$", nullable: true }
            default_currency: { type: string, pattern: "^[A-Z]{3}$", nullable: true }
            readiness_state: { type: string }
            agentic_commerce_requested: { type: boolean }
            agentic_commerce_enabled: { type: boolean }
        commerce_passport_evidence:
          type: object
          additionalProperties: false
          properties:
            present: { type: boolean }
            passport_type: { type: string, nullable: true }
            environment: { type: string, nullable: true }
            scope_count: { type: integer, minimum: 0 }
            required_checkout_scopes_present: { type: boolean }
            max_amount_minor_units: { type: integer, nullable: true }
            currency: { type: string, nullable: true }
            policy_version_present: { type: boolean }
            not_before_present: { type: boolean }
            expires_at_present: { type: boolean }
            not_expired: { type: boolean, nullable: true }
            revoked: { type: boolean, nullable: true }
            agent_auth_method: { type: string, nullable: true }
            passport_jti_exposed: { type: boolean, const: false }
            raw_passport_jwt_exposed: { type: boolean, const: false }
        consent_evidence:
          type: object
          additionalProperties: false
          properties:
            present: { type: boolean }
            status: { type: string, nullable: true }
            passport_type: { type: string, nullable: true }
            requested_scope_count: { type: integer, minimum: 0 }
            approved_scope_count: { type: integer, minimum: 0 }
            approved_required_checkout_scopes_present: { type: boolean }
            max_amount_minor_units: { type: integer, nullable: true }
            currency: { type: string, nullable: true }
            consent_text_version: { type: string, nullable: true }
            presented_payload_hash_present: { type: boolean }
            approved_at_present: { type: boolean }
            agent_auth_method: { type: string, nullable: true }
            consent_record_id_exposed: { type: boolean, const: false }
            consent_request_id_exposed: { type: boolean, const: false }
            user_principal_exposed: { type: boolean, const: false }
        policy_evidence:
          type: object
          additionalProperties: false
          properties:
            present: { type: boolean }
            active_policy_present: { type: boolean }
            policy_version_present: { type: boolean }
            decision_reference_present: { type: boolean }
            decision_reference_hash: { type: string, nullable: true }
            amount_cap_minor_units: { type: integer, nullable: true }
            amount_cap_currency: { type: string, nullable: true }
            emergency_disabled: { type: boolean, nullable: true }
            raw_policy_rules_exposed: { type: boolean, const: false }
        cart_evidence:
          type: object
          additionalProperties: false
          properties:
            present: { type: boolean }
            status: { type: string, nullable: true }
            line_item_count: { type: integer, minimum: 0 }
            snapshot_hash: { type: string, nullable: true }
            total_amount_minor_units: { type: integer, nullable: true }
            currency: { type: string, nullable: true }
            idempotency_key_hash_present: { type: boolean }
            raw_line_items_exposed: { type: boolean, const: false }
            cart_id_exposed: { type: boolean, const: false }
        amount_evidence:
          type: object
          additionalProperties: false
          properties:
            payment_amount_minor_units: { type: integer, nullable: true }
            payment_currency: { type: string, nullable: true }
            amount_cap_minor_units: { type: integer, nullable: true }
            amount_cap_currency: { type: string, nullable: true }
            amount_cap_source: { type: string, enum: [passport, consent, policy, missing] }
            within_amount_cap: { type: boolean, nullable: true }
        agent_identity_evidence:
          type: object
          additionalProperties: false
          properties:
            present: { type: boolean }
            agent_reference_hash: { type: string, nullable: true }
            trust_status: { type: string, nullable: true }
            disabled: { type: boolean, nullable: true }
            auth_method: { type: string, nullable: true }
            agent_id_exposed: { type: boolean, const: false }
            agent_api_key_exposed: { type: boolean, const: false }
        audit_evidence:
          type: object
          additionalProperties: false
          properties:
            present: { type: boolean }
            audit_reference_hash: { type: string, nullable: true }
            event_type: { type: string, nullable: true }
            occurred_at: { type: string, format: date-time, nullable: true }
            policy_version_present: { type: boolean }
            decision_reference_present: { type: boolean }
            idempotency_key_hash_present: { type: boolean }
            audit_event_id_exposed: { type: boolean, const: false }
        replay_idempotency_evidence:
          type: object
          additionalProperties: false
          properties:
            idempotency_supported: { type: boolean, const: true }
            replay_record_source: { type: string, enum: [commerce_idempotency_records] }
            cart_idempotency_key_hash_present: { type: boolean }
            payment_intent_idempotency_key_hash_present: { type: boolean }
            audit_idempotency_key_hash_present: { type: boolean }
            raw_idempotency_key_exposed: { type: boolean, const: false }
        payment_intent_evidence:
          type: object
          additionalProperties: false
          properties:
            present: { type: boolean }
            status: { type: string, nullable: true }
            provider_environment: { type: string, enum: [sandbox], nullable: true }
            created_at_present: { type: boolean }
            provider_reference_exposed: { type: boolean, const: false }
            checkout_url_exposed: { type: boolean, const: false }
            provider_metadata_exposed: { type: boolean, const: false }
            provider_raw_status_exposed: { type: boolean, const: false }
        controls:
          type: object
          additionalProperties: false
          properties:
            sandbox_only: { type: boolean, const: true }
            deterministic_unsigned_preview: { type: boolean, const: true }
            signing_enabled_by_preview: { type: boolean, const: false }
            ap2_certification_claim: { type: string, enum: [none] }
            ap2_publication_enabled: { type: boolean, const: false }
            payment_network_submission_enabled: { type: boolean, const: false }
            checkout_payment_creation_enabled_by_preview: { type: boolean, const: false }
            live_payment_enabled_by_preview: { type: boolean, const: false }
            live_plural_enabled_by_preview: { type: boolean, const: false }
            provider_call_enabled_by_preview: { type: boolean, const: false }
            provider_credentials_exposed: { type: boolean, const: false }
            production_allowlist_written: { type: boolean, const: false }
        blockers:
          type: array
          items: { type: string }
        remediation_items:
          type: array
          items: { type: string }
        source_reference:
          type: object
          additionalProperties: false
          properties:
            system: { type: string, enum: [grantex] }
            canonical_state: { type: string, enum: [commerce_passport_consent_policy_cart_payment_audit_idempotency] }
            endpoint_template: { type: string }
            tenant_scoped: { type: boolean, const: true }
        evidence_summary:
          type: object
          additionalProperties: false
          properties:
            complete_required_evidence: { type: boolean }
            passport_present: { type: boolean }
            consent_granted: { type: boolean }
            active_policy_present: { type: boolean }
            policy_decision_present: { type: boolean }
            cart_hash_present: { type: boolean }
            amount_cap_present: { type: boolean }
            merchant_state_present: { type: boolean }
            agent_identity_present: { type: boolean }
            audit_reference_present: { type: boolean }
            idempotency_evidence_present: { type: boolean }
            sandbox_only: { type: boolean, const: true }
            unsigned_preview: { type: boolean, const: true }
            payment_enabled: { type: boolean, const: false }
            provider_called: { type: boolean, const: false }

    SandboxOnboarding:
      type: object
      properties:
        merchant_id: { type: string }
        tenant_id: { type: string }
        display_name: { type: string, nullable: true }
        category_preset: { type: string, nullable: true }
        country_code: { type: string, nullable: true }
        default_currency: { type: string, nullable: true }
        support_email: { type: string, nullable: true }
        support_url: { type: string, nullable: true }
        public_discovery_description_draft: { type: string, nullable: true }
        environment: { type: string, enum: [sandbox] }
        agentic_commerce_requested: { type: boolean }
        agentic_commerce_enabled:
          type: boolean
          description: Existing execution flag, surfaced so readiness can fail closed when true; sandbox onboarding cannot set it.
        sandbox_onboarding_state: { $ref: "#/components/schemas/SandboxOnboardingState" }
        sandbox_onboarding_blocker: { type: string, nullable: true }
        sandbox_onboarding_updated_at: { type: string, format: date-time, nullable: true }
        readiness:
          type: object
          properties:
            ready: { type: boolean }
            status: { $ref: "#/components/schemas/SandboxReadinessStatus" }
            score_percent: { type: integer, minimum: 0, maximum: 100 }
            live_mode_status: { type: string, enum: [not_live] }
            production_approval_status: { type: string, enum: [not_approved] }
            rollout_status: { type: string, enum: [rollout_not_requested] }
            category_readiness: { $ref: "#/components/schemas/CategoryReadiness" }
            catalog_readiness: { $ref: "#/components/schemas/CatalogReadiness" }
            checks:
              type: array
              items:
                type: object
                properties:
                  key: { type: string }
                  label: { type: string }
                  status: { type: string, enum: [pass, blocked] }
                  detail: { type: string }
        agent_facing_preview: { $ref: "#/components/schemas/SandboxAgentFacingPreview" }
        read_only_discovery_review: { $ref: "#/components/schemas/SandboxReadOnlyDiscoveryReview" }

    Agent:
      type: object
      properties:
        id: { type: string, examples: [cag_01HXYZ] }
        tenant_id: { type: string }
        display_name: { type: string }
        agent_type: { type: string }
        public_key_jwk: { type: object, additionalProperties: true, nullable: true }
        trust_status: { type: string, enum: [pending, trusted, suspended, disabled] }
        status: { type: string, enum: [active, disabled] }
        disabled_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateAgentRequest:
      type: object
      required: [display_name]
      properties:
        display_name: { type: string }
        agent_type: { type: string, default: sales }
        public_key_jwk: { type: object, additionalProperties: true }
        api_key_hash: { type: string, description: "Salted hash of grtx_agent_<secret>; never raw" }
      description: >-
        Note: trust_status is server-controlled. New agents are always
        created in 'pending'. The field accepts 'pending' (no-op) for
        forward compatibility but rejects any other value with 422. Trust
        changes are handled by the operator-only updateAgent endpoint.

    UpdateAgentRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        display_name: { type: string }
        status: { type: string, enum: [active, disabled] }
        trust_status: { type: string, enum: [pending, trusted, suspended, disabled] }
      description: >-
        Operator-only mutable CommerceAgent fields. API key hashes, public key
        material, tenant_id, merchant_id, audit fields, provider credentials,
        and created_at/updated_at are immutable here. Key rotation requires a
        separate explicit rotation contract.

    Variant:
      type: object
      properties:
        id: { type: string }
        sku: { type: string }
        parent_sku: { type: string, nullable: true }
        model: { type: string, nullable: true }
        variant_title: { type: string, nullable: true }
        attributes: { type: object, additionalProperties: true }
        price_amount: { type: integer }
        currency: { type: string }
        tax_inclusive: { type: boolean }
        gst_slab: { type: string, nullable: true }
        tax_rate: { type: number, nullable: true }
        hsn_code: { type: string, nullable: true }
        availability_status:
          type: string
          enum: [in_stock, out_of_stock, pre_order, back_order, unknown]
        warranty_summary: { type: string, nullable: true }
        return_policy_summary: { type: string, nullable: true }
        last_synced_at: { type: string, format: date-time }
        archived_at: { type: string, format: date-time, nullable: true }
        stale: { type: boolean }
        freshness: { type: string, enum: [fresh, stale] }

    Product:
      type: object
      properties:
        id: { type: string }
        tenant_id: { type: string }
        merchant_id: { type: string }
        product_id: { type: string }
        title: { type: string }
        brand: { type: string, nullable: true }
        description: { type: string, nullable: true }
        image_url: { type: string, nullable: true }
        category_preset: { type: string }
        source_system: { type: string }
        manually_maintained: { type: boolean }
        archived_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        variants:
          type: array
          items: { $ref: "#/components/schemas/Variant" }

    MerchantPublishingProfile:
      type: object
      required:
        - merchant_id
        - display_name
        - legal_name
        - category_preset
        - verification_status
        - environment
        - default_currency
        - country_code
        - capabilities
      properties:
        merchant_id: { type: string }
        display_name: { type: string }
        legal_name: { type: string }
        category_preset: { type: string }
        verification_status: { type: string }
        environment: { type: string, enum: [sandbox, live] }
        default_currency: { type: string }
        country_code: { type: string }
        capabilities:
          type: array
          items: { type: string }

    CommerceWellKnownProfile:
      type: object
      required:
        - version
        - merchant
        - environment
        - supported_tools
        - auth_requirements
        - required_scopes
        - mcp
        - native_rest
        - capabilities
        - discovery_posture
      properties:
        version: { type: string, example: grantex-commerce-v1 }
        merchant: { $ref: "#/components/schemas/MerchantPublishingProfile" }
        environment: { type: string, enum: [sandbox, live] }
        supported_tools:
          type: array
          items:
            type: string
            enum:
              - merchant.get_profile
              - catalog.search
              - catalog.get_item
              - inventory.check
              - cart.create
              - checkout.create
              - payment.create_intent
              - payment.get_status
        auth_requirements:
          type: object
          additionalProperties: true
          properties:
            public_browse: { type: boolean }
            public_browse_status: { type: string }
            commerce_agent_auth: { type: boolean }
            merchant_api_key_auth: { type: boolean }
            checkout_passport_required_for_payment: { type: boolean }
        required_scopes:
          type: object
          additionalProperties:
            type: array
            items: { type: string }
        mcp:
          type: object
          required: [transport, url]
          properties:
            transport: { type: string, enum: [streamable_http] }
            url: { type: string, format: uri }
        native_rest:
          type: object
          required: [base_url]
          properties:
            base_url: { type: string, format: uri }
        capabilities:
          type: array
          items: { type: string }
        discovery_posture:
          type: object
          required:
            - mode
            - read_only_discovery_only
            - commerce_v1_runtime_enabled
            - checkout_payment_creation_enabled_by_discovery_gate
            - live_payments_enabled
            - live_plural_enabled
            - provider_credentials_exposed
            - readiness_claim
            - certification_claim
          properties:
            mode:
              type: string
              enum: [public_read_only_discovery, commerce_v1_runtime_discovery]
            read_only_discovery_only: { type: boolean }
            commerce_v1_runtime_enabled: { type: boolean }
            checkout_payment_creation_enabled_by_discovery_gate: { type: boolean }
            live_payments_enabled: { type: boolean }
            live_plural_enabled: { type: boolean }
            provider_credentials_exposed: { type: boolean }
            readiness_claim: { type: string, enum: [none] }
            certification_claim: { type: string, enum: [none] }
            notes:
              type: array
              items: { type: string }

    CatalogSearchRequest:
      type: object
      required: [merchant_id]
      properties:
        merchant_id: { type: string }
        query: { type: string, nullable: true }
        filters:
          type: object
          additionalProperties: false
          properties:
            brand: { type: string }
            category_preset: { type: string, enum: [electronics_appliances] }
            availability_status:
              type: string
              enum: [in_stock, out_of_stock, pre_order, back_order, unknown]
            currency: { type: string }
        limit: { type: integer, minimum: 1, maximum: 100, default: 25 }
        cursor: { type: string, nullable: true }

    CatalogVariantSummary:
      type: object
      required:
        - variant_id
        - sku
        - price_amount
        - currency
        - availability_status
        - last_synced_at
        - stale
        - freshness
      properties:
        variant_id: { type: string }
        sku: { type: string }
        variant_title: { type: string, nullable: true }
        model: { type: string, nullable: true }
        price_amount: { type: integer }
        currency: { type: string }
        availability_status:
          type: string
          enum: [in_stock, out_of_stock, pre_order, back_order, unknown]
        last_synced_at: { type: string, format: date-time }
        stale: { type: boolean }
        freshness: { type: string, enum: [fresh, stale] }

    CatalogProductSummary:
      type: object
      required:
        - id
        - product_id
        - merchant_id
        - title
        - category_preset
        - variants_summary
        - updated_at
      properties:
        id: { type: string }
        product_id: { type: string }
        merchant_id: { type: string }
        title: { type: string }
        brand: { type: string, nullable: true }
        image_url: { type: string, nullable: true }
        category_preset: { type: string }
        variants_summary:
          type: array
          items: { $ref: "#/components/schemas/CatalogVariantSummary" }
        updated_at: { type: string, format: date-time }

    CatalogSearchResponse:
      type: object
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/CatalogProductSummary" }
        next_cursor: { type: string, nullable: true }

    CatalogProductListResponse:
      type: object
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/CatalogProductSummary" }
        next_cursor: { type: string, nullable: true }

    CreateProductRequest:
      type: object
      required: [merchant_id, product_id, title, category_preset, variants]
      properties:
        merchant_id: { type: string }
        product_id: { type: string }
        title: { type: string }
        brand: { type: string }
        description: { type: string }
        image_url: { type: string }
        category_preset: { type: string, enum: [electronics_appliances] }
        source_system: { type: string, default: manual }
        manually_maintained: { type: boolean, default: false }
        variants:
          type: array
          minItems: 1
          items:
            type: object
            required: [sku, price_amount]
            properties:
              sku: { type: string }
              price_amount: { type: integer, minimum: 0 }
              currency: { type: string, default: INR }
              tax_inclusive: { type: boolean, default: true }
              gst_slab: { type: string }
              hsn_code: { type: string }
              availability_status:
                type: string
                enum: [in_stock, out_of_stock, pre_order, back_order, unknown]
                default: unknown
              warranty_summary: { type: string }
              return_policy_summary: { type: string }

    ProductPatchVariant:
      type: object
      additionalProperties: false
      properties:
        variant_id: { type: string, description: Existing commerce_product_variants.id }
        id: { type: string, description: Alias for variant_id }
        sku: { type: string }
        parent_sku: { type: string, nullable: true }
        model: { type: string, nullable: true }
        variant_title: { type: string, nullable: true }
        attributes: { type: object, additionalProperties: true }
        price_amount: { type: integer, minimum: 0 }
        currency: { type: string, pattern: "^[A-Z]{3}$" }
        tax_inclusive: { type: boolean }
        gst_slab: { type: string, nullable: true }
        tax_rate: { type: number, nullable: true }
        hsn_code: { type: string, nullable: true }
        availability_status:
          type: string
          enum: [in_stock, out_of_stock, pre_order, back_order, unknown]
        warranty_summary: { type: string, nullable: true }
        return_policy_summary: { type: string, nullable: true }
        source_system: { type: string, nullable: true }
        last_synced_at: { type: string, format: date-time }
      description: Existing variant update. One of `variant_id` or `id` is required.

    UpdateProductRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        title: { type: string }
        brand: { type: string, nullable: true }
        description: { type: string, nullable: true }
        image_url: { type: string, nullable: true }
        category_preset: { type: string, enum: [electronics_appliances] }
        status: { type: string, enum: [active, archived] }
        source_system: { type: string, nullable: true }
        manually_maintained: { type: boolean }
        variants:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/ProductPatchVariant" }
      description: >-
        Mutable product and variant fields only. Product/variant primary IDs,
        tenant_id, merchant_id, provider/payment references, cart/payment
        snapshots, audit fields, and created_at are immutable. Price changes
        update catalog variant rows only; existing cart and payment intent
        line_items_snapshot values remain immutable.

    BulkProductInput:
      type: object
      required: [product_id, title, category_preset, variants]
      properties:
        merchant_id: { type: string, description: Optional row echo; must match request merchant_id if present. }
        product_id: { type: string }
        title: { type: string }
        brand: { type: string }
        description: { type: string }
        image_url: { type: string }
        category_preset: { type: string, enum: [electronics_appliances] }
        source_system: { type: string, default: api }
        manually_maintained: { type: boolean, default: false }
        variants:
          type: array
          minItems: 1
          items:
            type: object
            required: [sku, price_amount]
            properties:
              sku: { type: string }
              parent_sku: { type: string }
              model: { type: string }
              variant_title: { type: string }
              attributes: { type: object, additionalProperties: true }
              price_amount: { type: integer, minimum: 0 }
              currency: { type: string, default: INR }
              tax_inclusive: { type: boolean, default: true }
              gst_slab: { type: string }
              tax_rate: { type: number, nullable: true }
              hsn_code: { type: string }
              availability_status:
                type: string
                enum: [in_stock, out_of_stock, pre_order, back_order, unknown]
                default: unknown
              warranty_summary: { type: string }
              return_policy_summary: { type: string }
              source_system: { type: string, default: api }

    BulkProductIngestRequest:
      type: object
      required: [merchant_id, products]
      properties:
        merchant_id: { type: string }
        dry_run: { type: boolean, default: true }
        products:
          type: array
          minItems: 1
          maxItems: 100
          items: { $ref: "#/components/schemas/BulkProductInput" }

    BulkProductRowResult:
      type: object
      properties:
        index: { type: integer }
        product_id: { type: string, nullable: true }
        status: { type: string, enum: [valid, invalid, upserted] }
        variant_count: { type: integer, nullable: true }
        field_errors:
          type: object
          additionalProperties: { type: string }

    BulkProductIngestResponse:
      type: object
      properties:
        dry_run: { type: boolean }
        summary:
          type: object
          additionalProperties: true
        rows:
          type: array
          items: { $ref: "#/components/schemas/BulkProductRowResult" }
        audit_event_id: { type: string, nullable: true }

    MerchantWebhookProductInput:
      type: object
      additionalProperties: false
      required: [product_id, title, category_preset, variants]
      properties:
        product_id: { type: string }
        title: { type: string }
        brand: { type: string, nullable: true }
        description: { type: string, nullable: true }
        image_url: { type: string, nullable: true }
        category_preset: { type: string, enum: [electronics_appliances] }
        source_system: { type: string, default: webhook }
        manually_maintained: { type: boolean, default: false }
        variants:
          type: array
          minItems: 1
          items:
            type: object
            additionalProperties: false
            required: [sku, price_amount]
            properties:
              sku: { type: string }
              parent_sku: { type: string, nullable: true }
              model: { type: string, nullable: true }
              variant_title: { type: string, nullable: true }
              attributes: { type: object, additionalProperties: true }
              price_amount: { type: integer, minimum: 0 }
              currency: { type: string, pattern: "^[A-Z]{3}$", default: INR }
              tax_inclusive: { type: boolean, default: true }
              gst_slab: { type: string, nullable: true }
              tax_rate: { type: number, nullable: true }
              hsn_code: { type: string, nullable: true }
              availability_status:
                type: string
                enum: [in_stock, out_of_stock, pre_order, back_order, unknown]
                default: unknown
              warranty_summary: { type: string, nullable: true }
              return_policy_summary: { type: string, nullable: true }
              source_system: { type: string, default: webhook }
              last_synced_at: { type: string, format: date-time }

    CommercePolicyRules:
      type: object
      additionalProperties: false
      required:
        - amount_cap
        - scope_allowlist
        - emergency_disable
        - checkout_passport_max_ttl_seconds
        - browse_passport_max_ttl_seconds
        - stale_price_max_age_seconds
        - allow_unknown_inventory_checkout
      properties:
        amount_cap:
          type: object
          additionalProperties: false
          required: [max_amount_minor_units, currency]
          properties:
            max_amount_minor_units: { type: integer, minimum: 0 }
            currency: { type: string, pattern: "^[A-Z]{3}$" }
        scope_allowlist:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum:
              - commerce:catalog.read
              - commerce:inventory.read
              - commerce:checkout.create
              - commerce:payment.initiate
              - commerce:payment.status.read
        emergency_disable: { type: boolean }
        checkout_passport_max_ttl_seconds: { type: integer, minimum: 1, maximum: 600 }
        browse_passport_max_ttl_seconds: { type: integer, minimum: 1, maximum: 3600 }
        stale_price_max_age_seconds: { type: integer, minimum: 0 }
        allow_unknown_inventory_checkout: { type: boolean }

    CommercePolicy:
      type: object
      properties:
        id: { type: string }
        tenant_id: { type: string }
        merchant_id: { type: string }
        version: { type: string }
        rules: { $ref: "#/components/schemas/CommercePolicyRules" }
        status: { type: string, enum: [draft, active, archived] }
        created_by: { type: string }
        activated_by: { type: string, nullable: true }
        activated_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreatePolicyRequest:
      type: object
      required: [merchant_id, rules]
      properties:
        merchant_id: { type: string }
        rules: { $ref: "#/components/schemas/CommercePolicyRules" }

    EvaluatePolicyRequest:
      type: object
      required: [merchant_id, agent_id, passport_jwt, action_scope]
      properties:
        merchant_id: { type: string }
        agent_id: { type: string }
        passport_jwt: { type: string }
        action_scope:
          type: string
          enum:
            - commerce:catalog.read
            - commerce:inventory.read
            - commerce:checkout.create
            - commerce:payment.initiate
            - commerce:payment.status.read
        amount_minor_units: { type: integer, minimum: 0, nullable: true }
        currency: { type: string, nullable: true }
        environment: { type: string, enum: [sandbox, live], nullable: true }
        resource_type: { type: string, nullable: true }
        resource_id: { type: string, nullable: true }

    PolicyDecision:
      type: object
      properties:
        decision: { type: string, enum: [allow, deny, requires_user_consent] }
        reason: { type: string }
        policy_id: { type: string }
        policy_version: { type: string }
        decision_id: { type: string }
        passport_jti: { type: string, nullable: true }

    ProviderCredential:
      type: object
      description: >-
        Provider credential metadata. Raw credential payloads and encrypted
        secret blobs are never returned by API responses.
      properties:
        id: { type: string }
        tenant_id: { type: string }
        merchant_id: { type: string }
        provider_key: { type: string, enum: [mock, plural] }
        environment: { type: string, enum: [sandbox, live] }
        credential_ref: { type: string }
        secret_version: { type: integer, minimum: 1 }
        status: { type: string, enum: [pending, valid, invalid, disabled] }
        last_validated_at: { type: string, format: date-time, nullable: true }
        last_validation_error:
          type: object
          nullable: true
          additionalProperties: true
        capabilities:
          type: array
          items: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        rotated_at: { type: string, format: date-time, nullable: true }

    ProviderCredentialValidation:
      type: object
      properties:
        valid: { type: boolean }
        capabilities:
          type: array
          items: { type: string }
        checked_at: { type: string, format: date-time }
        merchant_account_ref: { type: string, nullable: true }
        error:
          type: object
          nullable: true
          additionalProperties: true

    CreateProviderCredentialRequest:
      type: object
      required: [merchant_id, provider_key, environment, credential_payload]
      properties:
        merchant_id: { type: string }
        provider_key: { type: string, enum: [mock, plural] }
        environment: { type: string, enum: [sandbox, live] }
        credential_payload:
          type: object
          description: >-
            Raw provider credential material supplied only on write. The server
            encrypts this payload and never returns or logs it.
          additionalProperties: true

    PatchProviderCredentialRequest:
      type: object
      properties:
        credential_payload:
          type: object
          description: Replacement raw credential material; encrypted at rest.
          additionalProperties: true
        status: { type: string, enum: [disabled] }

    CommerceCartLineItem:
      type: object
      required: [variant_id, quantity]
      properties:
        variant_id: { type: string }
        quantity: { type: integer, minimum: 1 }

    CommerceCart:
      type: object
      properties:
        id: { type: string }
        cart_id: { type: string }
        tenant_id: { type: string }
        merchant_id: { type: string }
        agent_id: { type: string }
        passport_jti: { type: string, nullable: true }
        line_items:
          type: array
          items: { $ref: "#/components/schemas/CommerceCartLineItem" }
        line_items_snapshot:
          type: array
          items: { type: object, additionalProperties: true }
        currency: { type: string, pattern: "^[A-Z]{3}$" }
        subtotal_amount: { type: integer, minimum: 0 }
        tax_amount: { type: integer, minimum: 0 }
        total_amount: { type: integer, minimum: 0 }
        status: { type: string, enum: [draft, payment_intent_created, cancelled, expired] }
        expires_at: { type: string, format: date-time }
        line_items_snapshot_hash: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateCartRequest:
      type: object
      required: [merchant_id, line_items, currency]
      properties:
        merchant_id: { type: string }
        agent_id:
          type: string
          description: Optional echo of the authenticated CommerceAgent id.
        line_items:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/CommerceCartLineItem" }
        currency: { type: string, pattern: "^[A-Z]{3}$" }

    CommercePaymentIntent:
      type: object
      properties:
        id: { type: string }
        payment_intent_id: { type: string }
        tenant_id: { type: string }
        merchant_id: { type: string }
        agent_id: { type: string }
        cart_id: { type: string }
        passport_jti: { type: string }
        amount: { type: integer, minimum: 0 }
        amount_minor_units: { type: integer, minimum: 0 }
        currency: { type: string, pattern: "^[A-Z]{3}$" }
        provider: { type: string, enum: [mock, plural] }
        provider_environment: { type: string, enum: [sandbox, live] }
        provider_payment_id: { type: string, nullable: true }
        provider_order_id: { type: string, nullable: true }
        checkout_url: { type: string, nullable: true }
        checkout_expires_at: { type: string, format: date-time, nullable: true }
        status:
          type: string
          enum: [created, authorized, checkout_created, payment_pending, paid, failed, cancelled, expired]
        line_items_snapshot:
          type: array
          items: { type: object, additionalProperties: true }
        provider_metadata: { type: object, additionalProperties: true }
        provider_raw_status: { type: string, nullable: true }
        policy_version: { type: string, nullable: true }
        decision_id: { type: string, nullable: true }
        expires_at: { type: string, format: date-time }
        reconciled_at: { type: string, format: date-time, nullable: true }
        last_reconciliation_attempt_at: { type: string, format: date-time, nullable: true }
        last_reconciliation_error:
          type: string
          nullable: true
          description: Safe provider error summary only; never raw credentials or secret material.
        last_reconciliation_retryable: { type: boolean, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreatePaymentIntentRequest:
      type: object
      required: [merchant_id, cart_id, passport_jwt, amount_minor_units, currency]
      properties:
        merchant_id: { type: string }
        agent_id:
          type: string
          description: Optional echo of the authenticated CommerceAgent id.
        cart_id: { type: string }
        passport_jwt: { type: string }
        amount_minor_units: { type: integer, minimum: 0 }
        currency: { type: string, pattern: "^[A-Z]{3}$" }
        provider_key: { type: string, enum: [mock, plural], default: mock }
        metadata:
          type: object
          additionalProperties: { type: string }

    CreateCheckoutLinkRequest:
      type: object
      required: [success_url, cancel_url]
      properties:
        success_url:
          type: string
          format: uri
          description: HTTPS return URL. Localhost HTTP is allowed only in test/development.
        cancel_url:
          type: string
          format: uri
          description: HTTPS cancellation URL. Localhost HTTP is allowed only in test/development.

    ProviderWebhookRequest:
      type: object
      description: >-
        Provider-specific signed webhook body. The mock provider contract
        requires X-Mock-Timestamp and X-Mock-Signature headers where the
        signature is sha256=<hex_hmac_sha256(timestamp.raw_body)>.
      additionalProperties: true
      properties:
        event_id: { type: string }
        event_type: { type: string, examples: [payment.updated] }
        merchant_ref: { type: string }
        provider_payment_id: { type: string }
        status: { type: string, examples: [paid, failed, expired] }

    ProviderWebhookResponse:
      type: object
      properties:
        data:
          type: object
          required: [status, event_id]
          properties:
            status: { type: string, enum: [processed, ignored, duplicate] }
            reason: { type: string, nullable: true }
            event_id: { type: string }
            payment_intent_id: { type: string, nullable: true }
            payment_status:
              type: string
              nullable: true
              enum: [created, authorized, checkout_created, payment_pending, paid, failed, cancelled, expired, null]
            processing_status: { type: string, nullable: true }
        received_audit_event_id: { type: string, nullable: true }
        audit_event_id: { type: string, nullable: true }

    CommerceWebhookSource:
      type: object
      description: >-
        Safe merchant webhook source metadata. Secret values, encrypted
        secret material, and secret hashes are never returned by list/read
        responses.
      properties:
        tenant_id: { type: string }
        merchant_id: { type: string }
        source_key:
          type: string
          pattern: "^[a-z0-9_-]{3,64}$"
        display_name: { type: string }
        status: { type: string, enum: [active, disabled] }
        secret_last_rotated_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateWebhookSourceRequest:
      type: object
      additionalProperties: false
      required: [merchant_id, source_key, display_name]
      properties:
        merchant_id: { type: string }
        source_key:
          type: string
          pattern: "^[a-z0-9_-]{3,64}$"
        display_name: { type: string }

    CreateWebhookSourceResponse:
      type: object
      description: >-
        Creation returns the one-time signing secret exactly once. Store it in
        the merchant system; later list, patch, and rotate metadata responses
        never expose previous secret material or hashes.
      properties:
        data:
          allOf:
            - $ref: "#/components/schemas/CommerceWebhookSource"
            - type: object
              properties:
                webhook_secret:
                  type: string
                  description: One-time HMAC signing secret returned only on creation or rotation.
        audit_event_id: { type: string }

    ListWebhookSourcesResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/CommerceWebhookSource" }

    CommerceConnectorType:
      type: string
      enum:
        - manual
        - csv
        - custom_api
        - shopify
        - woocommerce
        - magento
        - erp
        - billing
        - oms
        - wms
        - logistics
        - crm_support
        - payment_provider

    CommerceConnectorSourceDomain:
      type: string
      enum: [catalog, price, inventory, order, fulfillment, refund, settlement, support]

    CommerceConnectorControls:
      type: object
      properties:
        metadata_only_registry: { type: boolean, const: true }
        credentials_stored_by_registry: { type: boolean, const: false }
        outbound_sync_enabled_by_registry: { type: boolean, const: false }
        agenticorg_direct_execution_allowed: { type: boolean, const: false }
        provider_call_enabled_by_registry: { type: boolean, const: false }
        checkout_payment_enabled_by_registry: { type: boolean, const: false }
        live_payment_enabled_by_registry: { type: boolean, const: false }
        live_plural_enabled_by_registry: { type: boolean, const: false }
        public_discovery_enabled_by_registry: { type: boolean, const: false }
        production_config_written_by_registry: { type: boolean, const: false }

    CommerceConnector:
      type: object
      description: >-
        Safe C6N existing-system connector metadata. The registry does not
        store credentials, raw payloads, provider metadata, production config,
        or secrets, and does not enable outbound sync, direct AgenticOrg
        execution, checkout/payment creation, live payments, live Plural, or
        public discovery.
      properties:
        id: { type: string, examples: [cconn_01J] }
        tenant_id: { type: string }
        merchant_id: { type: string }
        connector_key:
          type: string
          pattern: "^[a-z0-9_-]{3,64}$"
        connector_type: { $ref: "#/components/schemas/CommerceConnectorType" }
        display_name: { type: string }
        status: { type: string, enum: [draft, active, disabled] }
        runtime_mode:
          type: string
          enum: [metadata_only, manual_catalog_api, csv_catalog_import, custom_api_declared]
        runtime_implemented: { type: boolean }
        source_domains:
          type: array
          items: { $ref: "#/components/schemas/CommerceConnectorSourceDomain" }
        source_priority: { type: integer, minimum: 0 }
        sync_status:
          type: string
          enum: [not_started, manual, scheduled, sync_succeeded, sync_failed, blocked]
        health_state:
          type: string
          enum: [unknown, healthy, stale, conflict, blocked, disabled]
        last_sync_at: { type: string, format: date-time, nullable: true }
        last_successful_sync_at: { type: string, format: date-time, nullable: true }
        stale_after_seconds: { type: integer, minimum: 0, maximum: 31536000 }
        stale: { type: boolean }
        conflict: { type: boolean }
        blockers:
          type: array
          items: { type: string }
        webhook_source_key:
          type: string
          nullable: true
          pattern: "^[a-z0-9_-]{3,64}$"
        controls: { $ref: "#/components/schemas/CommerceConnectorControls" }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CommerceConnectorSourcePrecedenceEntry:
      type: object
      properties:
        domain: { $ref: "#/components/schemas/CommerceConnectorSourceDomain" }
        primary_connector_key: { type: string, nullable: true }
        status: { type: string, enum: [declared, blocked] }
        connectors:
          type: array
          items:
            type: object
            properties:
              connector_key: { type: string }
              connector_type: { $ref: "#/components/schemas/CommerceConnectorType" }
              source_priority: { type: integer }
              sync_status: { type: string }
              health_state: { type: string }
              stale: { type: boolean }
              conflict: { type: boolean }
              blockers:
                type: array
                items: { type: string }
        blockers:
          type: array
          items: { type: string }

    CreateCommerceConnectorRequest:
      type: object
      additionalProperties: false
      required: [merchant_id, connector_key, connector_type, display_name]
      properties:
        merchant_id: { type: string }
        connector_key:
          type: string
          pattern: "^[a-z0-9_-]{3,64}$"
        connector_type: { $ref: "#/components/schemas/CommerceConnectorType" }
        display_name: { type: string }
        status: { type: string, enum: [draft, active, disabled], default: draft }
        source_domains:
          type: array
          items: { $ref: "#/components/schemas/CommerceConnectorSourceDomain" }
        source_priority: { type: integer, minimum: 0, default: 100 }
        sync_status:
          type: string
          enum: [not_started, manual, scheduled, sync_succeeded, sync_failed, blocked]
        health_state:
          type: string
          enum: [unknown, healthy, stale, conflict, blocked, disabled]
        last_sync_at: { type: string, format: date-time }
        last_successful_sync_at: { type: string, format: date-time }
        stale_after_seconds: { type: integer, minimum: 0, maximum: 31536000, default: 86400 }
        conflict_blockers:
          type: array
          items: { type: string }
        webhook_source_key:
          type: string
          pattern: "^[a-z0-9_-]{3,64}$"
      description: >-
        Creates metadata only. Credential fields, API keys, tokens, passwords,
        raw payloads, provider credentials, production config, and live
        execution flags are rejected.

    UpdateCommerceConnectorRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        display_name: { type: string }
        status: { type: string, enum: [draft, active, disabled] }
        source_domains:
          type: array
          items: { $ref: "#/components/schemas/CommerceConnectorSourceDomain" }
        source_priority: { type: integer, minimum: 0 }
        sync_status:
          type: string
          enum: [not_started, manual, scheduled, sync_succeeded, sync_failed, blocked]
        health_state:
          type: string
          enum: [unknown, healthy, stale, conflict, blocked, disabled]
        last_sync_at: { type: string, format: date-time, nullable: true }
        last_successful_sync_at: { type: string, format: date-time, nullable: true }
        stale_after_seconds: { type: integer, minimum: 0, maximum: 31536000 }
        conflict_blockers:
          type: array
          items: { type: string }
        webhook_source_key:
          type: string
          nullable: true
          pattern: "^[a-z0-9_-]{3,64}$"
      description: >-
        Mutable safe metadata only. merchant_id, connector_key,
        connector_type, credential fields, API keys, tokens, raw payloads,
        provider credentials, production config, and execution flags are
        rejected.

    CommerceConnectorResponse:
      type: object
      properties:
        data: { $ref: "#/components/schemas/CommerceConnector" }
        source_precedence:
          type: array
          items: { $ref: "#/components/schemas/CommerceConnectorSourcePrecedenceEntry" }
        audit_event_id: { type: string }

    ListCommerceConnectorsResponse:
      type: object
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/CommerceConnector" }
        source_precedence:
          type: array
            items: { $ref: "#/components/schemas/CommerceConnectorSourcePrecedenceEntry" }
        controls: { $ref: "#/components/schemas/CommerceConnectorControls" }

    CommerceConnectorDryRunRequest:
      type: object
      additionalProperties: false
      required: [connector_type, source_label, rows]
      description: >-
        C6R sandbox connector sync dry-run input. Only local manual or
        CSV-style catalog rows are accepted. Credentials, provider metadata,
        raw merchant-system payloads, private API URLs, production config,
        allowlists, public discovery, checkout/payment, live provider, live
        Plural, outbound sync, and direct AgenticOrg execution fields are
        rejected.
      properties:
        connector_type:
          type: string
          enum: [manual, csv]
        source_label:
          type: string
          pattern: "^[A-Za-z0-9][A-Za-z0-9 .:_-]{2,120}$"
        source_snapshot_at:
          type: string
          format: date-time
        stale_after_seconds:
          type: integer
          minimum: 0
          maximum: 31536000
        preview_limit:
          type: integer
          minimum: 1
          maximum: 10
        rows:
          type: array
          minItems: 1
          maxItems: 100
          items:
            type: object
            additionalProperties: true
            description: >-
              Local manual/CSV-style row. Supported safe fields include
              product_id, title, description, brand, category_preset, category,
              image_url, thumbnail, sku, variant_title, price_amount, price,
              currency, availability_status, availabilityStatus,
              warranty_summary, warrantyInformation, return_policy_summary,
              returnPolicy, source_updated_at, and conflict.

    CommerceConnectorDryRunPreviewVariant:
      type: object
      properties:
        sku: { type: string }
        variant_title: { type: string, nullable: true }
        price_amount: { type: integer }
        currency: { type: string }
        availability_status:
          type: string
          enum: [in_stock, out_of_stock, pre_order, back_order, unknown]
        warranty_summary: { type: string, nullable: true }
        return_policy_summary: { type: string, nullable: true }

    CommerceConnectorDryRunPreviewProduct:
      type: object
      properties:
        source_product_ref: { type: string }
        title: { type: string }
        brand: { type: string, nullable: true }
        description: { type: string, nullable: true }
        image_url: { type: string, nullable: true }
        category_preset: { type: string, enum: [electronics_appliances] }
        variants:
          type: array
          items: { $ref: "#/components/schemas/CommerceConnectorDryRunPreviewVariant" }

    CommerceConnectorDryRunBlocker:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
        row_index: { type: integer, nullable: true }
        field: { type: string, nullable: true }
        remediation: { type: string }

    CommerceConnectorDryRunWarning:
      type: object
      properties:
        code: { type: string }
        message: { type: string }
        row_index: { type: integer, nullable: true }
        field: { type: string, nullable: true }

    CommerceConnectorDryRunResult:
      type: object
      description: >-
        C6R redacted dry-run result. This is sandbox-only, dry-run-only,
        non-live, not approved, non-public, non-enabling, and not certification
        evidence.
      properties:
        dry_run_id: { type: string }
        tenant_id: { type: string }
        merchant_id: { type: string }
        connector_type: { type: string, enum: [manual, csv] }
        source_label: { type: string }
        status: { type: string, enum: [passed, blocked] }
        sandbox_only: { type: boolean, const: true }
        not_live: { type: boolean, const: true }
        not_approved: { type: boolean, const: true }
        public_discovery_enabled: { type: boolean, const: false }
        checkout_payment_enabled: { type: boolean, const: false }
        live_provider_enabled: { type: boolean, const: false }
        live_plural_enabled: { type: boolean, const: false }
        rows_received: { type: integer }
        products_detected: { type: integer }
        variants_detected: { type: integer }
        would_create_count: { type: integer }
        would_update_count: { type: integer }
        would_archive_count: { type: integer }
        blocked_count: { type: integer }
        warning_count: { type: integer }
        normalized_preview:
          type: array
          maxItems: 10
          items: { $ref: "#/components/schemas/CommerceConnectorDryRunPreviewProduct" }
        blockers:
          type: array
          items: { $ref: "#/components/schemas/CommerceConnectorDryRunBlocker" }
        warnings:
          type: array
          items: { $ref: "#/components/schemas/CommerceConnectorDryRunWarning" }
        requested_audit_event_id: { type: string }
        audit_event_id: { type: string }
        generated_at: { type: string, format: date-time }
        created_at: { type: string, format: date-time }

    CommerceConnectorDryRunResponse:
      type: object
      properties:
        data: { $ref: "#/components/schemas/CommerceConnectorDryRunResult" }
        audit_events:
          type: array
          items:
            type: object
            properties:
              event_type:
                type: string
                enum: [connector_dry_run_requested, connector_dry_run_completed, connector_dry_run_blocked]
              audit_event_id: { type: string }

    UpdateWebhookSourceRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        display_name: { type: string }
        status: { type: string, enum: [active, disabled] }
      description: >-
        Mutable fields only. tenant_id, merchant_id, source_key, secret,
        secret_hash, encrypted secret material, created_at, updated_at, and
        audit fields are immutable.

    RotateWebhookSourceSecretRequest:
      type: object
      additionalProperties: false
      required: [merchant_id]
      properties:
        merchant_id: { type: string }

    MerchantCatalogProductUpdatedWebhook:
      type: object
      additionalProperties: false
      required: [event_id, event_type, occurred_at, product]
      description: >-
        Complete-state merchant catalog event. The HMAC signature is computed
        over `${timestamp}.${canonical_json_body}` using the source signing
        secret. The server stores metadata and payload_hash only; it does not
        store raw payloads, raw signatures, or webhook secrets.
      properties:
        event_id: { type: string }
        event_type: { type: string, const: catalog.product.updated }
        occurred_at: { type: string, format: date-time }
        product: { $ref: "#/components/schemas/MerchantWebhookProductInput" }

    MerchantWebhookResponse:
      type: object
      properties:
        data:
          type: object
          required: [status, event_id]
          properties:
            status: { type: string, enum: [processed, duplicate] }
            event_id: { type: string }
            product_id: { type: string, nullable: true }
            product_internal_id: { type: string, nullable: true }
            variant_count: { type: integer, nullable: true }
            processing_status: { type: string, nullable: true }
        received_audit_event_id: { type: string, nullable: true }
        audit_event_id: { type: string, nullable: true }

    CommerceProviderWebhookEvent:
      type: object
      description: >-
        Metadata-only operator view of provider webhook processing. This schema
        intentionally excludes raw provider payloads, raw signatures, webhook
        secrets, and raw provider credentials.
      properties:
        id: { type: string }
        tenant_id: { type: string, nullable: true }
        provider_key: { type: string, enum: [mock, plural] }
        merchant_id: { type: string, nullable: true }
        payment_intent_id: { type: string, nullable: true }
        provider_payment_id: { type: string, nullable: true }
        provider_event_id: { type: string }
        provider_event_type: { type: string }
        signature_validation_status: { type: string, enum: [valid, invalid, blocked] }
        replay_status: { type: string, enum: [fresh, duplicate, stale] }
        processing_status: { type: string, enum: [received, processed, ignored, failed] }
        payload_hash: { type: string }
        error_code: { type: string, nullable: true }
        error_message: { type: string, nullable: true }
        attempt_count: { type: integer }
        received_at: { type: string, format: date-time }
        processed_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time }
        replay_count: { type: integer }
        last_replayed_at: { type: string, format: date-time, nullable: true }
        replay_available: { type: boolean }
        replay_blocker: { type: string, nullable: true }

    ReplayProviderWebhookRequest:
      type: object
      required: [reason]
      additionalProperties: false
      properties:
        reason:
          type: string
          minLength: 1
          description: Operator review reason. Must not contain raw provider payloads, signatures, or secrets.
        dry_run:
          type: boolean
          default: false

    ReplayProviderWebhookResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            status: { type: string, enum: [eligible, processed, duplicate] }
            dry_run: { type: boolean }
            event_id: { type: string }
            provider_key: { type: string, enum: [mock, plural] }
            provider_event_id: { type: string }
            provider_event_type: { type: string }
            payment_intent_id: { type: string }
            current_payment_status:
              type: string
              enum: [created, authorized, checkout_created, payment_pending, paid, failed, cancelled, expired]
            target_payment_status:
              type: string
              enum: [paid, failed, expired]
            payment_status:
              type: string
              enum: [paid, failed, expired, cancelled]
            replay_count: { type: integer }
        requested_audit_event_id: { type: string, nullable: true }
        audit_event_id: { type: string, nullable: true }
        payment_audit_event_id: { type: string, nullable: true }
      description: >-
        Safe operator replay result. Raw provider payloads, signatures,
        encrypted payload material, signing secrets, provider credentials, and
        idempotency keys are never returned.

    EnableMerchantAgenticCommerceRequest:
      type: object
      required: [reason, reviewed_policy_id, confirm_reenable]
      additionalProperties: false
      properties:
        reason: { type: string, minLength: 1 }
        reviewed_policy_id: { type: string }
        incident_reference: { type: string }
        confirm_reenable:
          type: boolean
          enum: [true]

    EnableMerchantAgenticCommerceResponse:
      type: object
      properties:
        data:
          type: object
          properties:
            merchant_id: { type: string }
            agentic_commerce_enabled: { type: boolean }
            disabled: { type: boolean }
            reviewed_policy_id: { type: string }
        audit_event_id: { type: string }

    CommerceOpsHealth:
      type: object
      required: [status, checked_at, tenant_id, environment, checks, blockers]
      properties:
        status:
          type: string
          enum: [healthy, degraded, down]
          description: Overall commerce operations status. Expected M14 status is degraded while Plural remains externally blocked and provider webhook replay is mock-only.
        checked_at: { type: string, format: date-time }
        tenant_id: { type: string }
        merchant_id: { type: string, nullable: true }
        environment: { type: string, enum: [sandbox, live] }
        checks:
          type: object
          required: [api, database, provider_adapters, reconciliation_worker, webhook_backlog]
          properties:
            api:
              type: object
              additionalProperties: true
            database:
              type: object
              additionalProperties: true
            provider_adapters:
              type: object
              properties:
                mock:
                  type: object
                  additionalProperties: true
                plural:
                  type: object
                  additionalProperties: true
            reconciliation_worker:
              type: object
              additionalProperties: true
            webhook_backlog:
              type: object
              properties:
                backlog_count: { type: integer, nullable: true }
                recent_failure_count: { type: integer, nullable: true }
                error_code: { type: string, nullable: true }
        blockers:
          type: array
          items: { type: string }
      description: >-
        Safe operator-only commerce readiness view. It exposes no raw
        credentials, raw passports, webhook secrets, signatures, raw provider
        payloads, or plaintext idempotency keys.

    PaymentReconciliation:
      type: object
      properties:
        status:
          type: string
          enum: [transitioned, no_change, ignored]
        reason: { type: string, nullable: true }
        payment_status:
          type: string
          nullable: true
          enum: [created, authorized, checkout_created, payment_pending, paid, failed, cancelled, expired, null]
        from_status:
          type: string
          nullable: true
          enum: [created, authorized, checkout_created, payment_pending, paid, failed, cancelled, expired, null]
        to_status:
          type: string
          nullable: true
          enum: [paid, failed, expired, null]
        provider_status: { type: string, nullable: true }

    AuditEvent:
      type: object
      properties:
        id: { type: string }
        tenant_id: { type: string }
        merchant_id: { type: string, nullable: true }
        agent_id: { type: string, nullable: true }
        user_principal_id: { type: string, nullable: true }
        event_type: { type: string }
        resource_type: { type: string, nullable: true }
        resource_id: { type: string, nullable: true }
        passport_jti: { type: string, nullable: true }
        policy_version: { type: string, nullable: true }
        decision_id: { type: string, nullable: true }
        idempotency_key_hash: { type: string, nullable: true }
        request_id: { type: string, nullable: true }
        occurred_at: { type: string, format: date-time }
        metadata: { type: object, additionalProperties: true }

security:
  - developerApiKey: []

paths:
  # =====================================================================
  # M1 — implemented
  # =====================================================================
  /v1/commerce/merchants:
    post:
      tags: [Merchants]
      summary: Create a merchant
      operationId: createMerchant
      x-implemented: true
      x-milestone: M1
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateMerchantRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Merchant" }
                  audit_event_id: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
        "503": { $ref: "#/components/responses/CommerceDisabled" }

  /v1/commerce/merchants/{merchant_id}:
    parameters:
      - { in: path, name: merchant_id, required: true, schema: { type: string } }
    get:
      tags: [Merchants]
      summary: Get a merchant
      operationId: getMerchant
      x-implemented: true
      x-milestone: M1
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Merchant" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/CommerceDisabled" }
    patch:
      tags: [Merchants]
      summary: Update merchant (mutable fields only)
      operationId: updateMerchant
      x-implemented: true
      x-milestone: M2
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateMerchantRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Merchant" }
                  audit_event_id: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: Operator or owning merchant caller required; CommerceAgent callers are denied }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
        "503": { $ref: "#/components/responses/CommerceDisabled" }

  /v1/commerce/merchants/{merchant_id}/sandbox-onboarding:
    parameters:
      - { in: path, name: merchant_id, required: true, schema: { type: string } }
    get:
      tags: [Merchants]
      summary: Get sandbox seller onboarding state
      operationId: getMerchantSandboxOnboarding
      x-implemented: true
      x-milestone: C5Z
      description: >-
        Returns public-safe sandbox onboarding fields, baseline readiness checks,
        C6A category readiness scoring, C6B catalog readiness preview from
        existing sandbox product/variant rows, a C6C tenant-scoped
        agent-facing preview payload, a C6D read-only discovery review request
        status, and fail-closed production statuses. The
        response never includes provider
        account references, credentials, secrets, production allowlist values,
        checkout/payment material, or live-provider paths.
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/SandboxOnboarding" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: Operator or owning merchant caller required; CommerceAgent callers are denied }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: Live merchant blocked from sandbox onboarding }
        "503": { $ref: "#/components/responses/CommerceDisabled" }
    put:
      tags: [Merchants]
      summary: Update sandbox seller onboarding profile
      operationId: updateMerchantSandboxOnboarding
      x-implemented: true
      x-milestone: C5Z
      description: >-
        Updates only non-secret, public-safe sandbox profile fields and the
        agentic commerce requested flag. It cannot set environment, production
        approval, public discovery, allowlist, provider credential, checkout,
        payment, live payment, or live Plural fields. The response includes the
        recomputed sandbox-only agent-facing preview payload and read-only
        discovery review eligibility.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SandboxOnboardingUpdateRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/SandboxOnboarding" }
                  audit_event_id: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: Operator or owning merchant caller required; CommerceAgent callers are denied }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: Live merchant blocked from sandbox onboarding }
        "422": { $ref: "#/components/responses/ValidationFailed" }
        "503": { $ref: "#/components/responses/CommerceDisabled" }

  /v1/commerce/merchants/{merchant_id}/sandbox-onboarding/transition:
    parameters:
      - { in: path, name: merchant_id, required: true, schema: { type: string } }
    post:
      tags: [Merchants]
      summary: Transition sandbox seller onboarding state
      operationId: transitionMerchantSandboxOnboarding
      x-implemented: true
      x-milestone: C5Z
      description: >-
        Moves a sandbox onboarding workspace through the review-oriented state
        machine. Transitions to sandbox_ready or submitted_for_review require
        baseline, category, and required catalog readiness checks to pass. No
        transition approves production, enables public discovery, enables
        checkout/payment creation, or enables live payments/live Plural. The
        response includes the recomputed sandbox-only agent-facing preview
        payload.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SandboxOnboardingTransitionRequest" }
      responses:
        "200":
          description: Transitioned
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/SandboxOnboarding" }
                  audit_event_id: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: Operator or owning merchant caller required; CommerceAgent callers are denied }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: Invalid transition or live merchant blocked }
        "422": { $ref: "#/components/responses/ValidationFailed" }
        "503": { $ref: "#/components/responses/CommerceDisabled" }

  /v1/commerce/merchants/{merchant_id}/sandbox-onboarding/read-only-discovery-review-request:
    parameters:
      - { in: path, name: merchant_id, required: true, schema: { type: string } }
    post:
      tags: [Merchants]
      summary: Request sandbox read-only discovery review
      operationId: requestMerchantReadOnlyDiscoveryReview
      x-implemented: true
      x-milestone: C6D
      description: >-
        Requests human review of the tenant-scoped sandbox read-only discovery
        preview only after C5Z, C6A, C6B, and C6C prerequisites pass. This
        request is not approval and does not enable public discovery, production
        Commerce V1, checkout/payment creation, live payments, live Plural,
        provider credentials, or production allowlists. Blocked attempts write
        public-safe audit evidence with blocker summaries only.
      requestBody:
        required: false
        content:
          application/json:
            schema: { $ref: "#/components/schemas/SandboxReadOnlyDiscoveryReviewRequest" }
      responses:
        "200":
          description: Read-only discovery review requested
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/SandboxOnboarding" }
                  audit_event_id: { type: string }
        "400": { $ref: "#/components/responses/ValidationFailed" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: Operator or owning merchant caller required; CommerceAgent callers are denied }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: Live merchant or sandbox prerequisite blockers prevent request }
        "503": { $ref: "#/components/responses/CommerceDisabled" }

  /v1/commerce/read-only-discovery-review-requests:
    get:
      tags: [Merchants]
      summary: List sandbox read-only discovery review requests
      operationId: listReadOnlyDiscoveryReviewRequests
      x-implemented: true
      x-milestone: C6E
      description: >-
        Operator-only list of tenant-scoped sandbox merchants with pending
        read-only discovery review requests. The response includes readiness
        evidence, request timestamps, latest operator decision evidence when
        present, and fixed non-enabling controls. CommerceAgent callers are
        denied and no production configuration, allowlists, discovery, checkout,
        payment, live provider, or live Plural setting is changed.
      parameters:
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 100, default: 25 }
      responses:
        "200":
          description: Review requests
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/SandboxReadOnlyDiscoveryOperatorReview" }
                  next_cursor: { type: string, nullable: true }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: Operator caller required; merchant and CommerceAgent callers are denied }
        "503": { $ref: "#/components/responses/CommerceDisabled" }

  /v1/commerce/merchants/{merchant_id}/sandbox-onboarding/read-only-discovery-review:
    parameters:
      - { in: path, name: merchant_id, required: true, schema: { type: string } }
    get:
      tags: [Merchants]
      summary: Inspect one sandbox read-only discovery review request
      operationId: getMerchantReadOnlyDiscoveryReview
      x-implemented: true
      x-milestone: C6E
      description: >-
