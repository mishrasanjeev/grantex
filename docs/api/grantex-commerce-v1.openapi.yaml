openapi: "3.1.0"
info:
  title: Grantex Commerce V1
  version: "0.1.0"
  description: >-
    Authorization-as-a-service for agent-initiated commerce actions.
    Source of truth: GRANTEX_COMMERCE_V1_BUILD_SPEC.md.
    Milestone 1 (Foundations) implements feature flags, tenant boundary,
    merchant/agent/product/variant models, the electronics_appliances
    category preset, and the append-only audit ledger. M2 implements
    commerce passports and consent; M3 implements the policy engine.
    M4A implements provider-credential foundations. M4B implements cart
    drafts and payment intent create/list/read. M4C implements checkout
    link creation. M4D implements provider webhook intake against the mock
    provider contract while Plural remains explicitly blocked until its
    signature scheme is confirmed. M4E implements manual reconciliation and
    the disabled-by-default pending reconciliation worker. M5A implements
    the merchant publishing profile and authenticated catalog search/read
    foundation. M5B implements the
    `/mcp` JSON-RPC HTTP tool endpoint. M5C adds a static sandbox
    playground client for the commerce MCP surface. M6A adds operator-only
    commerce operations health and baseline hardening runbooks. C5C adds a
    narrow read-only discovery gate for the well-known profile without
    enabling broader Commerce V1 runtime routes. C5Z adds a sandbox-only
    seller onboarding foundation that records public-safe profile drafts,
    readiness checks, and review state without production approval,
    checkout/payment creation, provider credential capture, public discovery
    enablement, live payments, or live Plural. C6A adds category readiness
    scoring, and C6B adds catalog readiness preview from existing sandbox
    catalog data without connectors, checkout, payments, or public discovery
    enablement. C6C adds a tenant-scoped, public-safe agent-facing preview
    payload for sandbox review only; it does not publish discovery, approve
    merchants, enable checkout/payment creation, or enable live provider paths.
    C6D adds a sandbox read-only discovery review request workflow, C6E adds
    operator review decisions, C6F adds an audit-backed rollout proposal and
    dry-run evidence package, and C6G adds a sandbox-only AgenticOrg buyer-agent
    discovery preview and handoff request workflow. C6N adds a metadata-only
    existing-system connector registry foundation. These C6 workflows remain proposal-only and
    non-enabling; they do not approve merchants, publish discovery, create
    checkout/payment paths, enable live providers, enable live Plural, write
    production config, or set allowlists.
servers:
  - url: https://grantex-auth-dd4mtrt2gq-uc.a.run.app
    description: Production (Cloud Run)
  - url: http://localhost:3001
    description: Local

tags:
  - name: Tenants
  - name: Merchants
  - name: Provider Credentials
  - name: Catalog
  - name: Commerce Agents
  - name: Policy
  - name: Cart
  - name: Passports
  - name: Payments
  - name: Audit
  - name: Operations
  - name: Webhooks
  - name: Connectors
  - name: Well-Known

components:
  securitySchemes:
    developerApiKey:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: >-
        Existing platform API key (`grtx_*`). M1 commerce routes auto-resolve
        the tenant from this caller. M2 will add merchant API keys
        (`grtx_sk_<env>_*`) and agent JWT/API-key callers.
    merchantApiKey:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: M2 — `grtx_sk_<env>_<secret>`. Not implemented in M1.
    agentJwt:
      type: http
      scheme: bearer
      bearerFormat: jwt
      description: M2 — agent JWT assertion verified vs CommerceAgent.public_key_jwk.

  responses:
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource not found in this tenant
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    ValidationFailed:
      description: Request body failed validation
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    CommerceDisabled:
      description: Commerce V1 runtime or read-only public discovery is not enabled or not allowlisted
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              examples: [validation_failed, merchant_not_found, commerce_disabled]
            message: { type: string }
            decision_id: { type: string, nullable: true }
            audit_event_id: { type: string, nullable: true }
            remediation: { type: string, nullable: true }
            retryable: { type: boolean, nullable: true }
            details:
              type: object
              additionalProperties: true

    Merchant:
      type: object
      properties:
        id: { type: string, examples: [mch_01HXYZ] }
        tenant_id: { type: string, examples: [cten_01HXYZ] }
        legal_name: { type: string }
        display_name: { type: string }
        category_preset: { type: string, enum: [electronics_appliances] }
        verification_status: { type: string, enum: [unverified, pending, verified, rejected] }
        environment: { type: string, enum: [sandbox, live] }
        agentic_commerce_enabled: { type: boolean }
        default_currency: { type: string }
        country_code: { type: string }
        support_email: { type: string, nullable: true }
        support_url: { type: string, nullable: true }
        public_discovery_description_draft: { type: string, nullable: true }
        agentic_commerce_requested: { type: boolean, default: false }
        sandbox_onboarding_state:
          type: string
          enum: [draft_created, profile_incomplete, sandbox_ready, submitted_for_review, blocked, not_approved, rollout_not_requested]
        sandbox_onboarding_blocker: { type: string, nullable: true }
        sandbox_onboarding_updated_at: { type: string, format: date-time, nullable: true }
        disabled_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateMerchantRequest:
      type: object
      required: [legal_name, display_name, category_preset]
      properties:
        legal_name: { type: string }
        display_name: { type: string }
        category_preset: { type: string, enum: [electronics_appliances] }
        default_currency: { type: string, default: INR }
        country_code: { type: string, default: IN }
        support_email: { type: string, nullable: true }
        support_url: { type: string, nullable: true }
        public_discovery_description_draft: { type: string, nullable: true }
        agentic_commerce_requested: { type: boolean, default: false }

    UpdateMerchantRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        legal_name: { type: string }
        display_name: { type: string }
        category_preset: { type: string, enum: [electronics_appliances] }
        default_currency: { type: string, pattern: "^[A-Z]{3}$" }
        country_code: { type: string, pattern: "^[A-Z]{2}$" }
        support_email: { type: string, nullable: true }
        agentic_commerce_enabled: { type: boolean }
      description: >-
        Mutable merchant fields only. Tenant, ownership, environment,
        provider account references, audit fields, created_at, and updated_at
        are immutable on this endpoint.

    SandboxOnboardingState:
      type: string
      enum:
        - draft_created
        - profile_incomplete
        - sandbox_ready
        - submitted_for_review
        - blocked
        - not_approved
        - rollout_not_requested

    SandboxOnboardingUpdateRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        display_name: { type: string }
        category_preset: { type: string, enum: [electronics_appliances] }
        default_currency: { type: string, pattern: "^[A-Z]{3}$" }
        country_code: { type: string, pattern: "^[A-Z]{2}$" }
        support_email:
          type: string
          nullable: true
          description: Test-safe or repo-safe support email only.
        support_url:
          type: string
          nullable: true
          description: Test-safe or repo-safe support URL only.
        public_discovery_description_draft:
          type: string
          nullable: true
          description: Public-safe draft with no checkout, payment, live-provider, production approval, readiness, certification, credential, or secret claims.
        agentic_commerce_requested: { type: boolean }

    SandboxOnboardingTransitionRequest:
      type: object
      required: [target_state]
      properties:
        target_state: { $ref: "#/components/schemas/SandboxOnboardingState" }
        reason:
          type: string
          nullable: true
          description: Public-safe reason summary required for blocked or not_approved transitions.

    SandboxReadinessStatus:
      type: string
      enum: [pass, fail, blocked]

    CategoryReadinessItem:
      type: object
      properties:
        key:
          type: string
          enum:
            - category_preset_recognized
            - public_display_name_present
            - country_currency_present
            - public_safe_description_present
            - support_contact_present
            - product_data_readiness
            - warranty_summary
            - return_policy_summary
            - tax_gst_metadata
            - inventory_freshness
            - private_artifacts_not_stored
            - no_production_allowlist_config_values
            - no_live_provider_path
            - no_checkout_payment_enablement
        label: { type: string }
        description: { type: string }
        severity: { type: string, enum: [required, recommended, blocked] }
        status: { type: string, enum: [pass, fail, blocked, not_applicable] }
        remediation: { type: string }

    CategoryReadiness:
      type: object
      description: >-
        C6A category-specific sandbox checklist. Passing this checklist means
        only that the sandbox profile can be reviewed; it is not merchant
        approval, production readiness, public discovery, checkout/payment
        readiness, live payment readiness, or live Plural readiness.
      properties:
        preset_key: { type: string, nullable: true }
        label: { type: string }
        status: { $ref: "#/components/schemas/SandboxReadinessStatus" }
        required_passed: { type: boolean }
        score_percent: { type: integer, minimum: 0, maximum: 100 }
        score:
          type: object
          properties:
            passed: { type: integer, minimum: 0 }
            total: { type: integer, minimum: 0 }
            percentage: { type: integer, minimum: 0, maximum: 100 }
            required_passed: { type: integer, minimum: 0 }
            required_total: { type: integer, minimum: 0 }
            blocked: { type: integer, minimum: 0 }
        items:
          type: array
          items: { $ref: "#/components/schemas/CategoryReadinessItem" }
        summary: { type: string }

    CatalogReadinessItem:
      type: object
      properties:
        key:
          type: string
          enum:
            - catalog_products_present
            - catalog_variants_present
            - products_public_safe_title
            - products_public_safe_description
            - products_category_mapping
            - variants_sku_present
            - variants_price_currency_present
            - products_image_media
            - variants_availability_freshness
            - variants_warranty_summary
            - variants_return_policy_summary
            - variants_tax_gst_metadata
            - no_unsafe_catalog_text
        label: { type: string }
        description: { type: string }
        severity: { type: string, enum: [required, recommended, blocked] }
        status: { type: string, enum: [pass, fail, blocked, not_applicable] }
        count: { type: integer, minimum: 0, nullable: true }
        total: { type: integer, minimum: 0, nullable: true }
        remediation: { type: string }

    CatalogReadiness:
      type: object
      description: >-
        C6B computed sandbox catalog readiness preview. It is derived from
        tenant-owned sandbox catalog product and variant rows. Passing this
        checklist only means required catalog fields are ready for sandbox
        read-only discovery review; it is not merchant approval, production
        readiness, public discovery enablement, checkout/payment readiness,
        live payment readiness, or live Plural readiness.
      properties:
        status: { $ref: "#/components/schemas/SandboxReadinessStatus" }
        required_passed: { type: boolean }
        score_percent: { type: integer, minimum: 0, maximum: 100 }
        recommended_completion_percent: { type: integer, minimum: 0, maximum: 100 }
        blocker_count: { type: integer, minimum: 0 }
        product_count: { type: integer, minimum: 0 }
        variant_count: { type: integer, minimum: 0 }
        score:
          type: object
          properties:
            passed: { type: integer, minimum: 0 }
            total: { type: integer, minimum: 0 }
            percentage: { type: integer, minimum: 0, maximum: 100 }
            required_passed: { type: boolean }
            required_passed_count: { type: integer, minimum: 0 }
            required_total: { type: integer, minimum: 0 }
            recommended_passed: { type: integer, minimum: 0 }
            recommended_total: { type: integer, minimum: 0 }
            recommended_completion_percentage: { type: integer, minimum: 0, maximum: 100 }
            blocker_count: { type: integer, minimum: 0 }
        items:
          type: array
          items: { $ref: "#/components/schemas/CatalogReadinessItem" }
        summary: { type: string }
        intake:
          type: object
          properties:
            manual_entry_supported: { type: boolean, const: true }
            csv_dry_run_supported: { type: boolean, const: true }
            bulk_api_dry_run_supported: { type: boolean, const: true }
            async_import_job_supported: { type: boolean, const: false }
            external_connector_supported: { type: boolean, const: false }

    SandboxAgentPreviewProductVariant:
      type: object
      additionalProperties: false
      properties:
        sku: { type: string }
        variant_title: { type: string, nullable: true }
        price_amount:
          oneOf:
            - { type: number, minimum: 0 }
            - { type: string, pattern: "^[0-9]+$" }
        currency: { type: string, pattern: "^[A-Z]{3}$" }
        availability_status:
          type: string
          enum: [in_stock, out_of_stock, pre_order, back_order, unknown]
        warranty_summary: { type: string, nullable: true }
        return_policy_summary: { type: string, nullable: true }

    SandboxAgentPreviewProduct:
      type: object
      additionalProperties: false
      properties:
        sample_reference: { type: string }
        title: { type: string }
        description: { type: string }
        image_url: { type: string, nullable: true }
        category_preset: { type: string, enum: [electronics_appliances] }
        variants:
          type: array
          maxItems: 2
          items: { $ref: "#/components/schemas/SandboxAgentPreviewProductVariant" }

    SandboxAgentFacingPreview:
      type: object
      additionalProperties: false
      description: >-
        C6C tenant-scoped sandbox preview of the public-safe fields an AI buyer
        agent could later see only after a separate reviewed discovery launch.
        It is read-only, sandbox-only, not an approval, and does not enable
        public discovery, checkout/payment creation, live payments, live
        Plural, provider credentials, order fulfillment, refunds, or production
        allowlisting.
      properties:
        preview_status: { type: string, enum: [ready, blocked] }
        preview_blockers:
          type: array
          items: { type: string }
        sandbox_only: { type: boolean, const: true }
        live_mode_status: { type: string, enum: [not_live] }
        production_approval_status: { type: string, enum: [not_approved] }
        rollout_status: { type: string, enum: [rollout_not_requested] }
        public_discovery_enabled: { type: boolean, const: false }
        checkout_payment_enabled: { type: boolean, const: false }
        live_provider_enabled: { type: boolean, const: false }
        live_plural_enabled: { type: boolean, const: false }
        merchant:
          type: object
          additionalProperties: false
          properties:
            merchant_reference: { type: string }
            display_name: { type: string, nullable: true }
            category_preset: { type: string, enum: [electronics_appliances], nullable: true }
            country_code: { type: string, pattern: "^[A-Z]{2}$", nullable: true }
            default_currency: { type: string, pattern: "^[A-Z]{3}$", nullable: true }
            public_discovery_description_draft: { type: string, nullable: true }
            support_email: { type: string, nullable: true }
            support_url: { type: string, nullable: true }
        readiness_summary:
          type: object
          additionalProperties: false
          properties:
            overall_status: { $ref: "#/components/schemas/SandboxReadinessStatus" }
            overall_score_percent: { type: integer, minimum: 0, maximum: 100 }
            category_status: { $ref: "#/components/schemas/SandboxReadinessStatus" }
            category_score_percent: { type: integer, minimum: 0, maximum: 100 }
            category_summary: { type: string }
            catalog_status: { $ref: "#/components/schemas/SandboxReadinessStatus" }
            catalog_score_percent: { type: integer, minimum: 0, maximum: 100 }
            catalog_summary: { type: string }
        sample_products:
          type: array
          maxItems: 3
          items: { $ref: "#/components/schemas/SandboxAgentPreviewProduct" }
        allowed_preview_capabilities:
          type: array
          items:
            type: string
            enum: [read_only_profile_preview, read_only_catalog_preview, readiness_review_preview]
        blocked_capabilities:
          type: array
          items:
            type: string
            enum:
              - public_discovery
              - checkout_payment_creation
              - live_payment
              - live_plural
              - provider_credentials
              - order_fulfillment
              - refunds_returns_execution
              - production_allowlist
        generated_at: { type: string, format: date-time }

    SandboxReadOnlyDiscoveryReview:
      type: object
      additionalProperties: false
      description: >-
        C6D computed sandbox-only request status for read-only discovery review.
        Requesting review is not approval, launch, public discovery,
        checkout/payment creation, live payment, live Plural, provider
        credential access, or production allowlisting.
      properties:
        status:
          type: string
          enum: [not_requested, blocked, eligible, requested, withdrawn, rejected]
        eligible: { type: boolean }
        sandbox_only: { type: boolean, const: true }
        request_is_approval: { type: boolean, const: false }
        live_mode_status: { type: string, enum: [not_live] }
        production_approval_status: { type: string, enum: [not_approved] }
        rollout_status: { type: string, enum: [rollout_not_requested] }
        public_discovery_enabled: { type: boolean, const: false }
        checkout_payment_enabled: { type: boolean, const: false }
        live_provider_enabled: { type: boolean, const: false }
        live_plural_enabled: { type: boolean, const: false }
        production_allowlist_written: { type: boolean, const: false }
        requested_at: { type: string, format: date-time, nullable: true }
        status_updated_at: { type: string, format: date-time, nullable: true }
        blockers:
          type: array
          items: { type: string }
        remediation:
          type: array
          items: { type: string }

    SandboxReadOnlyDiscoveryReviewRequest:
      type: object
      additionalProperties: false
      maxProperties: 0
      description: >-
        Empty request body. The endpoint accepts no merchant, production,
        allowlist, provider, payment, checkout, credential, or live-mode fields.

    SandboxReadOnlyDiscoveryOperatorDecision:
      type: string
      enum: [changes_requested, rejected, rollout_proposal_ready]
      description: >-
        C6E operator review outcome. None of these values is production
        approval, launch approval, public discovery enablement, checkout/payment
        enablement, live provider enablement, or live Plural enablement.

    SandboxReadOnlyDiscoveryOperatorReview:
      type: object
      additionalProperties: false
      description: >-
        Operator-facing, sandbox-only, read-only discovery review evidence and
        decision state. The payload is computed from tenant-scoped merchant,
        readiness, preview, and audit records. It never writes production
        configuration or allowlists and always reports non-enabling controls as
        false/not-live/not-approved.
      properties:
        merchant_id: { type: string }
        tenant_id: { type: string }
        merchant_reference: { type: string }
        display_name: { type: string, nullable: true }
        sandbox_onboarding_state: { $ref: "#/components/schemas/SandboxOnboardingState" }
        review_request_status:
          type: string
          enum:
            - not_requested
            - blocked
            - eligible
            - requested
            - withdrawn
            - rejected
            - changes_requested
            - rollout_proposal_ready
        operator_decision:
          nullable: true
          oneOf:
            - { $ref: "#/components/schemas/SandboxReadOnlyDiscoveryOperatorDecision" }
            - { type: "null" }
        decision_reason: { type: string, nullable: true }
        remediation_items:
          type: array
          items: { type: string }
        requested_at: { type: string, format: date-time, nullable: true }
        request_actor: { type: string, nullable: true }
        decision_recorded_at: { type: string, format: date-time, nullable: true }
        decision_actor: { type: string, nullable: true }
        updated_at: { type: string, format: date-time, nullable: true }
        readiness_summary:
          type: object
          properties:
            overall_status: { $ref: "#/components/schemas/SandboxReadinessStatus" }
            overall_score_percent: { type: integer, minimum: 0, maximum: 100 }
            category_status: { $ref: "#/components/schemas/SandboxReadinessStatus" }
            category_score_percent: { type: integer, minimum: 0, maximum: 100 }
            category_summary: { type: string }
            catalog_status: { $ref: "#/components/schemas/SandboxReadinessStatus" }
            catalog_score_percent: { type: integer, minimum: 0, maximum: 100 }
            catalog_summary: { type: string }
        agent_facing_preview_status: { type: string, enum: [ready, blocked] }
        blockers:
          type: array
          items: { type: string }
        sandbox_only: { type: boolean, const: true }
        request_is_approval: { type: boolean, const: false }
        operator_decision_is_approval: { type: boolean, const: false }
        rollout_proposal_ready_is_launch: { type: boolean, const: false }
        live_mode_status: { type: string, enum: [not_live] }
        production_approval_status: { type: string, enum: [not_approved] }
        rollout_status: { type: string, enum: [rollout_not_requested] }
        public_discovery_enabled: { type: boolean, const: false }
        checkout_payment_enabled: { type: boolean, const: false }
        live_provider_enabled: { type: boolean, const: false }
        live_plural_enabled: { type: boolean, const: false }
        production_allowlist_written: { type: boolean, const: false }
        audit_event_id: { type: string, nullable: true }

    SandboxReadOnlyDiscoveryOperatorDecisionRequest:
      type: object
      additionalProperties: false
      required: [decision, reason]
      properties:
        decision: { $ref: "#/components/schemas/SandboxReadOnlyDiscoveryOperatorDecision" }
        reason:
          type: string
          description: Public-safe operator note; secrets, private artifacts, provider/payment/live claims, production claims, and raw payloads are rejected.
        remediation_items:
          type: array
          maxItems: 10
          items:
            type: string
          description: Public-safe remediation items. Required by runtime for changes_requested decisions.

    SandboxReadOnlyDiscoveryRolloutProposalStatus:
      type: string
      enum: [not_created, draft_created, dry_run_passed, dry_run_blocked, withdrawn]
      description: >-
        C6F proposal-only state. None of these values is production approval,
        launch approval, certification, live readiness, public discovery
        enablement, checkout/payment enablement, provider enablement, or
        allowlist writing.

    SandboxReadOnlyDiscoveryRolloutProposalRequest:
      type: object
      additionalProperties: false
      properties:
        proposal_note:
          type: string
          description: Public-safe proposal note; secrets, private merchant details, provider credentials, raw payloads, tokens, JWTs, DB/Redis URLs, production config values, concrete allowlists, and live/payment/discovery claims are rejected.

    SandboxReadOnlyDiscoveryRolloutProposalWithdrawRequest:
      type: object
      additionalProperties: false
      properties:
        reason:
          type: string
          description: Public-safe withdrawal reason; private artifacts, secrets, raw payloads, credentials, production config values, and live/payment/discovery claims are rejected.

    SandboxReadOnlyDiscoveryRolloutProposal:
      type: object
      additionalProperties: false
      description: >-
        C6F tenant-scoped, operator-only rollout proposal and dry-run evidence
        package for sandbox merchants that have a C6E rollout_proposal_ready
        operator decision. The proposal is not approval, launch, certification,
        production readiness, public discovery enablement, checkout/payment
        enablement, live provider enablement, live Plural enablement, or
        allowlist/config writing.
      properties:
        merchant_id: { type: string }
        tenant_id: { type: string }
        merchant_reference: { type: string }
        display_name: { type: string, nullable: true }
        proposal_status: { $ref: "#/components/schemas/SandboxReadOnlyDiscoveryRolloutProposalStatus" }
        proposal_note: { type: string, nullable: true }
        dry_run_result: { type: string, enum: [not_run, passed, blocked] }
        created_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time, nullable: true }
        dry_run_checked_at: { type: string, format: date-time, nullable: true }
        withdrawn_at: { type: string, format: date-time, nullable: true }
        operator_review:
          type: object
          additionalProperties: false
          properties:
            operator_decision:
              nullable: true
              oneOf:
                - { $ref: "#/components/schemas/SandboxReadOnlyDiscoveryOperatorDecision" }
                - { type: "null" }
            decision_reason: { type: string, nullable: true }
            decision_recorded_at: { type: string, format: date-time, nullable: true }
            decision_actor: { type: string, nullable: true }
        evidence:
          type: object
          additionalProperties: false
          properties:
            merchant_sandbox_profile_summary:
              type: object
              additionalProperties: false
              properties:
                merchant_reference: { type: string }
                display_name: { type: string, nullable: true }
                category_preset: { type: string, enum: [electronics_appliances], nullable: true }
