      summary: Grantex Commerce MCP streamable HTTP endpoint
      operationId: commerceMcpJsonRpc
      x-implemented: true
      x-milestone: M5
      security: []
      description: >-
        Minimal streamable HTTP-compatible JSON-RPC endpoint for
        initialize, tools/list, and tools/call. Tool calls default to
