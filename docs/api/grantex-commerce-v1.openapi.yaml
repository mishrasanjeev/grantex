openapi: "3.1.0"
info:
  title: Grantex Commerce V1
  version: "0.1.0"
  description: >-
    Authorization-as-a-service for agent-initiated commerce actions.
    Source of truth: GRANTEX_COMMERCE_V1_BUILD_SPEC.md.
    Milestone 1 (Foundations) implements feature flags, tenant boundary,
    merchant/agent/product/variant models, the electronics_appliances
    category preset, and the append-only audit ledger. M2 implements
    commerce passports and consent; M3 implements the policy engine.
    M4A implements provider-credential foundations. M4B implements cart
    drafts and payment intent create/list/read. M4C implements checkout
    link creation. M4D implements provider webhook intake against the mock
    provider contract while Plural remains explicitly blocked until its
    signature scheme is confirmed. M4E implements manual reconciliation and
    the disabled-by-default pending reconciliation worker. M5A implements
    the merchant publishing profile and authenticated catalog search/read
    foundation. M5B implements the
    `/mcp` JSON-RPC HTTP tool endpoint. M5C adds a static sandbox
    playground client for the commerce MCP surface. M6A adds operator-only
    commerce operations health and baseline hardening runbooks.
servers:
  - url: https://grantex-auth-dd4mtrt2gq-uc.a.run.app
    description: Production (Cloud Run)
  - url: http://localhost:3001
    description: Local

tags:
  - name: Tenants
  - name: Merchants
  - name: Provider Credentials
  - name: Catalog
  - name: Commerce Agents
  - name: Policy
  - name: Cart
  - name: Passports
  - name: Payments
  - name: Audit
  - name: Operations
  - name: Webhooks
  - name: Well-Known

components:
  securitySchemes:
    developerApiKey:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: >-
        Existing platform API key (`grtx_*`). M1 commerce routes auto-resolve
        the tenant from this caller. M2 will add merchant API keys
        (`grtx_sk_<env>_*`) and agent JWT/API-key callers.
    merchantApiKey:
      type: http
      scheme: bearer
      bearerFormat: opaque
      description: M2 — `grtx_sk_<env>_<secret>`. Not implemented in M1.
    agentJwt:
      type: http
      scheme: bearer
      bearerFormat: jwt
      description: M2 — agent JWT assertion verified vs CommerceAgent.public_key_jwk.

  responses:
    Unauthorized:
      description: Missing or invalid authentication
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    NotFound:
      description: Resource not found in this tenant
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    ValidationFailed:
      description: Request body failed validation
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }
    CommerceDisabled:
      description: COMMERCE_V1_ENABLED is not set in this environment
      content:
        application/json:
          schema: { $ref: "#/components/schemas/Error" }

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
              examples: [validation_failed, merchant_not_found, commerce_disabled]
            message: { type: string }
            decision_id: { type: string, nullable: true }
            audit_event_id: { type: string, nullable: true }
            remediation: { type: string, nullable: true }
            retryable: { type: boolean, nullable: true }
            details:
              type: object
              additionalProperties: true

    Merchant:
      type: object
      properties:
        id: { type: string, examples: [mch_01HXYZ] }
        tenant_id: { type: string, examples: [cten_01HXYZ] }
        legal_name: { type: string }
        display_name: { type: string }
        category_preset: { type: string, enum: [electronics_appliances] }
        verification_status: { type: string, enum: [unverified, pending, verified, rejected] }
        environment: { type: string, enum: [sandbox, live] }
        agentic_commerce_enabled: { type: boolean }
        default_currency: { type: string }
        country_code: { type: string }
        support_email: { type: string, nullable: true }
        disabled_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateMerchantRequest:
      type: object
      required: [legal_name, display_name, category_preset]
      properties:
        legal_name: { type: string }
        display_name: { type: string }
        category_preset: { type: string, enum: [electronics_appliances] }
        default_currency: { type: string, default: INR }
        country_code: { type: string, default: IN }
        support_email: { type: string, nullable: true }

    UpdateMerchantRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        legal_name: { type: string }
        display_name: { type: string }
        category_preset: { type: string, enum: [electronics_appliances] }
        default_currency: { type: string, pattern: "^[A-Z]{3}$" }
        country_code: { type: string, pattern: "^[A-Z]{2}$" }
        support_email: { type: string, nullable: true }
        agentic_commerce_enabled: { type: boolean }
      description: >-
        Mutable merchant fields only. Tenant, ownership, environment,
        provider account references, audit fields, created_at, and updated_at
        are immutable on this endpoint.

    Agent:
      type: object
      properties:
        id: { type: string, examples: [cag_01HXYZ] }
        tenant_id: { type: string }
        display_name: { type: string }
        agent_type: { type: string }
        public_key_jwk: { type: object, additionalProperties: true, nullable: true }
        trust_status: { type: string, enum: [pending, trusted, suspended, disabled] }
        status: { type: string, enum: [active, disabled] }
        disabled_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateAgentRequest:
      type: object
      required: [display_name]
      properties:
        display_name: { type: string }
        agent_type: { type: string, default: sales }
        public_key_jwk: { type: object, additionalProperties: true }
        api_key_hash: { type: string, description: "Salted hash of grtx_agent_<secret>; never raw" }
      description: >-
        Note: trust_status is server-controlled. New agents are always
        created in 'pending'. The field accepts 'pending' (no-op) for
        forward compatibility but rejects any other value with 422. Trust
        changes are handled by the operator-only updateAgent endpoint.

    UpdateAgentRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        display_name: { type: string }
        status: { type: string, enum: [active, disabled] }
        trust_status: { type: string, enum: [pending, trusted, suspended, disabled] }
      description: >-
        Operator-only mutable CommerceAgent fields. API key hashes, public key
        material, tenant_id, merchant_id, audit fields, provider credentials,
        and created_at/updated_at are immutable here. Key rotation requires a
        separate explicit rotation contract.

    Variant:
      type: object
      properties:
        id: { type: string }
        sku: { type: string }
        parent_sku: { type: string, nullable: true }
        model: { type: string, nullable: true }
        variant_title: { type: string, nullable: true }
        attributes: { type: object, additionalProperties: true }
        price_amount: { type: integer }
        currency: { type: string }
        tax_inclusive: { type: boolean }
        gst_slab: { type: string, nullable: true }
        tax_rate: { type: number, nullable: true }
        hsn_code: { type: string, nullable: true }
        availability_status:
          type: string
          enum: [in_stock, out_of_stock, pre_order, back_order, unknown]
        warranty_summary: { type: string, nullable: true }
        return_policy_summary: { type: string, nullable: true }
        last_synced_at: { type: string, format: date-time }
        archived_at: { type: string, format: date-time, nullable: true }
        stale: { type: boolean }
        freshness: { type: string, enum: [fresh, stale] }

    Product:
      type: object
      properties:
        id: { type: string }
        tenant_id: { type: string }
        merchant_id: { type: string }
        product_id: { type: string }
        title: { type: string }
        brand: { type: string, nullable: true }
        description: { type: string, nullable: true }
        image_url: { type: string, nullable: true }
        category_preset: { type: string }
        source_system: { type: string }
        manually_maintained: { type: boolean }
        archived_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        variants:
          type: array
          items: { $ref: "#/components/schemas/Variant" }

    MerchantPublishingProfile:
      type: object
      required:
        - merchant_id
        - display_name
        - legal_name
        - category_preset
        - verification_status
        - environment
        - default_currency
        - country_code
        - capabilities
      properties:
        merchant_id: { type: string }
        display_name: { type: string }
        legal_name: { type: string }
        category_preset: { type: string }
        verification_status: { type: string }
        environment: { type: string, enum: [sandbox, live] }
        default_currency: { type: string }
        country_code: { type: string }
        capabilities:
          type: array
          items: { type: string }

    CommerceWellKnownProfile:
      type: object
      required:
        - version
        - merchant
        - environment
        - supported_tools
        - auth_requirements
        - required_scopes
        - mcp
        - native_rest
        - capabilities
      properties:
        version: { type: string, example: grantex-commerce-v1 }
        merchant: { $ref: "#/components/schemas/MerchantPublishingProfile" }
        environment: { type: string, enum: [sandbox, live] }
        supported_tools:
          type: array
          items:
            type: string
            enum:
              - merchant.get_profile
              - catalog.search
              - catalog.get_item
              - inventory.check
              - cart.create
              - checkout.create
              - payment.create_intent
              - payment.get_status
        auth_requirements:
          type: object
          additionalProperties: true
          properties:
            public_browse: { type: boolean }
            public_browse_status: { type: string }
            commerce_agent_auth: { type: boolean }
            merchant_api_key_auth: { type: boolean }
            checkout_passport_required_for_payment: { type: boolean }
        required_scopes:
          type: object
          additionalProperties:
            type: array
            items: { type: string }
        mcp:
          type: object
          required: [transport, url]
          properties:
            transport: { type: string, enum: [streamable_http] }
            url: { type: string, format: uri }
        native_rest:
          type: object
          required: [base_url]
          properties:
            base_url: { type: string, format: uri }
        capabilities:
          type: array
          items: { type: string }

    CatalogSearchRequest:
      type: object
      required: [merchant_id]
      properties:
        merchant_id: { type: string }
        query: { type: string, nullable: true }
        filters:
          type: object
          additionalProperties: false
          properties:
            brand: { type: string }
            category_preset: { type: string, enum: [electronics_appliances] }
            availability_status:
              type: string
              enum: [in_stock, out_of_stock, pre_order, back_order, unknown]
            currency: { type: string }
        limit: { type: integer, minimum: 1, maximum: 100, default: 25 }
        cursor: { type: string, nullable: true }

    CatalogVariantSummary:
      type: object
      required:
        - variant_id
        - sku
        - price_amount
        - currency
        - availability_status
        - last_synced_at
        - stale
        - freshness
      properties:
        variant_id: { type: string }
        sku: { type: string }
        variant_title: { type: string, nullable: true }
        model: { type: string, nullable: true }
        price_amount: { type: integer }
        currency: { type: string }
        availability_status:
          type: string
          enum: [in_stock, out_of_stock, pre_order, back_order, unknown]
        last_synced_at: { type: string, format: date-time }
        stale: { type: boolean }
        freshness: { type: string, enum: [fresh, stale] }

    CatalogProductSummary:
      type: object
      required:
        - id
        - product_id
        - merchant_id
        - title
        - category_preset
        - variants_summary
        - updated_at
      properties:
        id: { type: string }
        product_id: { type: string }
        merchant_id: { type: string }
        title: { type: string }
        brand: { type: string, nullable: true }
        image_url: { type: string, nullable: true }
        category_preset: { type: string }
        variants_summary:
          type: array
          items: { $ref: "#/components/schemas/CatalogVariantSummary" }
        updated_at: { type: string, format: date-time }

    CatalogSearchResponse:
      type: object
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/CatalogProductSummary" }
        next_cursor: { type: string, nullable: true }

    CatalogProductListResponse:
      type: object
      required: [items, next_cursor]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/CatalogProductSummary" }
        next_cursor: { type: string, nullable: true }

    CreateProductRequest:
      type: object
      required: [merchant_id, product_id, title, category_preset, variants]
      properties:
        merchant_id: { type: string }
        product_id: { type: string }
        title: { type: string }
        brand: { type: string }
        description: { type: string }
        image_url: { type: string }
        category_preset: { type: string, enum: [electronics_appliances] }
        source_system: { type: string, default: manual }
        manually_maintained: { type: boolean, default: false }
        variants:
          type: array
          minItems: 1
          items:
            type: object
            required: [sku, price_amount]
            properties:
              sku: { type: string }
              price_amount: { type: integer, minimum: 0 }
              currency: { type: string, default: INR }
              tax_inclusive: { type: boolean, default: true }
              gst_slab: { type: string }
              hsn_code: { type: string }
              availability_status:
                type: string
                enum: [in_stock, out_of_stock, pre_order, back_order, unknown]
                default: unknown
              warranty_summary: { type: string }
              return_policy_summary: { type: string }

    ProductPatchVariant:
      type: object
      additionalProperties: false
      properties:
        variant_id: { type: string, description: Existing commerce_product_variants.id }
        id: { type: string, description: Alias for variant_id }
        sku: { type: string }
        parent_sku: { type: string, nullable: true }
        model: { type: string, nullable: true }
        variant_title: { type: string, nullable: true }
        attributes: { type: object, additionalProperties: true }
        price_amount: { type: integer, minimum: 0 }
        currency: { type: string, pattern: "^[A-Z]{3}$" }
        tax_inclusive: { type: boolean }
        gst_slab: { type: string, nullable: true }
        tax_rate: { type: number, nullable: true }
        hsn_code: { type: string, nullable: true }
        availability_status:
          type: string
          enum: [in_stock, out_of_stock, pre_order, back_order, unknown]
        warranty_summary: { type: string, nullable: true }
        return_policy_summary: { type: string, nullable: true }
        source_system: { type: string, nullable: true }
        last_synced_at: { type: string, format: date-time }
      description: Existing variant update. One of `variant_id` or `id` is required.

    UpdateProductRequest:
      type: object
      additionalProperties: false
      minProperties: 1
      properties:
        title: { type: string }
        brand: { type: string, nullable: true }
        description: { type: string, nullable: true }
        image_url: { type: string, nullable: true }
        category_preset: { type: string, enum: [electronics_appliances] }
        status: { type: string, enum: [active, archived] }
        source_system: { type: string, nullable: true }
        manually_maintained: { type: boolean }
        variants:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/ProductPatchVariant" }
      description: >-
        Mutable product and variant fields only. Product/variant primary IDs,
        tenant_id, merchant_id, provider/payment references, cart/payment
        snapshots, audit fields, and created_at are immutable. Price changes
        update catalog variant rows only; existing cart and payment intent
        line_items_snapshot values remain immutable.

    BulkProductInput:
      type: object
      required: [product_id, title, category_preset, variants]
      properties:
        merchant_id: { type: string, description: Optional row echo; must match request merchant_id if present. }
        product_id: { type: string }
        title: { type: string }
        brand: { type: string }
        description: { type: string }
        image_url: { type: string }
        category_preset: { type: string, enum: [electronics_appliances] }
        source_system: { type: string, default: api }
        manually_maintained: { type: boolean, default: false }
        variants:
          type: array
          minItems: 1
          items:
            type: object
            required: [sku, price_amount]
            properties:
              sku: { type: string }
              parent_sku: { type: string }
              model: { type: string }
              variant_title: { type: string }
              attributes: { type: object, additionalProperties: true }
              price_amount: { type: integer, minimum: 0 }
              currency: { type: string, default: INR }
              tax_inclusive: { type: boolean, default: true }
              gst_slab: { type: string }
              tax_rate: { type: number, nullable: true }
              hsn_code: { type: string }
              availability_status:
                type: string
                enum: [in_stock, out_of_stock, pre_order, back_order, unknown]
                default: unknown
              warranty_summary: { type: string }
              return_policy_summary: { type: string }
              source_system: { type: string, default: api }

    BulkProductIngestRequest:
      type: object
      required: [merchant_id, products]
      properties:
        merchant_id: { type: string }
        dry_run: { type: boolean, default: true }
        products:
          type: array
          minItems: 1
          maxItems: 100
          items: { $ref: "#/components/schemas/BulkProductInput" }

    BulkProductRowResult:
      type: object
      properties:
        index: { type: integer }
        product_id: { type: string, nullable: true }
        status: { type: string, enum: [valid, invalid, upserted] }
        variant_count: { type: integer, nullable: true }
        field_errors:
          type: object
          additionalProperties: { type: string }

    BulkProductIngestResponse:
      type: object
      properties:
        dry_run: { type: boolean }
        summary:
          type: object
          additionalProperties: true
        rows:
          type: array
          items: { $ref: "#/components/schemas/BulkProductRowResult" }
        audit_event_id: { type: string, nullable: true }

    CommercePolicyRules:
      type: object
      additionalProperties: false
      required:
        - amount_cap
        - scope_allowlist
        - emergency_disable
        - checkout_passport_max_ttl_seconds
        - browse_passport_max_ttl_seconds
        - stale_price_max_age_seconds
        - allow_unknown_inventory_checkout
      properties:
        amount_cap:
          type: object
          additionalProperties: false
          required: [max_amount_minor_units, currency]
          properties:
            max_amount_minor_units: { type: integer, minimum: 0 }
            currency: { type: string, pattern: "^[A-Z]{3}$" }
        scope_allowlist:
          type: array
          minItems: 1
          uniqueItems: true
          items:
            type: string
            enum:
              - commerce:catalog.read
              - commerce:inventory.read
              - commerce:checkout.create
              - commerce:payment.initiate
              - commerce:payment.status.read
        emergency_disable: { type: boolean }
        checkout_passport_max_ttl_seconds: { type: integer, minimum: 1, maximum: 600 }
        browse_passport_max_ttl_seconds: { type: integer, minimum: 1, maximum: 3600 }
        stale_price_max_age_seconds: { type: integer, minimum: 0 }
        allow_unknown_inventory_checkout: { type: boolean }

    CommercePolicy:
      type: object
      properties:
        id: { type: string }
        tenant_id: { type: string }
        merchant_id: { type: string }
        version: { type: string }
        rules: { $ref: "#/components/schemas/CommercePolicyRules" }
        status: { type: string, enum: [draft, active, archived] }
        created_by: { type: string }
        activated_by: { type: string, nullable: true }
        activated_at: { type: string, format: date-time, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreatePolicyRequest:
      type: object
      required: [merchant_id, rules]
      properties:
        merchant_id: { type: string }
        rules: { $ref: "#/components/schemas/CommercePolicyRules" }

    EvaluatePolicyRequest:
      type: object
      required: [merchant_id, agent_id, passport_jwt, action_scope]
      properties:
        merchant_id: { type: string }
        agent_id: { type: string }
        passport_jwt: { type: string }
        action_scope:
          type: string
          enum:
            - commerce:catalog.read
            - commerce:inventory.read
            - commerce:checkout.create
            - commerce:payment.initiate
            - commerce:payment.status.read
        amount_minor_units: { type: integer, minimum: 0, nullable: true }
        currency: { type: string, nullable: true }
        environment: { type: string, enum: [sandbox, live], nullable: true }
        resource_type: { type: string, nullable: true }
        resource_id: { type: string, nullable: true }

    PolicyDecision:
      type: object
      properties:
        decision: { type: string, enum: [allow, deny, requires_user_consent] }
        reason: { type: string }
        policy_id: { type: string }
        policy_version: { type: string }
        decision_id: { type: string }
        passport_jti: { type: string, nullable: true }

    ProviderCredential:
      type: object
      description: >-
        Provider credential metadata. Raw credential payloads and encrypted
        secret blobs are never returned by API responses.
      properties:
        id: { type: string }
        tenant_id: { type: string }
        merchant_id: { type: string }
        provider_key: { type: string, enum: [mock, plural] }
        environment: { type: string, enum: [sandbox, live] }
        credential_ref: { type: string }
        secret_version: { type: integer, minimum: 1 }
        status: { type: string, enum: [pending, valid, invalid, disabled] }
        last_validated_at: { type: string, format: date-time, nullable: true }
        last_validation_error:
          type: object
          nullable: true
          additionalProperties: true
        capabilities:
          type: array
          items: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }
        rotated_at: { type: string, format: date-time, nullable: true }

    ProviderCredentialValidation:
      type: object
      properties:
        valid: { type: boolean }
        capabilities:
          type: array
          items: { type: string }
        checked_at: { type: string, format: date-time }
        merchant_account_ref: { type: string, nullable: true }
        error:
          type: object
          nullable: true
          additionalProperties: true

    CreateProviderCredentialRequest:
      type: object
      required: [merchant_id, provider_key, environment, credential_payload]
      properties:
        merchant_id: { type: string }
        provider_key: { type: string, enum: [mock, plural] }
        environment: { type: string, enum: [sandbox, live] }
        credential_payload:
          type: object
          description: >-
            Raw provider credential material supplied only on write. The server
            encrypts this payload and never returns or logs it.
          additionalProperties: true

    PatchProviderCredentialRequest:
      type: object
      properties:
        credential_payload:
          type: object
          description: Replacement raw credential material; encrypted at rest.
          additionalProperties: true
        status: { type: string, enum: [disabled] }

    CommerceCartLineItem:
      type: object
      required: [variant_id, quantity]
      properties:
        variant_id: { type: string }
        quantity: { type: integer, minimum: 1 }

    CommerceCart:
      type: object
      properties:
        id: { type: string }
        cart_id: { type: string }
        tenant_id: { type: string }
        merchant_id: { type: string }
        agent_id: { type: string }
        passport_jti: { type: string, nullable: true }
        line_items:
          type: array
          items: { $ref: "#/components/schemas/CommerceCartLineItem" }
        line_items_snapshot:
          type: array
          items: { type: object, additionalProperties: true }
        currency: { type: string, pattern: "^[A-Z]{3}$" }
        subtotal_amount: { type: integer, minimum: 0 }
        tax_amount: { type: integer, minimum: 0 }
        total_amount: { type: integer, minimum: 0 }
        status: { type: string, enum: [draft, payment_intent_created, cancelled, expired] }
        expires_at: { type: string, format: date-time }
        line_items_snapshot_hash: { type: string }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreateCartRequest:
      type: object
      required: [merchant_id, line_items, currency]
      properties:
        merchant_id: { type: string }
        agent_id:
          type: string
          description: Optional echo of the authenticated CommerceAgent id.
        line_items:
          type: array
          minItems: 1
          items: { $ref: "#/components/schemas/CommerceCartLineItem" }
        currency: { type: string, pattern: "^[A-Z]{3}$" }

    CommercePaymentIntent:
      type: object
      properties:
        id: { type: string }
        payment_intent_id: { type: string }
        tenant_id: { type: string }
        merchant_id: { type: string }
        agent_id: { type: string }
        cart_id: { type: string }
        passport_jti: { type: string }
        amount: { type: integer, minimum: 0 }
        amount_minor_units: { type: integer, minimum: 0 }
        currency: { type: string, pattern: "^[A-Z]{3}$" }
        provider: { type: string, enum: [mock, plural] }
        provider_environment: { type: string, enum: [sandbox, live] }
        provider_payment_id: { type: string, nullable: true }
        provider_order_id: { type: string, nullable: true }
        checkout_url: { type: string, nullable: true }
        checkout_expires_at: { type: string, format: date-time, nullable: true }
        status:
          type: string
          enum: [created, authorized, checkout_created, payment_pending, paid, failed, cancelled, expired]
        line_items_snapshot:
          type: array
          items: { type: object, additionalProperties: true }
        provider_metadata: { type: object, additionalProperties: true }
        provider_raw_status: { type: string, nullable: true }
        policy_version: { type: string, nullable: true }
        decision_id: { type: string, nullable: true }
        expires_at: { type: string, format: date-time }
        reconciled_at: { type: string, format: date-time, nullable: true }
        last_reconciliation_attempt_at: { type: string, format: date-time, nullable: true }
        last_reconciliation_error:
          type: string
          nullable: true
          description: Safe provider error summary only; never raw credentials or secret material.
        last_reconciliation_retryable: { type: boolean, nullable: true }
        created_at: { type: string, format: date-time }
        updated_at: { type: string, format: date-time }

    CreatePaymentIntentRequest:
      type: object
      required: [merchant_id, cart_id, passport_jwt, amount_minor_units, currency]
      properties:
        merchant_id: { type: string }
        agent_id:
          type: string
          description: Optional echo of the authenticated CommerceAgent id.
        cart_id: { type: string }
        passport_jwt: { type: string }
        amount_minor_units: { type: integer, minimum: 0 }
        currency: { type: string, pattern: "^[A-Z]{3}$" }
        provider_key: { type: string, enum: [mock, plural], default: mock }
        metadata:
          type: object
          additionalProperties: { type: string }

    CreateCheckoutLinkRequest:
      type: object
      required: [success_url, cancel_url]
      properties:
        success_url:
          type: string
          format: uri
          description: HTTPS return URL. Localhost HTTP is allowed only in test/development.
        cancel_url:
          type: string
          format: uri
          description: HTTPS cancellation URL. Localhost HTTP is allowed only in test/development.

    ProviderWebhookRequest:
      type: object
      description: >-
        Provider-specific signed webhook body. The mock provider contract
        requires X-Mock-Timestamp and X-Mock-Signature headers where the
        signature is sha256=<hex_hmac_sha256(timestamp.raw_body)>.
      additionalProperties: true
      properties:
        event_id: { type: string }
        event_type: { type: string, examples: [payment.updated] }
        merchant_ref: { type: string }
        provider_payment_id: { type: string }
        status: { type: string, examples: [paid, failed, expired] }

    ProviderWebhookResponse:
      type: object
      properties:
        data:
          type: object
          required: [status, event_id]
          properties:
            status: { type: string, enum: [processed, ignored, duplicate] }
            reason: { type: string, nullable: true }
            event_id: { type: string }
            payment_intent_id: { type: string, nullable: true }
            payment_status:
              type: string
              nullable: true
              enum: [created, authorized, checkout_created, payment_pending, paid, failed, cancelled, expired, null]
            processing_status: { type: string, nullable: true }
        received_audit_event_id: { type: string, nullable: true }
        audit_event_id: { type: string, nullable: true }

    CommerceProviderWebhookEvent:
      type: object
      description: >-
        Metadata-only operator view of provider webhook processing. This schema
        intentionally excludes raw provider payloads, raw signatures, webhook
        secrets, and raw provider credentials.
      properties:
        id: { type: string }
        tenant_id: { type: string, nullable: true }
        provider_key: { type: string, enum: [mock, plural] }
        merchant_id: { type: string, nullable: true }
        payment_intent_id: { type: string, nullable: true }
        provider_payment_id: { type: string, nullable: true }
        provider_event_id: { type: string }
        provider_event_type: { type: string }
        signature_validation_status: { type: string, enum: [valid, invalid, blocked] }
        replay_status: { type: string, enum: [fresh, duplicate, stale] }
        processing_status: { type: string, enum: [received, processed, ignored, failed] }
        payload_hash: { type: string }
        error_code: { type: string, nullable: true }
        error_message: { type: string, nullable: true }
        attempt_count: { type: integer }
        received_at: { type: string, format: date-time }
        processed_at: { type: string, format: date-time, nullable: true }
        updated_at: { type: string, format: date-time }
        replay_available: { type: boolean, const: false }
        replay_blocker: { type: string }

    CommerceOpsHealth:
      type: object
      required: [status, checked_at, tenant_id, environment, checks, blockers]
      properties:
        status:
          type: string
          enum: [healthy, degraded, down]
          description: Overall commerce operations status. Expected M6A status is degraded while Plural and replay APIs remain blocked.
        checked_at: { type: string, format: date-time }
        tenant_id: { type: string }
        merchant_id: { type: string, nullable: true }
        environment: { type: string, enum: [sandbox, live] }
        checks:
          type: object
          required: [api, database, provider_adapters, reconciliation_worker, webhook_backlog]
          properties:
            api:
              type: object
              additionalProperties: true
            database:
              type: object
              additionalProperties: true
            provider_adapters:
              type: object
              properties:
                mock:
                  type: object
                  additionalProperties: true
                plural:
                  type: object
                  additionalProperties: true
            reconciliation_worker:
              type: object
              additionalProperties: true
            webhook_backlog:
              type: object
              properties:
                backlog_count: { type: integer, nullable: true }
                recent_failure_count: { type: integer, nullable: true }
                error_code: { type: string, nullable: true }
        blockers:
          type: array
          items: { type: string }
      description: >-
        Safe operator-only commerce readiness view. It exposes no raw
        credentials, raw passports, webhook secrets, signatures, raw provider
        payloads, or plaintext idempotency keys.

    PaymentReconciliation:
      type: object
      properties:
        status:
          type: string
          enum: [transitioned, no_change, ignored]
        reason: { type: string, nullable: true }
        payment_status:
          type: string
          nullable: true
          enum: [created, authorized, checkout_created, payment_pending, paid, failed, cancelled, expired, null]
        from_status:
          type: string
          nullable: true
          enum: [created, authorized, checkout_created, payment_pending, paid, failed, cancelled, expired, null]
        to_status:
          type: string
          nullable: true
          enum: [paid, failed, expired, null]
        provider_status: { type: string, nullable: true }

    AuditEvent:
      type: object
      properties:
        id: { type: string }
        tenant_id: { type: string }
        merchant_id: { type: string, nullable: true }
        agent_id: { type: string, nullable: true }
        user_principal_id: { type: string, nullable: true }
        event_type: { type: string }
        resource_type: { type: string, nullable: true }
        resource_id: { type: string, nullable: true }
        passport_jti: { type: string, nullable: true }
        policy_version: { type: string, nullable: true }
        decision_id: { type: string, nullable: true }
        idempotency_key_hash: { type: string, nullable: true }
        request_id: { type: string, nullable: true }
        occurred_at: { type: string, format: date-time }
        metadata: { type: object, additionalProperties: true }

security:
  - developerApiKey: []

paths:
  # =====================================================================
  # M1 — implemented
  # =====================================================================
  /v1/commerce/merchants:
    post:
      tags: [Merchants]
      summary: Create a merchant
      operationId: createMerchant
      x-implemented: true
      x-milestone: M1
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateMerchantRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Merchant" }
                  audit_event_id: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
        "503": { $ref: "#/components/responses/CommerceDisabled" }

  /v1/commerce/merchants/{merchant_id}:
    parameters:
      - { in: path, name: merchant_id, required: true, schema: { type: string } }
    get:
      tags: [Merchants]
      summary: Get a merchant
      operationId: getMerchant
      x-implemented: true
      x-milestone: M1
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Merchant" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/CommerceDisabled" }
    patch:
      tags: [Merchants]
      summary: Update merchant (mutable fields only)
      operationId: updateMerchant
      x-implemented: true
      x-milestone: M2
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateMerchantRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Merchant" }
                  audit_event_id: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: Operator or owning merchant caller required; CommerceAgent callers are denied }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
        "503": { $ref: "#/components/responses/CommerceDisabled" }

  /v1/commerce/merchants/{merchant_id}/disable-agentic-commerce:
    parameters:
      - { in: path, name: merchant_id, required: true, schema: { type: string } }
    post:
      tags: [Merchants]
      summary: Emergency disable agentic commerce for a merchant
      operationId: disableMerchantAgenticCommerce
      x-implemented: true
      x-milestone: M3
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                reason: { type: string }
      responses:
        "200": { description: Agentic commerce disabled immediately }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: Operator or merchant caller required }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/CommerceDisabled" }

  /v1/commerce/agents:
    post:
      tags: [Commerce Agents]
      summary: Register a CommerceAgent
      operationId: createAgent
      x-implemented: true
      x-milestone: M1
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateAgentRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Agent" }
                  audit_event_id: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
        "503": { $ref: "#/components/responses/CommerceDisabled" }
    get:
      tags: [Commerce Agents]
      summary: List CommerceAgents
      description: >-
        Lists tenant-bound CommerceAgents without API key hashes or private
        key/provider credential material. Operator callers list tenant agents.
        Merchant callers may request their own merchant scope; the current
        CommerceAgent schema is tenant-scoped, so merchant_id is verified for
        tenant ownership and does not expose a secret-bearing merchant-agent
        join. CommerceAgent callers list only their own agent record.
      operationId: listAgents
      x-implemented: true
      x-milestone: M2
      parameters:
        - { in: query, name: merchant_id, required: false, schema: { type: string } }
        - { in: query, name: status, required: false, schema: { type: string, enum: [active, disabled] } }
        - { in: query, name: trust_status, required: false, schema: { type: string, enum: [pending, trusted, suspended, disabled] } }
        - { in: query, name: limit, required: false, schema: { type: integer, minimum: 1, maximum: 100, default: 25 } }
        - { in: query, name: cursor, required: false, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/Agent" }
                  next_cursor: { type: string, nullable: true }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: Caller is outside the allowed tenant/merchant/agent scope }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
        "503": { $ref: "#/components/responses/CommerceDisabled" }

  /v1/commerce/agents/{agent_id}:
    parameters:
      - { in: path, name: agent_id, required: true, schema: { type: string } }
    get:
      tags: [Commerce Agents]
      summary: Get a CommerceAgent
      operationId: getAgent
      x-implemented: true
      x-milestone: M1
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Agent" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/CommerceDisabled" }
    patch:
      tags: [Commerce Agents]
      summary: Update agent
      operationId: updateAgent
      x-implemented: true
      x-milestone: M2
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateAgentRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Agent" }
                  audit_event_id: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: Operator caller required; CommerceAgents cannot self-elevate status or trust }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
        "503": { $ref: "#/components/responses/CommerceDisabled" }

  /v1/commerce/catalog/products:
    post:
      tags: [Catalog]
      summary: Create a product with variants
      operationId: createProduct
      x-implemented: true
      x-milestone: M1
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CreateProductRequest" }
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Product" }
                  audit_event_id: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
        "503": { $ref: "#/components/responses/CommerceDisabled" }
    get:
      tags: [Catalog]
      summary: List products
      operationId: listProducts
      x-implemented: true
      x-milestone: M2
      parameters:
        - { in: query, name: merchant_id, required: false, schema: { type: string }, description: Required for operator and CommerceAgent callers; inferred for merchant callers. }
        - { in: query, name: status, required: false, schema: { type: string, enum: [active, archived, all], default: active } }
        - { in: query, name: query, required: false, schema: { type: string } }
        - { in: query, name: category_preset, required: false, schema: { type: string, enum: [electronics_appliances] } }
        - { in: query, name: limit, required: false, schema: { type: integer, minimum: 1, maximum: 100, default: 25 } }
        - { in: query, name: cursor, required: false, schema: { type: string } }
      responses:
        "200":
          description: Product summaries with variant summaries
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogProductListResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: Caller is outside the allowed tenant/merchant scope }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
        "503": { $ref: "#/components/responses/CommerceDisabled" }

  /v1/commerce/catalog/products/bulk:
    post:
      tags: [Catalog]
      summary: Bulk dry-run or upsert products
      operationId: bulkIngestProducts
      x-implemented: true
      x-milestone: M2
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/BulkProductIngestRequest" }
      responses:
        "200":
          description: Dry-run validation or transactional upsert result
          content:
            application/json:
              schema: { $ref: "#/components/schemas/BulkProductIngestResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: Operator or owning merchant caller required }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: Bulk ingest conflict }
        "422": { $ref: "#/components/responses/ValidationFailed" }
        "503": { $ref: "#/components/responses/CommerceDisabled" }

  /v1/commerce/catalog/products/{product_id}:
    parameters:
      - { in: path, name: product_id, required: true, schema: { type: string } }
    get:
      tags: [Catalog]
      summary: Get a product (with variants)
      operationId: getProduct
      x-implemented: true
      x-milestone: M1
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Product" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/CommerceDisabled" }
    patch:
      tags: [Catalog]
      summary: Update product
      operationId: updateProduct
      x-implemented: true
      x-milestone: M2
      parameters:
        - { in: query, name: merchant_id, required: false, schema: { type: string }, description: Required for operator callers; inferred for merchant callers. }
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/UpdateProductRequest" }
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  data: { $ref: "#/components/schemas/Product" }
                  audit_event_id: { type: string }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: Operator or owning merchant caller required; CommerceAgent callers cannot patch catalog products }
        "404": { $ref: "#/components/responses/NotFound" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
        "503": { $ref: "#/components/responses/CommerceDisabled" }
    delete:
      tags: [Catalog]
      summary: Soft-delete (archive) a product
      operationId: archiveProduct
      x-implemented: true
      x-milestone: M1
      responses:
        "200": { description: Archived }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "503": { $ref: "#/components/responses/CommerceDisabled" }

  /v1/commerce/catalog/search:
    post:
      tags: [Catalog]
      summary: Catalog search (also exposed via MCP catalog.search)
      operationId: searchCommerceCatalog
      x-implemented: true
      x-milestone: M5
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/CatalogSearchRequest" }
      responses:
        "200":
          description: Product summaries with active variant summaries
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CatalogSearchResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Unauthorized" }
        "422": { $ref: "#/components/responses/ValidationFailed" }
        "503": { $ref: "#/components/responses/CommerceDisabled" }

  /v1/commerce/audit/events:
    get:
      tags: [Audit]
      summary: List audit events
      operationId: listAuditEvents
      x-implemented: true
      x-milestone: M1
      parameters:
        - { in: query, name: merchant_id, schema: { type: string } }
        - { in: query, name: agent_id, schema: { type: string } }
        - { in: query, name: passport_jti, schema: { type: string } }
        - { in: query, name: event_type, schema: { type: string } }
        - { in: query, name: from, schema: { type: string, format: date-time } }
        - { in: query, name: to, schema: { type: string, format: date-time } }
        - { in: query, name: limit, schema: { type: integer, default: 25, minimum: 1, maximum: 100 } }
        - { in: query, name: cursor, schema: { type: string } }
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/AuditEvent" }
                  next_cursor: { type: string, nullable: true }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "503": { $ref: "#/components/responses/CommerceDisabled" }

  /v1/commerce/ops/health:
    get:
      tags: [Operations]
      summary: Commerce operations health
      operationId: getCommerceOpsHealth
      x-implemented: true
      x-milestone: M6A
      description: >-
        Operator-only readiness view for Commerce V1 API, database,
        provider adapter health, reconciliation worker configuration, and
        webhook backlog counts. Plural and safe webhook replay remain explicit
        blockers until their contracts are confirmed. Agentic commerce
        re-enable remains deferred until a reviewed recovery and audit contract
        exists.
      parameters:
        - { in: query, name: merchant_id, schema: { type: string }, description: Optional merchant scope for webhook backlog counts and provider adapter probe. }
        - { in: query, name: environment, schema: { type: string, enum: [sandbox, live], default: sandbox } }
      responses:
        "200":
          description: Commerce operations health, possibly degraded by known blockers
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommerceOpsHealth" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: Operator caller required }
        "503":
          description: Database unavailable or Commerce V1 disabled
          content:
            application/json:
              schema: { $ref: "#/components/schemas/CommerceOpsHealth" }

  /v1/commerce/ops/provider-webhook-events:
    get:
      tags: [Operations]
      summary: List provider webhook processing events
      operationId: listCommerceProviderWebhookEvents
      x-implemented: true
      x-milestone: M7A
      description: >-
        Operator-only metadata view for failed or otherwise filtered provider
        webhook events. Raw provider payloads, signatures, webhook secrets, and
        raw credential material are not returned. Replay remains blocked until
        safe raw payload storage and redaction design exists.
      parameters:
