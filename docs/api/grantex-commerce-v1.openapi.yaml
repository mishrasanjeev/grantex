  /v1/webhooks/merchant/{merchant_id}/{source_key}:
    parameters:
      - { in: path, name: merchant_id, required: true, schema: { type: string } }
      - { in: path, name: source_key, required: true, schema: { type: string } }
    post:
      tags: [Webhooks]
      summary: Handle signed merchant catalog.product.updated webhook
      operationId: handleMerchantCatalogWebhook
      x-implemented: true
      x-milestone: M12C
      security: []
      description: >-
        Signed merchant inbound catalog webhook. M12C accepts only complete
        `catalog.product.updated` events. Required headers are
        `X-Grantex-Merchant-Timestamp` and
        `X-Grantex-Merchant-Signature`. The signature format is
        `v1=<hex_hmac_sha256(timestamp.canonical_json_body)>`, the replay
        window is five minutes, disabled sources are rejected, and duplicate
        event IDs are accepted idempotently without another catalog update.
        Route merchant_id and source_key are authoritative; tenant_id,
        merchant_id, and provider fields inside the payload are not trusted.
        Raw payloads, raw signatures, and webhook secrets are not stored.
      parameters:
        - in: header
          name: X-Grantex-Merchant-Timestamp
          required: true
          schema: { type: string }
          description: Unix timestamp in seconds; must be within the five minute replay window.
        - in: header
          name: X-Grantex-Merchant-Signature
          required: true
          schema: { type: string }
          description: v1-prefixed HMAC SHA-256 signature over timestamp and canonical JSON body.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/MerchantCatalogProductUpdatedWebhook" }
      responses:
        "200":
          description: Webhook processed or duplicate accepted idempotently
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MerchantWebhookResponse" }
        "401": { description: Signature verification failed }
        "403": { description: Webhook source is disabled }
        "404": { description: Merchant webhook source was not found }
        "409": { description: Timestamp is outside the replay window or catalog upsert conflicts }
        "422": { $ref: "#/components/responses/ValidationFailed" }

