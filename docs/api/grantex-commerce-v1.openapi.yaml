  /v1/commerce/payments/intents/{id}/reconcile:
    parameters:
      - { in: path, name: id, required: true, schema: { type: string } }
    post:
      tags: [Payments]
      summary: Reconcile payment intent status
      operationId: reconcilePaymentIntent
      x-implemented: true
      x-milestone: M4E
      description: >-
        Manually polls the neutral PaymentProvider for a Grantex-created
        payment intent. Terminal intents are idempotently ignored. Pending
        intents transition only through the payment state machine; if the
        provider still reports pending after the 15 minute expiry, Grantex
        marks the intent expired.
      responses:
