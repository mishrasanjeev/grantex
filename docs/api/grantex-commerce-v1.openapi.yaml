  /v1/commerce/ops/provider-webhook-events:
    get:
      tags: [Operations]
      summary: List provider webhook processing events
      operationId: listCommerceProviderWebhookEvents
      x-implemented: true
      x-milestone: M7A
      description: >-
        Operator-only metadata view for failed or otherwise filtered provider
        webhook events. Raw provider payloads, signatures, webhook secrets, and
        raw credential material are not returned. Replay is available only for
        failed mock-provider events whose original signature was valid and whose
        encrypted payload material exists.
      parameters:
        - { in: query, name: merchant_id, schema: { type: string } }
        - { in: query, name: provider_key, schema: { type: string, enum: [mock, plural] } }
        - { in: query, name: processing_status, schema: { type: string, enum: [received, processed, ignored, failed], default: failed } }
        - { in: query, name: limit, schema: { type: integer, minimum: 1, maximum: 100, default: 50 } }
      responses:
        "200":
          description: Metadata-only provider webhook events
          content:
            application/json:
              schema:
                type: object
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/CommerceProviderWebhookEvent" }
                  next_cursor: { type: string, nullable: true }
                  replay_available: { type: boolean }
                  replay_blocker: { type: string, nullable: true }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: Operator caller required }
        "422": { $ref: "#/components/responses/ValidationFailed" }

  /v1/commerce/ops/provider-webhook-events/{event_id}/replay:
    parameters:
      - { in: path, name: event_id, required: true, schema: { type: string } }
    post:
      tags: [Operations]
      summary: Replay an eligible failed provider webhook event
      operationId: replayCommerceProviderWebhookEvent
      x-implemented: true
      x-milestone: M14
      description: >-
        Operator-only replay for future provider webhook events with valid
        original signatures, mock-provider support, failed processing status,
        fresh replay status, and encrypted payload material. Invalid-signature,
        stale, unsupported-provider, malformed, unauthenticated, non-failed, or
        payload-missing events are refused. Dry-run validates eligibility without
        changing payment state. Real replay uses the payment state machine and
        does not double-transition terminal or already-applied states. API
        responses, logs, audits, and portal UI never expose raw payloads,
        signatures, signing secrets, encrypted payload material, provider
        credentials, bearer tokens, passports, or idempotency keys.
      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: "#/components/schemas/ReplayProviderWebhookRequest" }
      responses:
        "200":
          description: Replay dry-run passed or replay completed idempotently
          content:
            application/json:
              schema: { $ref: "#/components/schemas/ReplayProviderWebhookResponse" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { description: Operator caller required }
        "404": { $ref: "#/components/responses/NotFound" }
        "409": { description: Replay denied by eligibility, state machine, or payment status conflict }
        "422": { $ref: "#/components/responses/ValidationFailed" }

