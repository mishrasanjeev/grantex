  /v1/billing/webhook:
    post:
      operationId: handleStripeWebhook
      tags: [Billing]
      summary: Stripe webhook handler
      description: Receives Stripe webhook events. Requires `stripe-signature` header.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                    const: true
        "400":
          description: Invalid signature
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "503":
