  # ── SCIM ─────────────────────────────────────────────────────────────
  /v1/scim/tokens:
    post:
      operationId: createScimToken
      tags: [SCIM]
      summary: Create a SCIM provisioning token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                label:
                  type: string
              required: [label]
      responses:
        "201":
          description: SCIM token created (token value returned only on creation)
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  label:
                    type: string
                  token:
                    type: string
                    description: Only returned on creation
                  createdAt:
                    type: string
                    format: date-time
        "400":
          description: Label missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      operationId: listScimTokens
      tags: [SCIM]
      summary: List SCIM tokens
      responses:
        "200":
          description: Token list (token values not included)
          content:
            application/json:
              schema:
                type: object
                properties:
                  tokens:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        label:
                          type: string
                        createdAt:
                          type: string
                          format: date-time
                        lastUsedAt:
                          type: string
                          format: date-time

  /v1/scim/tokens/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: SCIM token ID
    delete:
      operationId: deleteScimToken
      tags: [SCIM]
      summary: Delete a SCIM token
      responses:
        "204":
          description: Token deleted
        "404":
          description: Token not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /scim/v2/ServiceProviderConfig:
    get:
      operationId: getScimServiceProviderConfig
      tags: [SCIM]
      summary: SCIM service provider configuration
      security: []
      responses:
        "200":
          description: SCIM capabilities
          content:
            application/json:
              schema:
                type: object

  /scim/v2/Users:
    get:
      operationId: listScimUsers
      tags: [SCIM]
      summary: List SCIM users
      security:
        - scimBearer: []
      parameters:
        - name: startIndex
          in: query
          schema:
            type: integer
            default: 1
        - name: count
          in: query
          schema:
            type: integer
            default: 100
            maximum: 200
      responses:
        "200":
          description: SCIM user list
          content:
            application/json:
              schema:
                type: object
                properties:
                  schemas:
                    type: array
                    items:
                      type: string
                  totalResults:
                    type: integer
                  startIndex:
                    type: integer
                  itemsPerPage:
                    type: integer
                  Resources:
                    type: array
                    items:
                      $ref: "#/components/schemas/ScimUser"
        "401":
          description: Invalid SCIM token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    post:
      operationId: createScimUser
      tags: [SCIM]
      summary: Create a SCIM user
      security:
        - scimBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userName:
                  type: string
                displayName:
                  type: string
                externalId:
                  type: string
                active:
                  type: boolean
                  default: true
                emails:
                  type: array
                  items:
                    type: object
                    properties:
                      value:
                        type: string
                      primary:
                        type: boolean
              required: [userName]
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScimUser"
        "400":
          description: userName missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid SCIM token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /scim/v2/Users/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: SCIM user ID
    get:
      operationId: getScimUser
      tags: [SCIM]
      summary: Get SCIM user by ID
      security:
        - scimBearer: []
      responses:
        "200":
          description: SCIM user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScimUser"
        "401":
          description: Invalid SCIM token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    put:
      operationId: replaceScimUser
      tags: [SCIM]
      summary: Replace a SCIM user
      security:
        - scimBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                userName:
                  type: string
                displayName:
                  type: string
                externalId:
                  type: string
                active:
                  type: boolean
                emails:
                  type: array
                  items:
                    type: object
                    properties:
                      value:
                        type: string
                      primary:
                        type: boolean
              required: [userName]
      responses:
        "200":
          description: User replaced
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScimUser"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Invalid SCIM token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateScimUser
      tags: [SCIM]
      summary: Patch a SCIM user
      security:
        - scimBearer: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                Operations:
                  type: array
                  items:
                    type: object
                    properties:
                      op:
                        type: string
                        enum: [replace, add]
                      path:
                        type: string
                      value: {}
              required: [Operations]
      responses:
        "200":
          description: User patched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScimUser"
        "401":
          description: Invalid SCIM token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteScimUser
      tags: [SCIM]
      summary: Delete a SCIM user
      security:
        - scimBearer: []
      responses:
        "204":
          description: User deleted
        "401":
          description: Invalid SCIM token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: User not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── SSO ──────────────────────────────────────────────────────────────
  /v1/sso/config:
    post:
      operationId: createSsoConfig
      tags: [SSO]
      summary: Configure OIDC SSO
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                issuerUrl:
                  type: string
                  format: uri
                clientId:
                  type: string
                clientSecret:
                  type: string
                redirectUri:
                  type: string
                  format: uri
              required: [issuerUrl, clientId, clientSecret, redirectUri]
      responses:
        "201":
          description: SSO configured
          content:
            application/json:
              schema:
                type: object
                properties:
                  issuerUrl:
                    type: string
                  clientId:
                    type: string
                  redirectUri:
                    type: string
                  createdAt:
                    type: string
                    format: date-time
                  updatedAt:
                    type: string
                    format: date-time
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      operationId: getSsoConfig
      tags: [SSO]
      summary: Get SSO configuration
      description: Returns SSO config with client secret masked.
      responses:
        "200":
          description: SSO configuration
          content:
            application/json:
              schema:
                type: object
                properties:
                  issuerUrl:
                    type: string
                  clientId:
                    type: string
                  redirectUri:
                    type: string
                  createdAt:
                    type: string
                    format: date-time
                  updatedAt:
                    type: string
                    format: date-time
        "404":
          description: SSO not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteSsoConfig
      tags: [SSO]
      summary: Remove SSO configuration
      responses:
        "204":
          description: SSO config removed
        "404":
          description: SSO not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /sso/login:
    get:
      operationId: ssoLogin
      tags: [SSO]
      summary: Initiate SSO login
      security: []
      parameters:
        - name: org
          in: query
          required: true
          schema:
            type: string
          description: Developer ID (organization)
      responses:
        "200":
          description: OIDC authorization URL
          content:
            application/json:
              schema:
                type: object
                properties:
                  authorizeUrl:
                    type: string
                    format: uri
        "400":
          description: org parameter missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: SSO not configured for this organization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /sso/callback:
    get:
      operationId: ssoCallback
      tags: [SSO]
      summary: SSO callback
      description: OIDC callback endpoint. Exchanges the authorization code for user info.
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: SSO user info
          content:
            application/json:
              schema:
                type: object
                properties:
                  email:
                    type: string
                  name:
                    type: string
                  sub:
                    type: string
                  developerId:
                    type: string
        "400":
          description: Missing or invalid code/state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Token exchange with IdP failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Enterprise SSO ─────────────────────────────────────────────────
  /v1/sso/connections:
    post:
      operationId: createSsoConnection
      tags: [SSO]
      summary: Create SSO Connection
      description: Create a new OIDC or SAML 2.0 SSO connection for your organization.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Human-readable connection name
                protocol:
                  type: string
                  enum: [oidc, saml]
                  description: SSO protocol
                issuerUrl:
                  type: string
                  format: uri
                  description: OIDC issuer URL (required for OIDC)
                clientId:
                  type: string
                  description: OIDC client ID (required for OIDC)
                clientSecret:
                  type: string
                  description: OIDC client secret (required for OIDC)
                idpEntityId:
                  type: string
                  description: SAML IdP entity ID (required for SAML)
                idpSsoUrl:
                  type: string
                  format: uri
                  description: SAML IdP SSO URL (required for SAML)
                idpCertificate:
                  type: string
                  description: SAML IdP X.509 certificate PEM (required for SAML)
                spEntityId:
                  type: string
                  description: SAML SP entity ID
                spAcsUrl:
                  type: string
                  format: uri
                  description: SAML SP Assertion Consumer Service URL
                domains:
                  type: array
                  items:
                    type: string
                  description: Email domains to route to this connection
                jitProvisioning:
                  type: boolean
                  description: Enable just-in-time user provisioning
                  default: false
                enforce:
                  type: boolean
                  description: Enforce SSO for this connection
                  default: false
                groupAttribute:
                  type: string
                  description: OIDC claim or SAML attribute containing group names
                groupMappings:
                  type: object
                  additionalProperties:
                    type: array
                    items:
                      type: string
                  description: Map of IdP group names to Grantex scope arrays
                defaultScopes:
                  type: array
                  items:
                    type: string
                  description: Fallback scopes when no groups match
              required: [name, protocol]
      responses:
        "201":
          description: SSO connection created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SsoConnection"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      operationId: listSsoConnections
      tags: [SSO]
      summary: List SSO Connections
      description: List all SSO connections for the authenticated developer.
      responses:
        "200":
          description: List of SSO connections
          content:
            application/json:
              schema:
                type: object
                properties:
                  connections:
                    type: array
                    items:
                      $ref: "#/components/schemas/SsoConnection"

  /v1/sso/connections/{id}:
    patch:
      operationId: updateSsoConnection
      tags: [SSO]
      summary: Update SSO Connection
      description: Update an existing SSO connection. All body parameters are optional.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: SSO connection ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                protocol:
                  type: string
                  enum: [oidc, saml]
                issuerUrl:
                  type: string
                  format: uri
                clientId:
                  type: string
                clientSecret:
                  type: string
                idpEntityId:
                  type: string
                idpSsoUrl:
                  type: string
                  format: uri
                idpCertificate:
                  type: string
                spEntityId:
                  type: string
                spAcsUrl:
                  type: string
                  format: uri
                domains:
                  type: array
                  items:
                    type: string
                jitProvisioning:
                  type: boolean
                enforce:
                  type: boolean
                groupAttribute:
                  type: string
                groupMappings:
                  type: object
                  additionalProperties:
                    type: array
                    items:
                      type: string
                defaultScopes:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: SSO connection updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SsoConnection"
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteSsoConnection
      tags: [SSO]
      summary: Delete SSO Connection
      description: Delete an SSO connection by ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: SSO connection ID
      responses:
        "204":
          description: SSO connection deleted
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/sso/connections/{id}/test:
    post:
      operationId: testSsoConnection
      tags: [SSO]
      summary: Test SSO Connection
      description: Test an SSO connection by verifying connectivity to the identity provider. For OIDC, discovers endpoints via `.well-known/openid-configuration`. For SAML, validates the certificate.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: SSO connection ID
      responses:
        "200":
          description: Connection test result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  protocol:
                    type: string
                    enum: [oidc, saml]
                  issuer:
                    type: string
                    description: OIDC issuer (present for OIDC connections)
                  authorizationEndpoint:
                    type: string
                    description: OIDC authorization endpoint (present for OIDC connections)
                  tokenEndpoint:
                    type: string
                    description: OIDC token endpoint (present for OIDC connections)
                  jwksUri:
                    type: string
                    description: OIDC JWKS URI (present for OIDC connections)
                  idpEntityId:
                    type: string
                    description: SAML IdP entity ID (present for SAML connections)
                  certificateValid:
                    type: boolean
                    description: Whether the SAML certificate is valid (present for SAML connections)
                  certificateExpiry:
                    type: string
                    format: date-time
                    description: SAML certificate expiry date (present for SAML connections)
        "404":
          description: Connection not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: IdP unreachable or discovery failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/sso/enforce:
    post:
      operationId: setSsoEnforcement
      tags: [SSO]
      summary: Set SSO Enforcement
      description: Enable or disable SSO enforcement for your organization. When enabled, all users must authenticate via SSO.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                enforce:
                  type: boolean
                  description: Whether to enforce SSO for all users
              required: [enforce]
      responses:
        "200":
          description: SSO enforcement updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  enforce:
                    type: boolean
                  developerId:
                    type: string
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/sso/sessions:
    get:
      operationId: listSsoSessions
      tags: [SSO]
      summary: List SSO Sessions
      description: List all active SSO sessions for the authenticated developer.
      responses:
        "200":
          description: List of active SSO sessions
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: "#/components/schemas/SsoSession"

  /v1/sso/sessions/{id}:
    delete:
      operationId: revokeSsoSession
      tags: [SSO]
      summary: Revoke SSO Session
      description: Revoke an active SSO session by ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: SSO session ID
      responses:
        "204":
          description: SSO session revoked
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /sso/callback/oidc:
    post:
      operationId: oidcCallback
      tags: [SSO]
      summary: OIDC Callback
      description: Handle the OIDC callback after the user authenticates with the identity provider. Exchanges the authorization code for an ID token, verifies the token signature via JWKS, extracts user info, maps groups to scopes, and optionally provisions the user via JIT.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  description: Authorization code from the IdP
                state:
                  type: string
                  description: State parameter for CSRF protection
                redirect_uri:
                  type: string
                  format: uri
                  description: Redirect URI (must match the one used in the authorize request)
              required: [code, state]
      responses:
        "200":
          description: SSO callback result with session and user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SsoCallbackResult"
        "400":
          description: Missing or invalid code/state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "502":
          description: Token exchange with IdP failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /sso/callback/saml:
    post:
      operationId: samlCallback
      tags: [SSO]
      summary: SAML Callback
      description: Handle the SAML 2.0 callback after the user authenticates with the identity provider. Parses the SAML response, verifies the XML signature against the IdP certificate, extracts user attributes, maps groups to scopes, and optionally provisions the user via JIT.
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SAMLResponse:
                  type: string
                  description: Base64-encoded SAML response from the IdP
                RelayState:
                  type: string
                  description: RelayState parameter for maintaining application state
              required: [SAMLResponse, RelayState]
      responses:
        "200":
          description: SSO callback result with session and user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SsoCallbackResult"
        "400":
          description: Invalid SAML response or signature verification failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Dashboard ────────────────────────────────────────────────────────
  /dashboard:
    get:
      operationId: getDashboard
      tags: [System]
      summary: Developer dashboard
      description: Lightweight HTML dashboard for local development.
      security: []
      responses:
        "200":
          description: HTML dashboard
          content:
            text/html:
              schema:
                type: string

  /v1/principal-sessions:
    post:
      operationId: createPrincipalSession
      tags: [Principal Sessions]
      summary: Create a principal session
      description: |
        Generate a short-lived session token for an end-user to view and manage their agent permissions.
        The returned `dashboardUrl` can be sent to the user (via email, in-app link, etc.).
        Requires at least one active grant for the specified principal.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [principalId]
              properties:
                principalId:
                  type: string
                  description: The end-user's principal ID
                  example: user_abc123
                expiresIn:
                  type: string
                  description: Session duration (e.g. "1h", "30m", "24h"). Defaults to "1h", capped at "24h".
                  example: "2h"
      responses:
        "201":
          description: Session created
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessionToken:
                    type: string
                    description: Signed JWT session token
                  dashboardUrl:
                    type: string
                    description: Full URL the user can open to manage permissions
                  expiresAt:
                    type: string
                    format: date-time
                    description: When the session token expires
        "400":
          description: Missing principalId or invalid expiresIn
        "404":
          description: No active grants for this principal

  /v1/principal/grants:
    get:
      operationId: listPrincipalGrants
      tags: [Principal Sessions]
      summary: List principal's active grants
      description: |
        Returns all active grants for the authenticated principal. Requires a session token
        (from `POST /v1/principal-sessions`) in the Authorization header.
      security: []
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: "Bearer <sessionToken>"
      responses:
        "200":
          description: List of active grants
          content:
            application/json:
              schema:
                type: object
                properties:
                  grants:
                    type: array
                    items:
                      type: object
                      properties:
                        grantId:
                          type: string
                        agentId:
                          type: string
                        agentName:
                          type: string
                        agentDescription:
                          type: string
                        agentDid:
                          type: string
                        scopes:
                          type: array
                          items:
                            type: string
                        status:
                          type: string
                        issuedAt:
                          type: string
                          format: date-time
                        expiresAt:
                          type: string
                          format: date-time
                        delegationDepth:
                          type: integer
                  principalId:
                    type: string
        "401":
          description: Missing, invalid, or expired session token

  /v1/principal/audit:
    get:
      operationId: getPrincipalAudit
      tags: [Principal Sessions]
      summary: Get principal's audit log
      description: |
        Returns recent audit entries for the authenticated principal. Requires a session token.
      security: []
      parameters:
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: "Bearer <sessionToken>"
      responses:
        "200":
          description: Audit entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      type: object
                      properties:
                        entryId:
                          type: string
                        agentId:
                          type: string
                        agentDid:
                          type: string
                        grantId:
                          type: string
                        principalId:
                          type: string
                        action:
                          type: string
                        metadata:
                          type: object
                        status:
                          type: string
                        timestamp:
                          type: string
                          format: date-time
        "401":
          description: Missing, invalid, or expired session token

  /v1/principal/grants/{id}:
    delete:
      operationId: revokePrincipalGrant
      tags: [Principal Sessions]
      summary: Revoke a grant
      description: |
        Revoke a specific grant. The grant must belong to the authenticated principal and developer.
        Cascade-revokes all descendant (delegated) grants. Requires a session token.
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: The grant ID to revoke
        - name: Authorization
          in: header
          required: true
          schema:
            type: string
          description: "Bearer <sessionToken>"
      responses:
        "204":
          description: Grant revoked
        "401":
          description: Missing, invalid, or expired session token
        "404":
          description: Grant not found or does not belong to this principal

  /dashboard/principal:
    get:
      operationId: getPrincipalDashboard
      tags: [System]
      summary: Principal permissions dashboard
      description: HTML page for managing principal (end-user) permissions.
      security: []
      parameters:
        - name: id
          in: query
          schema:
            type: string
          description: Principal ID for prefill
      responses:
        "200":
          description: HTML principal dashboard
          content:
            text/html:
              schema:
                type: string

  # ── WebAuthn / FIDO ──────────────────────────────────────────────────
  /v1/webauthn/register/options:
    post:
      operationId: webauthnRegisterOptions
      tags: [WebAuthn]
      summary: Generate registration options
      description: |
        Generate FIDO2/WebAuthn registration options for a principal. Returns a challenge and
        PublicKeyCredentialCreationOptions that the browser passes to navigator.credentials.create().
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [principalId]
              properties:
                principalId:
                  type: string
                  description: The end-user's principal ID
                  example: user_abc123
      responses:
        "200":
          description: Registration options
          content:
            application/json:
              schema:
                type: object
                properties:
                  challengeId:
                    type: string
                    description: Server-side challenge reference
                  challenge:
                    type: string
                    description: Base64url-encoded challenge
                  rp:
                    type: object
                    properties:
                      name:
                        type: string
                      id:
                        type: string
                  user:
                    type: object
                    properties:
                      id:
                        type: string
                      name:
                        type: string
                      displayName:
                        type: string
                  pubKeyCredParams:
                    type: array
                    items:
                      type: object
                      properties:
                        type:
                          type: string
                        alg:
                          type: integer
                  authenticatorSelection:
                    type: object
                    properties:
                      userVerification:
                        type: string
                        enum: [required]
                  timeout:
                    type: integer
        "400":
          description: Missing principalId
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/webauthn/register/verify:
    post:
      operationId: webauthnRegisterVerify
      tags: [WebAuthn]
      summary: Verify registration
      description: |
        Verify the attestation response from navigator.credentials.create() and store the credential.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [challengeId, response]
              properties:
                challengeId:
                  type: string
                  description: The challengeId from registerOptions
                response:
                  type: object
                  description: The credential response from the browser
                  properties:
                    id:
                      type: string
                    rawId:
                      type: string
                    type:
                      type: string
                    response:
                      type: object
                      properties:
                        clientDataJSON:
                          type: string
                        attestationObject:
                          type: string
      responses:
        "201":
          description: Credential registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  credentialId:
                    type: string
                  createdAt:
                    type: string
                    format: date-time
        "400":
          description: Invalid challenge or attestation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/webauthn/credentials:
    get:
      operationId: listWebAuthnCredentials
      tags: [WebAuthn]
      summary: List WebAuthn credentials
      description: List all registered FIDO2 credentials for a principal.
      parameters:
        - name: principalId
          in: query
          required: true
          schema:
            type: string
          description: The principal ID to list credentials for
      responses:
        "200":
          description: List of credentials
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    principalId:
                      type: string
                    authenticatorType:
                      type: string
                    createdAt:
                      type: string
                      format: date-time
                    lastUsedAt:
                      type: string
                      format: date-time

  /v1/webauthn/credentials/{id}:
    delete:
      operationId: deleteWebAuthnCredential
      tags: [WebAuthn]
      summary: Delete a credential
      description: Remove a registered FIDO2 credential.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Credential ID
      responses:
        "204":
          description: Credential deleted
        "404":
          description: Credential not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/webauthn/assert/options:
    post:
      operationId: webauthnAssertOptions
      tags: [WebAuthn]
      summary: Generate assertion options
      description: |
        Generate FIDO2/WebAuthn assertion options for the consent flow. Returns a challenge and
        PublicKeyCredentialRequestOptions that the browser passes to navigator.credentials.get().
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [principalId, authRequestId]
              properties:
                principalId:
                  type: string
                  description: The end-user's principal ID
                authRequestId:
                  type: string
                  description: The authorization request ID this assertion is for
      responses:
        "200":
          description: Assertion options
          content:
            application/json:
              schema:
                type: object
                properties:
                  challengeId:
                    type: string
                  challenge:
                    type: string
                  allowCredentials:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                  userVerification:
                    type: string
                    enum: [required]
                  timeout:
                    type: integer
        "400":
          description: Missing parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: No credentials registered for this principal
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/webauthn/assert/verify:
    post:
      operationId: webauthnAssertVerify
      tags: [WebAuthn]
      summary: Verify assertion
      description: |
        Verify the assertion response from navigator.credentials.get(). On success, the associated
        authorization request is approved with FIDO evidence attached to the grant.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [challengeId, response]
              properties:
                challengeId:
                  type: string
                response:
                  type: object
                  properties:
                    id:
                      type: string
                    rawId:
                      type: string
                    type:
                      type: string
                    response:
                      type: object
                      properties:
                        clientDataJSON:
                          type: string
                        authenticatorData:
                          type: string
                        signature:
                          type: string
      responses:
        "200":
          description: Assertion verified, grant approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  verified:
                    type: boolean
                  grantId:
                    type: string
                  fidoEvidence:
                    type: object
                    properties:
                      credentialId:
                        type: string
                      authenticatorType:
                        type: string
                      userVerified:
                        type: boolean
                      assertedAt:
                        type: string
                        format: date-time
        "400":
          description: Invalid assertion
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Verifiable Credentials ──────────────────────────────────────────
  /v1/credentials/{id}:
    get:
      operationId: getCredential
      tags: [Verifiable Credentials]
      summary: Retrieve a Verifiable Credential
      description: Get a specific Verifiable Credential by ID.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Credential ID
      responses:
        "200":
          description: Verifiable Credential
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  grantId:
                    type: string
                  type:
                    type: string
                    enum: [AgentGrantCredential, DelegatedGrantCredential]
                  vcJwt:
                    type: string
                    description: The VC-JWT string
                  status:
                    type: string
                    enum: [active, revoked]
                  issuedAt:
                    type: string
                    format: date-time
                  expiresAt:
                    type: string
                    format: date-time
        "404":
          description: Credential not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/credentials:
    get:
      operationId: listCredentials
      tags: [Verifiable Credentials]
      summary: List Verifiable Credentials
      description: List credentials with optional filters.
      parameters:
        - name: grantId
          in: query
          schema:
            type: string
          description: Filter by grant ID
        - name: principalId
          in: query
          schema:
            type: string
          description: Filter by principal ID
        - name: status
          in: query
          schema:
            type: string
            enum: [active, revoked]
          description: Filter by status
      responses:
        "200":
          description: List of credentials
          content:
            application/json:
              schema:
                type: object
                properties:
                  credentials:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        grantId:
                          type: string
                        type:
                          type: string
                        status:
                          type: string
                        issuedAt:
                          type: string
                          format: date-time
                        expiresAt:
                          type: string
                          format: date-time

  /v1/credentials/verify:
    post:
      operationId: verifyCredential
      tags: [Verifiable Credentials]
      summary: Verify a VC-JWT
      description: |
        Verify a Verifiable Credential JWT. Checks the signature against the issuer's DID document,
        validates expiry, and checks the StatusList2021 revocation status.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vcJwt]
              properties:
                vcJwt:
                  type: string
                  description: The VC-JWT to verify
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                type: object
                properties:
                  valid:
                    type: boolean
                  issuer:
                    type: string
                  credentialSubject:
                    type: object
                  status:
                    type: string
                    enum: [active, revoked]
                  reason:
                    type: string
                    description: Present when valid is false

  /v1/credentials/status/{id}:
    get:
      operationId: getStatusList
      tags: [Verifiable Credentials]
      summary: StatusList2021 credential
      description: |
        Public endpoint returning a StatusList2021 credential (bitstring-based revocation list).
        No authentication required.
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
          description: Status list ID
      responses:
        "200":
          description: StatusList2021 credential
          content:
            application/json:
              schema:
                type: object
                properties:
                  "@context":
                    type: array
                    items:
                      type: string
                  type:
                    type: array
                    items:
                      type: string
                  issuer:
                    type: string
                  issuanceDate:
                    type: string
                    format: date-time
                  credentialSubject:
                    type: object
                    properties:
                      id:
                        type: string
                      type:
                        type: string
                      statusPurpose:
                        type: string
                      encodedList:
                        type: string
                        description: Base64-encoded bitstring
        "404":
          description: Status list not found

  # ── DID ──────────────────────────────────────────────────────────────
  /.well-known/did.json:
    get:
      operationId: getDidDocument
      tags: [DID]
      summary: W3C DID document
      description: |
        Public DID document for did:web:grantex.dev. Contains verification methods (public keys)
        used to sign Verifiable Credentials. No authentication required.
      security: []
      responses:
        "200":
          description: DID document
          content:
            application/json:
              schema:
                type: object
                properties:
                  "@context":
                    type: array
                    items:
                      type: string
                  id:
                    type: string
                    example: "did:web:grantex.dev"
                  verificationMethod:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                        controller:
                          type: string
                        publicKeyJwk:
                          type: object
                  authentication:
                    type: array
                    items:
                      type: string
                  assertionMethod:
                    type: array
                    items:
                      type: string
                  service:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                        serviceEndpoint:
                          type: string
