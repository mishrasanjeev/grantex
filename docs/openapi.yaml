openapi: 3.1.0
info:
  title: Grantex Auth Service API
  version: 0.1.3
  description: |
    The Grantex Auth Service implements the Grantex delegated authorization protocol for AI agents.
    It provides agent registration, authorization flows, token management, audit logging, policy enforcement,
    anomaly detection, compliance exports, SCIM provisioning, SSO, and billing.

    ## Authentication
    Most endpoints require a **Bearer token** (your developer API key) in the `Authorization` header.
    SCIM 2.0 user endpoints use a separate SCIM Bearer token.
    Public endpoints (health, JWKS, consent, SSO flow) require no authentication.

    ## Rate Limits
    - **Global default**: 100 requests/minute
    - **POST /v1/authorize**: 10 requests/minute
    - **POST /v1/token**: 20 requests/minute
    - **POST /v1/token/refresh**: 20 requests/minute
    - JWKS endpoint is allowlisted from rate limiting
  license:
    name: Apache 2.0
    url: https://opensource.org/licenses/Apache-2.0
  contact:
    name: Grantex
    url: https://grantex.dev

servers:
  - url: https://grantex-auth-dd4mtrt2gq-uc.a.run.app
    description: Production (Cloud Run)
  - url: http://localhost:3001
    description: Local development (docker compose)

tags:
  - name: System
    description: Health checks and public keys
  - name: Authentication
    description: Developer signup, profile, and key rotation
  - name: Agents
    description: Agent registration and management
  - name: Authorization
    description: Authorization request creation and approval
  - name: Consent
    description: End-user consent UI and approval flow
  - name: Tokens
    description: Token exchange, verification, and revocation
  - name: Grants
    description: Grant management, verification, and delegation
  - name: Audit
    description: Immutable audit log — append-only, hash-chained
  - name: Policies
    description: Access policy engine for automated grant decisions
  - name: Webhooks
    description: Webhook registration for real-time event notifications
  - name: Billing
    description: Stripe-based subscription billing
  - name: Anomalies
    description: Anomaly detection and acknowledgement
  - name: Compliance
    description: Compliance summaries, exports, and evidence packs
  - name: SCIM
    description: SCIM 2.0 user provisioning and token management
  - name: SSO
    description: OIDC single sign-on configuration and flow
  - name: Principal Sessions
    description: End-user permission management via short-lived session tokens
  - name: WebAuthn
    description: FIDO2/WebAuthn passkey registration, assertion, and credential management
  - name: Verifiable Credentials
    description: W3C Verifiable Credential issuance, verification, and StatusList2021 revocation
  - name: DID
    description: W3C Decentralized Identifier (DID) document for credential verification

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Developer API key
    scimBearer:
      type: http
      scheme: bearer
      description: SCIM provisioning token

  schemas:
    Error:
      type: object
      properties:
        error:
          type: string
        code:
          type: string
        statusCode:
          type: integer
      required: [error, code, statusCode]

    Developer:
      type: object
      properties:
        developerId:
          type: string
        name:
          type: string
        email:
          type: string
        mode:
          type: string
          enum: [live, sandbox]
        plan:
          type: string
          enum: [free, pro, enterprise]
        createdAt:
          type: string
          format: date-time

    Agent:
      type: object
      properties:
        agentId:
          type: string
        did:
          type: string
        developerId:
          type: string
        name:
          type: string
        description:
          type: string
        scopes:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, suspended, revoked]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Grant:
      type: object
      properties:
        grantId:
          type: string
        agentId:
          type: string
        principalId:
          type: string
        developerId:
          type: string
        scopes:
          type: array
          items:
            type: string
        status:
          type: string
          enum: [active, revoked, expired]
        issuedAt:
          type: string
          format: date-time
        expiresAt:
          type: string
          format: date-time
        revokedAt:
          type: string
          format: date-time
        parentGrantId:
          type: string
        delegationDepth:
          type: integer

    AuditEntry:
      type: object
      properties:
        entryId:
          type: string
        agentId:
          type: string
        agentDid:
          type: string
        grantId:
          type: string
        principalId:
          type: string
        developerId:
          type: string
        action:
          type: string
        metadata:
          type: object
        hash:
          type: string
        prevHash:
          type: string
        timestamp:
          type: string
          format: date-time
        status:
          type: string
          enum: [success, failure, blocked]

    Policy:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        effect:
          type: string
          enum: [allow, deny]
        priority:
          type: integer
        agentId:
          type: string
        principalId:
          type: string
        scopes:
          type: array
          items:
            type: string
        timeOfDayStart:
          type: string
        timeOfDayEnd:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    Webhook:
      type: object
      properties:
        id:
          type: string
        url:
          type: string
          format: uri
        events:
          type: array
          items:
            type: string
            enum: [grant.created, grant.revoked, token.issued]
        secret:
          type: string
          description: Only returned on creation
        createdAt:
          type: string
          format: date-time

    Anomaly:
      type: object
      properties:
        id:
          type: string
        type:
          type: string
          enum: [rate_spike, high_failure_rate, new_principal, off_hours_activity]
        severity:
          type: string
          enum: [low, medium, high]
        agentId:
          type: string
        principalId:
          type: string
        description:
          type: string
        metadata:
          type: object
        detectedAt:
          type: string
          format: date-time
        acknowledgedAt:
          type: string
          format: date-time

    ScimUser:
      type: object
      properties:
        schemas:
          type: array
          items:
            type: string
        id:
          type: string
        userName:
          type: string
        displayName:
          type: string
        externalId:
          type: string
        active:
          type: boolean
        emails:
          type: array
          items:
            type: object
            properties:
              value:
                type: string
              primary:
                type: boolean
        meta:
          type: object
          properties:
            resourceType:
              type: string
            created:
              type: string
              format: date-time
            lastModified:
              type: string
              format: date-time

    SsoConnection:
      type: object
      properties:
        id:
          type: string
          description: SSO connection ID
        developerId:
          type: string
        name:
          type: string
        protocol:
          type: string
          enum: [oidc, saml]
        issuerUrl:
          type: string
        clientId:
          type: string
        idpEntityId:
          type: string
        idpSsoUrl:
          type: string
        spEntityId:
          type: string
        spAcsUrl:
          type: string
        domains:
          type: array
          items:
            type: string
        jitProvisioning:
          type: boolean
        enforce:
          type: boolean
        groupAttribute:
          type: string
        groupMappings:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
        defaultScopes:
          type: array
          items:
            type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    SsoSession:
      type: object
      properties:
        id:
          type: string
          description: SSO session ID
        developerId:
          type: string
        connectionId:
          type: string
        protocol:
          type: string
          enum: [oidc, saml]
        email:
          type: string
        name:
          type: string
        sub:
          type: string
          description: Subject identifier from the IdP
        groups:
          type: array
          items:
            type: string
        mappedScopes:
          type: array
          items:
            type: string
        principalId:
          type: string
          description: JIT-provisioned principal ID (if applicable)
        expiresAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time

    SsoCallbackResult:
      type: object
      properties:
        sessionId:
          type: string
          description: SSO session ID
        email:
          type: string
        name:
          type: string
        sub:
          type: string
          description: Subject identifier from the IdP
        groups:
          type: array
          items:
            type: string
        mappedScopes:
          type: array
          items:
            type: string
        principalId:
          type: string
          description: JIT-provisioned principal ID (if applicable)
        developerId:
          type: string
        expiresAt:
          type: string
          format: date-time

security:
  - bearerAuth: []

paths:
  # ── System ───────────────────────────────────────────────────────────
  /health:
    get:
      operationId: getHealth
      tags: [System]
      summary: Health check
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [ok]
                required: [status]
        "503":
          description: Service is degraded
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: [degraded]
                  failing:
                    type: array
                    items:
                      type: string

  /.well-known/jwks.json:
    get:
      operationId: getJwks
      tags: [System]
      summary: JSON Web Key Set
      description: Public signing keys for offline grant token verification. Not rate-limited.
      security: []
      responses:
        "200":
          description: JWKS key set
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      type: object

  # ── Authentication ───────────────────────────────────────────────────
  /v1/signup:
    post:
      operationId: signup
      tags: [Authentication]
      summary: Register a new developer account
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Developer or organization name
                email:
                  type: string
                  format: email
              required: [name]
      responses:
        "201":
          description: Developer account created
          content:
            application/json:
              schema:
                type: object
                properties:
                  developerId:
                    type: string
                  apiKey:
                    type: string
                  name:
                    type: string
                  email:
                    type: string
                  mode:
                    type: string
                    enum: [live, sandbox]
                  createdAt:
                    type: string
                    format: date-time
        "400":
          description: Validation error (name missing)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Email already registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/me:
    get:
      operationId: getMe
      tags: [Authentication]
      summary: Get current developer profile
      responses:
        "200":
          description: Developer profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Developer"
        "404":
          description: Developer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateSettings
      tags: [Authentication]
      summary: Update developer settings
      description: Update developer profile settings including FIDO/WebAuthn configuration.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                fidoRequired:
                  type: boolean
                  description: Require FIDO2/WebAuthn assertion for all authorization requests
                fidoRpName:
                  type: string
                  description: Relying Party name displayed in browser passkey prompts
      responses:
        "200":
          description: Settings updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Developer"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/keys/rotate:
    post:
      operationId: rotateApiKey
      tags: [Authentication]
      summary: Rotate API key
      description: Generates a new API key and invalidates the current one.
      responses:
        "200":
          description: New API key
          content:
            application/json:
              schema:
                type: object
                properties:
                  apiKey:
                    type: string
                  rotatedAt:
                    type: string
                    format: date-time

  # ── Agents ───────────────────────────────────────────────────────────
  /v1/agents:
    post:
      operationId: registerAgent
      tags: [Agents]
      summary: Register a new agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  description: Human-readable agent name
                description:
                  type: string
                scopes:
                  type: array
                  items:
                    type: string
                  description: Scopes the agent may request
              required: [name]
      responses:
        "201":
          description: Agent registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "402":
          description: Plan agent limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      operationId: listAgents
      tags: [Agents]
      summary: List all agents
      responses:
        "200":
          description: Agent list
          content:
            application/json:
              schema:
                type: object
                properties:
                  agents:
                    type: array
                    items:
                      $ref: "#/components/schemas/Agent"

  /v1/agents/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Agent ID
    get:
      operationId: getAgent
      tags: [Agents]
      summary: Get agent by ID
      responses:
        "200":
          description: Agent details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updateAgent
      tags: [Agents]
      summary: Update an agent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                description:
                  type: string
                scopes:
                  type: array
                  items:
                    type: string
                status:
                  type: string
                  enum: [active, suspended]
      responses:
        "200":
          description: Updated agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "400":
          description: No fields to update
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deleteAgent
      tags: [Agents]
      summary: Delete an agent
      responses:
        "204":
          description: Agent deleted
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Authorization ────────────────────────────────────────────────────
  /v1/authorize:
    post:
      operationId: createAuthorizationRequest
      tags: [Authorization]
      summary: Create an authorization request
      description: |
        Creates an authorization request and returns a consent URL for the end-user.
        In sandbox mode, returns a `code` directly (no redirect needed).
        If a matching policy auto-approves, returns a `code` with `policyEnforced: true`.

        **Rate limit: 10 requests/minute.**
      x-rateLimit:
        limit: 10
        period: minute
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                agentId:
                  type: string
                principalId:
                  type: string
                  description: Your application's user identifier
                scopes:
                  type: array
                  items:
                    type: string
                redirectUri:
                  type: string
                  format: uri
                state:
                  type: string
                expiresIn:
                  type: string
                  default: "24h"
                  description: Duration string (e.g. '1h', '24h', '7d')
                audience:
                  type: string
                codeChallenge:
                  type: string
                  description: PKCE code challenge (S256 only)
                codeChallengeMethod:
                  type: string
                  enum: [S256]
              required: [agentId, principalId, scopes]
      responses:
        "201":
          description: Authorization request created
          content:
            application/json:
              schema:
                type: object
                properties:
                  authRequestId:
                    type: string
                  consentUrl:
                    type: string
                    format: uri
                  expiresAt:
                    type: string
                    format: date-time
                  sandbox:
                    type: boolean
                  code:
                    type: string
                    description: Present in sandbox mode or when policy auto-approves
                  policyEnforced:
                    type: boolean
                  effect:
                    type: string
                    enum: [allow]
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "402":
          description: Plan grant limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Policy denied the authorization
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/authorize/{id}/approve:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Authorization request ID
    post:
      operationId: approveAuthorizationRequest
      tags: [Authorization]
      summary: Approve an authorization request
      description: Programmatic approval (for testing). In production, use the consent UI.
      responses:
        "200":
          description: Request approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  requestId:
                    type: string
                  status:
                    type: string
                  code:
                    type: string
        "404":
          description: Request not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/authorize/{id}/deny:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Authorization request ID
    post:
      operationId: denyAuthorizationRequest
      tags: [Authorization]
      summary: Deny an authorization request
      responses:
        "200":
          description: Request denied
          content:
            application/json:
              schema:
                type: object
                properties:
                  requestId:
                    type: string
                  status:
                    type: string
        "404":
          description: Request not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Consent ──────────────────────────────────────────────────────────
  /consent:
    get:
      operationId: getConsentPage
      tags: [Consent]
      summary: Consent UI page
      description: HTML consent page for end-user approval.
      security: []
      parameters:
        - name: req
          in: query
          schema:
            type: string
          description: Authorization request ID
      responses:
        "200":
          description: HTML consent page
          content:
            text/html:
              schema:
                type: string

  /v1/consent/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Authorization request ID
    get:
      operationId: getConsentDetails
      tags: [Consent]
      summary: Get consent request details
      security: []
      responses:
        "200":
          description: Consent request details
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                  agentName:
                    type: string
                  agentDid:
                    type: string
                  agentDescription:
                    type: string
                  scopes:
                    type: array
                    items:
                      type: string
                  scopeDescriptions:
                    type: array
                    items:
                      type: string
                  expiresAt:
                    type: string
                    format: date-time
                  status:
                    type: string
        "404":
          description: Request not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "410":
          description: Request expired or already processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/consent/{id}/approve:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Authorization request ID
    post:
      operationId: approveConsent
      tags: [Consent]
      summary: Approve consent (end-user action)
      security: []
      responses:
        "200":
          description: Consent approved
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: string
                  redirectUri:
                    type: string
                  state:
                    type: string
        "404":
          description: Request not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "410":
          description: Request expired or already processed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/consent/{id}/deny:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Authorization request ID
    post:
      operationId: denyConsent
      tags: [Consent]
      summary: Deny consent (end-user action)
      security: []
      responses:
        "200":
          description: Consent denied
          content:
            application/json:
              schema:
                type: object
                properties:
                  redirectUri:
                    type: string
                  state:
                    type: string
        "404":
          description: Request not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Tokens ───────────────────────────────────────────────────────────
  /v1/token:
    post:
      operationId: exchangeToken
      tags: [Tokens]
      summary: Exchange authorization code for grant token
      description: |
        Exchanges an authorization code for a signed grant token (RS256 JWT).
        If the authorization used PKCE (S256), a `codeVerifier` is required.
        Fires webhook events for `grant.created` and `token.issued`.

        **Rate limit: 20 requests/minute.**
      x-rateLimit:
        limit: 20
        period: minute
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                code:
                  type: string
                  description: Authorization code from consent approval
                agentId:
                  type: string
                codeVerifier:
                  type: string
                  description: PKCE code verifier (required if code_challenge was used)
                credentialFormat:
                  type: string
                  enum: [vc-jwt]
                  description: |
                    When set to "vc-jwt", a W3C Verifiable Credential (VC-JWT) is issued alongside the
                    standard grant token. The VC is a portable, tamper-proof proof of authorization.
              required: [code, agentId]
      responses:
        "201":
          description: Grant token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  grantToken:
                    type: string
                    description: Signed RS256 JWT
                  expiresAt:
                    type: string
                    format: date-time
                  scopes:
                    type: array
                    items:
                      type: string
                  refreshToken:
                    type: string
                  grantId:
                    type: string
                  verifiableCredential:
                    type: string
                    description: W3C VC-JWT (present when credentialFormat is "vc-jwt")
        "400":
          description: Invalid code, not approved, expired, or PKCE mismatch
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/token/refresh:
    post:
      operationId: refreshToken
      tags: [Tokens]
      summary: Refresh a grant token
      description: |
        Exchanges a refresh token for a new grant token and rotated refresh token.
        The old refresh token is marked as used and cannot be reused (single-use rotation per SPEC §7.4).
        Returns the same grantId with a new JWT and new refresh token.

        **Rate limit: 20 requests/minute.**
      x-rateLimit:
        limit: 20
        period: minute
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                refreshToken:
                  type: string
                  description: Refresh token from a previous token exchange or refresh
                agentId:
                  type: string
                  description: Agent ID that the refresh token was issued to
              required: [refreshToken, agentId]
      responses:
        "201":
          description: New grant token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  grantToken:
                    type: string
                    description: New signed RS256 JWT
                  expiresAt:
                    type: string
                    format: date-time
                  scopes:
                    type: array
                    items:
                      type: string
                  refreshToken:
                    type: string
                    description: New rotated refresh token (single-use)
                  grantId:
                    type: string
                    description: Same grant ID as original token
        "400":
          description: Invalid, expired, used, or revoked refresh token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/tokens/verify:
    post:
      operationId: verifyToken
      tags: [Tokens]
      summary: Verify a grant token online
      description: Server-side token verification. For offline verification, use the JWKS endpoint.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
              required: [token]
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      valid:
                        type: boolean
                        const: true
                      grantId:
                        type: string
                      scopes:
                        type: array
                        items:
                          type: string
                      principal:
                        type: string
                      agent:
                        type: string
                      expiresAt:
                        type: string
                        format: date-time
                  - type: object
                    properties:
                      valid:
                        type: boolean
                        const: false
        "400":
          description: Token missing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/tokens/revoke:
    post:
      operationId: revokeToken
      tags: [Tokens]
      summary: Revoke a grant token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                jti:
                  type: string
                  description: Token ID (jti claim from the JWT)
              required: [jti]
      responses:
        "204":
          description: Token revoked
        "404":
          description: Token not found or already revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Grants ───────────────────────────────────────────────────────────
  /v1/grants:
    get:
      operationId: listGrants
      tags: [Grants]
      summary: List grants
      parameters:
        - name: agentId
          in: query
          schema:
            type: string
        - name: principalId
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: string
            enum: [active, revoked, expired]
      responses:
        "200":
          description: Grant list
          content:
            application/json:
              schema:
                type: object
                properties:
                  grants:
                    type: array
                    items:
                      $ref: "#/components/schemas/Grant"

  /v1/grants/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Grant ID
    get:
      operationId: getGrant
      tags: [Grants]
      summary: Get grant by ID
      responses:
        "200":
          description: Grant details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Grant"
        "404":
          description: Grant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: revokeGrant
      tags: [Grants]
      summary: Revoke a grant
      description: Revokes the grant and cascade-revokes all descendant delegated grants.
      responses:
        "204":
          description: Grant revoked
        "404":
          description: Grant not found or already revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/grants/verify:
    post:
      operationId: verifyGrant
      tags: [Grants]
      summary: Verify a grant token's revocation status
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                token:
                  type: string
              required: [token]
      responses:
        "200":
          description: Grant verification result
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      active:
                        type: boolean
                        const: true
                      claims:
                        type: object
                  - type: object
                    properties:
                      active:
                        type: boolean
                        const: false
                      reason:
                        type: string
                        enum: [revoked, not_found, expired]
        "400":
          description: Token missing or invalid
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/grants/delegate:
    post:
      operationId: delegateGrant
      tags: [Grants]
      summary: Delegate a grant to a sub-agent
      description: |
        Creates a delegated grant for a sub-agent with narrowed scopes.
        Sub-agent scopes must be a subset of the parent grant's scopes.
        Sub-agent token expiry is capped at the parent token's expiry.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                parentGrantToken:
                  type: string
                  description: Parent agent's grant token (JWT)
                subAgentId:
                  type: string
                scopes:
                  type: array
                  items:
                    type: string
                  description: Must be a subset of the parent grant's scopes
                expiresIn:
                  type: string
                  default: "1h"
              required: [parentGrantToken, subAgentId, scopes]
      responses:
        "201":
          description: Delegated grant created
          content:
            application/json:
              schema:
                type: object
                properties:
                  grantToken:
                    type: string
                  expiresAt:
                    type: string
                    format: date-time
                  scopes:
                    type: array
                    items:
                      type: string
                  grantId:
                    type: string
        "400":
          description: Invalid token or scope escalation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Sub-agent not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Audit ────────────────────────────────────────────────────────────
  /v1/audit/log:
    post:
      operationId: createAuditEntry
      tags: [Audit]
      summary: Log an audit entry
      description: Appends an entry to the immutable, hash-chained audit log.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                agentId:
                  type: string
                agentDid:
                  type: string
                grantId:
                  type: string
                principalId:
                  type: string
                action:
                  type: string
                  description: "Action identifier (e.g. 'payment.initiated', 'file.read')"
                metadata:
                  type: object
                status:
                  type: string
                  enum: [success, failure, blocked]
                  default: success
              required: [agentId, agentDid, grantId, principalId, action]
      responses:
        "201":
          description: Audit entry created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEntry"
        "400":
          description: Missing required fields
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "402":
          description: Plan audit entry limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/audit/entries:
    get:
      operationId: listAuditEntries
      tags: [Audit]
      summary: List audit entries
      parameters:
        - name: agentId
          in: query
          schema:
            type: string
        - name: grantId
          in: query
          schema:
            type: string
        - name: principalId
          in: query
          schema:
            type: string
        - name: action
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Audit entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  entries:
                    type: array
                    items:
                      $ref: "#/components/schemas/AuditEntry"

  /v1/audit/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Audit entry ID
    get:
      operationId: getAuditEntry
      tags: [Audit]
      summary: Get audit entry by ID
      responses:
        "200":
          description: Audit entry
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditEntry"
        "404":
          description: Entry not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Policies ─────────────────────────────────────────────────────────
  /v1/policies:
    post:
      operationId: createPolicy
      tags: [Policies]
      summary: Create an access policy
      description: Policies automate grant approval or denial based on agent, principal, scopes, and time-of-day.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                effect:
                  type: string
                  enum: [allow, deny]
                priority:
                  type: integer
                  default: 0
                  description: Higher priority policies are evaluated first
                agentId:
                  type: string
                principalId:
                  type: string
                scopes:
                  type: array
                  items:
                    type: string
                timeOfDayStart:
                  type: string
                  description: "HH:mm format"
                timeOfDayEnd:
                  type: string
                  description: "HH:mm format"
              required: [name, effect]
      responses:
        "201":
          description: Policy created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "400":
          description: Invalid effect value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "402":
          description: Plan policy limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      operationId: listPolicies
      tags: [Policies]
      summary: List access policies
      description: Returns policies ordered by priority (descending), then creation date (ascending).
      responses:
        "200":
          description: Policy list
          content:
            application/json:
              schema:
                type: object
                properties:
                  policies:
                    type: array
                    items:
                      $ref: "#/components/schemas/Policy"
                  total:
                    type: integer

  /v1/policies/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Policy ID
    get:
      operationId: getPolicy
      tags: [Policies]
      summary: Get policy by ID
      responses:
        "200":
          description: Policy details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "404":
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    patch:
      operationId: updatePolicy
      tags: [Policies]
      summary: Update a policy
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                effect:
                  type: string
                  enum: [allow, deny]
                priority:
                  type: integer
                agentId:
                  type: string
                principalId:
                  type: string
                scopes:
                  type: array
                  items:
                    type: string
                timeOfDayStart:
                  type: string
                timeOfDayEnd:
                  type: string
      responses:
        "200":
          description: Updated policy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Policy"
        "400":
          description: Invalid effect value
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    delete:
      operationId: deletePolicy
      tags: [Policies]
      summary: Delete a policy
      responses:
        "204":
          description: Policy deleted
        "404":
          description: Policy not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  # ── Webhooks ─────────────────────────────────────────────────────────
  /v1/webhooks:
    post:
      operationId: createWebhook
      tags: [Webhooks]
      summary: Register a webhook
      description: |
        Register a URL to receive webhook notifications for grant and token events.
        Valid events: `grant.created`, `grant.revoked`, `token.issued`.
        Webhook payloads are signed with the returned `secret` (HMAC-SHA256).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                url:
                  type: string
                  format: uri
                events:
                  type: array
                  items:
                    type: string
                    enum: [grant.created, grant.revoked, token.issued]
                  minItems: 1
              required: [url, events]
      responses:
        "201":
          description: Webhook registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Webhook"
        "400":
          description: Invalid events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "402":
          description: Plan webhook limit exceeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
    get:
      operationId: listWebhooks
      tags: [Webhooks]
      summary: List webhooks
      responses:
        "200":
          description: Webhook list
          content:
            application/json:
              schema:
                type: object
                properties:
                  webhooks:
                    type: array
                    items:
                      $ref: "#/components/schemas/Webhook"

  /v1/webhooks/{id}:
    parameters:
      - name: id
        in: path
        required: true
        schema:
          type: string
        description: Webhook ID
    delete:
      operationId: deleteWebhook
      tags: [Webhooks]
      summary: Delete a webhook
      responses:
        "204":
          description: Webhook deleted
        "404":
          description: Webhook not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

