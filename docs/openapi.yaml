        new principals, and off-hours activity.
      responses:
        "200":
          description: Detection results
          content:
            application/json:
              schema:
                type: object
                properties:
                  detectedAt:
                    type: string
                    format: date-time
                  total:
                    type: integer
                  anomalies:
                    type: array
                    items:
                      $ref: "#/components/schemas/Anomaly"

  /v1/anomalies:
    get:
      operationId: listAnomalies
      tags: [Anomalies]
      summary: List detected anomalies
      parameters:
        - name: unacknowledged
          in: query
          schema:
            type: string
            enum: ["true"]
          description: Filter to unacknowledged anomalies only
      responses:
        "200":
          description: Anomaly list
          content:
            application/json:
              schema:
                type: object
                properties:
                  anomalies:
                    type: array
                    items:
                      $ref: "#/components/schemas/Anomaly"
                  total:
                    type: integer

  /v1/anomalies/{id}/acknowledge:
    parameters:
      - name: id
