replicaCount: 2

image:
  repository: grantex/auth-service
  # Defaults to Chart.appVersion when blank
  tag: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80
  targetPort: 3001

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: grantex.example.com
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - secretName: grantex-tls
  #    hosts:
  #      - grantex.example.com

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: false
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

pdb:
  enabled: true
  minAvailable: 1

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 2000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

serviceAccount:
  create: true
  name: ""
  annotations: {}

config:
  jwtIssuer: "https://your-domain.example.com"
  port: "3001"
  host: "0.0.0.0"
  # Comma-separated browser origins allowed to call the API. Replace this
  # placeholder with the exact production origins used by your deployment.
  corsAllowedOrigins: "https://your-domain.example.com"
  # Disabled by default. Set to a fixed hop count (1-16) or a comma-separated
  # IP/CIDR allowlist only when network policy restricts direct pod access.
  trustProxy: ""

# External PostgreSQL connection string (required). Stored in the generated
# Kubernetes Secret unless existingSecret is set.
externalDatabase:
  url: ""

# External Redis connection string (required). Stored in the generated
# Kubernetes Secret unless existingSecret is set.
externalRedis:
  url: ""

# RSA private key PEM — stored in a generated Kubernetes Secret.
# Ignored when existingSecret is set.
rsaPrivateKey: ""

# Required production credentials. Generate independent random values; the
# vault key must be exactly 32 bytes encoded as 64 hex or 44 base64 characters.
adminApiKey: ""
vaultEncryptionKey: ""

# Name of an existing Secret containing DATABASE_URL, REDIS_URL,
# RSA_PRIVATE_KEY, ADMIN_API_KEY, VAULT_ENCRYPTION_KEY, and (when metrics are
# enabled) METRICS_API_KEY. When set, generated Secret values are ignored.
existingSecret: ""

livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 10
  periodSeconds: 15
  failureThreshold: 3

readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  failureThreshold: 3

eventStreaming:
  enabled: true
  maxConnectionsPerDeveloper: 5

metrics:
  enabled: true
  apiKey: ""
  serviceMonitor:
    enabled: false
    interval: 30s
    namespace: ""

opentelemetry:
  enabled: false
  endpoint: ""
  collector:
    enabled: false
    image: otel/opentelemetry-collector-contrib:0.96.0
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 200m
        memory: 256Mi

grafana:
  dashboards:
    enabled: false

budget:
  enabled: true

nodeSelector: {}

tolerations: []

affinity: {}
