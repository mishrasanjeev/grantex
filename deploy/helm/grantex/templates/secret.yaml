{{- if not .Values.existingSecret -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "grantex.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "grantex.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.externalDatabase.url | quote }}
  REDIS_URL: {{ .Values.externalRedis.url | quote }}
  {{- if .Values.rsaPrivateKey }}
  RSA_PRIVATE_KEY: |-
{{ .Values.rsaPrivateKey | nindent 4 }}
  {{- end }}
{{- end }}
