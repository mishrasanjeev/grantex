name: Deploy Portal

on:
  push:
    branches: [main]
    paths:
      - 'apps/portal/**'
      - 'web/**'
      - 'firebase.json'
      - '.firebaserc'
      - '.github/workflows/deploy-portal.yml'
  workflow_dispatch:

jobs:
  deploy:
    name: Build & Deploy to Firebase
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/portal/package-lock.json

      - name: Install portal dependencies
        working-directory: apps/portal
        run: npm ci

      - name: Build portal
        working-directory: apps/portal
        run: npm run build

      - name: Copy portal build to web/dashboard
        run: |
          mkdir -p web/dashboard
          cp -r apps/portal/dist/* web/dashboard/

      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          projectId: grantex-prod
          channelId: live

      - name: Smoke test Firebase -> Cloud Run rewrites
        run: |
          set -e
          BASE=https://grantex.dev

          # Give Firebase CDN a moment to pick up the new config.
          sleep 15

          check() {
            local path="$1"
            local expect_substr="$2"
            local url="$BASE$path"
            echo "--- GET $url"
            local body
            body=$(curl -sS -L --fail --max-time 20 "$url")
            if ! grep -q "$expect_substr" <<<"$body"; then
              echo "FAIL: $url did not contain '$expect_substr'"
              echo "---- response head ----"
              head -c 500 <<<"$body"
              exit 1
            fi
            echo "OK"
          }

          # /consent always returns HTML regardless of req param — the page JS
          # handles not-found cases after loading.
          check "/consent?req=smoke-test" "Authorization Request"
          check "/.well-known/jwks.json" "\"keys\""
          check "/.well-known/did.json" "\"id\""

          echo "--- POST $BASE/v1/webauthn/assert/options"
          webauthn_body=$(curl -sS -L --fail-with-body --max-time 20 \
            -H "Content-Type: application/json" \
            -d '{"authRequestId":"areq_missing_rewrite_smoke"}' \
            "$BASE/v1/webauthn/assert/options" || true)
          if ! grep -q '"code":"NOT_FOUND"' <<<"$webauthn_body"; then
            echo "FAIL: /v1/webauthn/assert/options did not return auth-service JSON"
            echo "---- response head ----"
            head -c 500 <<<"$webauthn_body"
            exit 1
          fi
          echo "OK"
