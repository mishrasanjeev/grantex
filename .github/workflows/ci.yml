name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  auth-service:
    name: Auth Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/auth-service
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/auth-service/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test

  sdk-ts:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/sdk-ts/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test

  sdk-py:
    name: Python SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-py
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -e ".[dev]"
      - name: Typecheck
        run: mypy --strict src/grantex
      - name: Test
        run: pytest

  # ─── Node packages that depend on @grantex/sdk ───────────────────────────
  #
  # Pattern: install root deps (provides vitest), build SDK, then test package.

  cli:
    name: CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install root + SDK deps
        run: npm ci && cd packages/sdk-ts && npm ci && npm run build
      - name: Test CLI
        working-directory: packages/cli
        run: npm ci && npm run typecheck && npm test

  node-integrations:
    name: Node Integrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install root + SDK deps
        run: npm ci && cd packages/sdk-ts && npm ci && npm run build
      - name: Test adapters
        working-directory: packages/adapters
        run: npm ci && npm test
      - name: Test gateway
        working-directory: packages/gateway
        run: npm ci && npm test
      - name: Test express
        working-directory: packages/express
        run: npm ci && npm test
      - name: Test langchain
        working-directory: packages/langchain
        run: npm ci && npm test
      - name: Test anthropic
        working-directory: packages/anthropic
        run: npm ci && npm run typecheck && npm test
      - name: Test autogen
        working-directory: packages/autogen
        run: npm ci && npm test
      - name: Test vercel-ai
        working-directory: packages/vercel-ai
        run: npm ci && npm test
      - name: Test a2a
        working-directory: packages/a2a
        run: npm ci && npm test

  mcp-packages:
    name: MCP Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install root + SDK deps
        run: npm ci && cd packages/sdk-ts && npm ci && npm run build
      - name: Test MCP server
        working-directory: packages/mcp
        run: npm ci && npm test
      - name: Test MCP auth
        working-directory: packages/mcp-auth
        run: npm ci && npm test

  compliance-packages:
    name: Compliance & Identity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install root + SDK deps
        run: npm ci && cd packages/sdk-ts && npm ci && npm run build
      - name: Test DPDP
        working-directory: packages/dpdp
        run: npm ci && npm test
      - name: Test MPP
        working-directory: packages/mpp
        run: npm ci && npm run typecheck && npm test

  standalone-packages:
    name: Standalone Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install root deps
        run: npm ci
      - name: Test destinations
        working-directory: packages/destinations
        run: npm ci && npm test
      - name: Test conformance
        working-directory: packages/conformance
        run: npm ci && npm test
      - name: Test gemma
        working-directory: packages/gemma
        run: npm ci && npm test

  # ─── Python integration packages ─────────────────────────────────────────

  python-integrations:
    name: Python Integrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python SDK
        working-directory: packages/sdk-py
        run: pip install -e ".[dev]"
      - name: Test FastAPI middleware
        working-directory: packages/fastapi
        run: pip install -e ".[dev]" && pytest
      - name: Test CrewAI integration
        working-directory: packages/crewai
        run: pip install -e ".[dev]" && pytest
      - name: Test OpenAI Agents
        working-directory: packages/openai-agents
        run: pip install -e ".[dev]" && pytest
      - name: Test Google ADK
        working-directory: packages/google-adk
        run: pip install -e ".[dev]" && pytest
      - name: Test A2A Python
        working-directory: packages/a2a-py
        run: pip install -e ".[dev]" && pytest
      - name: Test Gemma Python
        working-directory: packages/gemma-py
        run: pip install -e ".[dev]" && pytest

  portal:
    name: Developer Portal
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/portal
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/portal/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Build
        run: npm run build
