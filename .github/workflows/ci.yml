name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  docs-integrity:
    name: Documentation Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: node scripts/check-docs-integrity.mjs

  commerce-preview-conformance:
    name: Commerce Preview Conformance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
      - name: Preview conformance gate (local only)
        run: node scripts/commerce-c6oe-preview-conformance-gate.mjs --mode pr

  auth-service:
    name: Auth Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/auth-service
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/auth-service/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test

  sdk-ts:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-ts
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/sdk-ts/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test

  sdk-py:
    name: Python SDK — ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.12']
    defaults:
      run:
        working-directory: packages/sdk-py
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - name: Typecheck
        run: mypy --strict src/grantex
      - name: Test
        run: pytest

  # ─── Node packages that depend on @grantex/sdk ───────────────────────────
  #
  # Pattern: install root deps (provides vitest), build SDK, then test package.

  cli:
    name: CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
      - name: Install root + SDK deps
        run: npm ci && cd packages/sdk-ts && npm ci && npm run build
      - name: Test CLI
        working-directory: packages/cli
        run: npm ci && npm run typecheck && npm test

  node-integrations:
    name: Node Integrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
      - name: Install root + SDK deps
        run: npm ci && cd packages/sdk-ts && npm ci && npm run build
      - name: Test adapters
        working-directory: packages/adapters
        run: npm ci && npm run typecheck && npm test
      - name: Test gateway
        working-directory: packages/gateway
        run: npm ci && npm run typecheck && npm test
      - name: Test express
        working-directory: packages/express
        run: npm ci && npm run typecheck && npm test
      - name: Test langchain
        working-directory: packages/langchain
        run: npm ci && npm run typecheck && npm test
      - name: Test anthropic
        working-directory: packages/anthropic
        run: npm ci && npm run typecheck && npm test
      - name: Test autogen
        working-directory: packages/autogen
        run: npm ci && npm run typecheck && npm test
      - name: Test vercel-ai
        working-directory: packages/vercel-ai
        run: npm ci && npm run typecheck && npm test
      - name: Test a2a
        working-directory: packages/a2a
        run: npm ci && npm run typecheck && npm test
      - name: Test Strands
        working-directory: packages/strands
        run: npm ci && npm run typecheck && npm test

  mcp-packages:
    name: MCP Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
      - name: Install root + SDK deps
        run: npm ci && cd packages/sdk-ts && npm ci && npm run build
      - name: Test MCP server
        working-directory: packages/mcp
        run: npm ci && npm run typecheck && npm test
      - name: Test MCP auth
        working-directory: packages/mcp-auth
        run: npm ci && npm run typecheck && npm test

  compliance-packages:
    name: Compliance & Identity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
      - name: Install root + SDK deps
        run: npm ci && cd packages/sdk-ts && npm ci && npm run build
      - name: Test DPDP
        working-directory: packages/dpdp
        run: npm ci && npm run typecheck && npm test
      - name: Test MPP
        working-directory: packages/mpp
        run: npm ci && npm run typecheck && npm test

  standalone-packages:
    name: Standalone Packages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
      - name: Install root deps
        run: npm ci
      - name: Test destinations
        working-directory: packages/destinations
        run: npm ci && npm run typecheck && npm test
      - name: Test conformance
        working-directory: packages/conformance
        run: npm ci && npm run typecheck && npm test
      - name: Test gemma
        working-directory: packages/gemma
        run: npm ci && npm run typecheck && npm test
      - name: Test x402
        working-directory: packages/x402
        run: npm ci && npm run typecheck && npm test

  # ─── Python integration packages ─────────────────────────────────────────

  python-integrations:
    name: Python Integrations — ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.9', '3.12']
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install Python SDK
        working-directory: packages/sdk-py
        run: pip install -e ".[dev]"
      - name: Test FastAPI middleware
        working-directory: packages/fastapi
        run: pip install -e ".[dev]" && mypy --strict src && pytest
      - name: Test CrewAI integration
        working-directory: packages/crewai
        run: pip install -e ".[dev]" && mypy --strict src && pytest
      - name: Test OpenAI Agents
        working-directory: packages/openai-agents
        run: pip install -e ".[dev]" && mypy --strict src && pytest
      - name: Test Google ADK
        working-directory: packages/google-adk
        run: pip install -e ".[dev]" && mypy --strict src && pytest
      - name: Test A2A Python
        working-directory: packages/a2a-py
        run: pip install -e ".[dev]" && mypy --strict src && pytest
      - name: Test Gemma Python
        working-directory: packages/gemma-py
        run: pip install -e ".[dev]" && mypy --strict src && pytest
      - name: Test Strands Python
        if: matrix.python-version != '3.9'
        working-directory: packages/strands-py
        run: pip install -e ".[dev]" && mypy --strict src && pytest

  portal:
    name: Developer Portal
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/portal
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/portal/package-lock.json
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Test
        run: npm test
      - name: Build
        run: npm run build

  # ─── TypeScript examples ─────────────────────────────────────────────────
  #
  # Install and typecheck each example against the published package shape,
  # but never call `npm start` (which would reach a running Grantex API).
  # This catches stale example dependency pins and integration API drift.
  typescript-examples:
    name: Example (registry) — ${{ matrix.example }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        example: [quickstart-ts, langchain-agent, vercel-ai-chatbot]
    defaults:
      run:
        working-directory: examples/${{ matrix.example }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
      - name: Install (resolves @grantex/sdk against the public registry)
        run: npm install --no-audit --no-fund
      - name: Typecheck (no network calls)
        run: npx tsc --noEmit

  typescript-examples-local:
    name: Examples — checkout package artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
      - name: Prepare package artifacts
        run: mkdir -p "$RUNNER_TEMP/grantex-packs"
      - name: Build and pack checkout SDK
        working-directory: packages/sdk-ts
        run: |
          npm ci
          npm run build
          npm pack --pack-destination "$RUNNER_TEMP/grantex-packs"
      - name: Build and pack checkout LangChain integration
        working-directory: packages/langchain
        run: |
          npm ci
          npm run build
          npm pack --pack-destination "$RUNNER_TEMP/grantex-packs"
      - name: Build and pack checkout Vercel AI integration
        working-directory: packages/vercel-ai
        run: |
          npm ci
          npm run build
          npm pack --pack-destination "$RUNNER_TEMP/grantex-packs"
      - name: Typecheck quickstart against checkout SDK
        working-directory: examples/quickstart-ts
        run: |
          npm install --no-audit --no-fund
          npm install --no-save --no-audit --no-fund "$RUNNER_TEMP"/grantex-packs/grantex-sdk-*.tgz
          npx tsc --noEmit
      - name: Typecheck LangChain example against checkout packages
        working-directory: examples/langchain-agent
        run: |
          npm install --no-audit --no-fund
          npm install --no-save --no-audit --no-fund "$RUNNER_TEMP"/grantex-packs/grantex-sdk-*.tgz "$RUNNER_TEMP"/grantex-packs/grantex-langchain-*.tgz
          npx tsc --noEmit
      - name: Typecheck Vercel AI example against checkout packages
        working-directory: examples/vercel-ai-chatbot
        run: |
          npm install --no-audit --no-fund
          npm install --no-save --no-audit --no-fund "$RUNNER_TEMP"/grantex-packs/grantex-sdk-*.tgz "$RUNNER_TEMP"/grantex-packs/grantex-vercel-ai-*.tgz
          npx tsc --noEmit

  nextjs-example:
    name: Example — nextjs-starter
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: examples/nextjs-starter
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: examples/nextjs-starter/package-lock.json
      - run: npm ci
      - run: npm run build

  go:
    name: Go SDK, Provider & Example
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26.x'
          cache-dependency-path: |
            packages/go-sdk/go.sum
            packages/terraform-provider-grantex/go.sum
            examples/quickstart-go/go.sum
      - name: Test Go SDK
        working-directory: packages/go-sdk
        run: go test ./...
      - name: Build Terraform provider
        working-directory: packages/terraform-provider-grantex
        run: go test ./...
      - name: Build quickstart
        working-directory: examples/quickstart-go
        run: go test ./...
