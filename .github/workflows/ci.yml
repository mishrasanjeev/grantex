name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  auth-service:
    name: Auth Service
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/auth-service
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/auth-service/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  sdk-ts:
    name: TypeScript SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-ts
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: packages/sdk-ts/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  sdk-py:
    name: Python SDK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/sdk-py
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Typecheck
        run: mypy --strict src/grantex

      - name: Test
        run: pytest

  # ─── Packages that depend on @grantex/sdk (need it built first) ───────────

  cli:
    name: CLI
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build SDK
        working-directory: packages/sdk-ts
        run: npm ci && npm run build
      - name: Install and test CLI
        working-directory: packages/cli
        run: npm ci && npm run typecheck && npm test

  adapters:
    name: Adapters
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build SDK
        working-directory: packages/sdk-ts
        run: npm ci && npm run build
      - name: Install and test adapters
        working-directory: packages/adapters
        run: npm ci && npm test

  gateway:
    name: Gateway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build SDK
        working-directory: packages/sdk-ts
        run: npm ci && npm run build
      - name: Install and test gateway
        working-directory: packages/gateway
        run: npm ci && npm test

  express:
    name: Express Middleware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build SDK
        working-directory: packages/sdk-ts
        run: npm ci && npm run build
      - name: Install and test express
        working-directory: packages/express
        run: npm ci && npm test

  langchain:
    name: LangChain Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build SDK
        working-directory: packages/sdk-ts
        run: npm ci && npm run build
      - name: Install and test langchain
        working-directory: packages/langchain
        run: npm ci && npm test

  anthropic:
    name: Anthropic Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build SDK
        working-directory: packages/sdk-ts
        run: npm ci && npm run build
      - name: Install and test anthropic
        working-directory: packages/anthropic
        run: npm ci && npm run typecheck && npm test

  autogen:
    name: AutoGen Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build SDK
        working-directory: packages/sdk-ts
        run: npm ci && npm run build
      - name: Install and test autogen
        working-directory: packages/autogen
        run: npm ci && npm test

  vercel-ai:
    name: Vercel AI Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build SDK
        working-directory: packages/sdk-ts
        run: npm ci && npm run build
      - name: Install and test vercel-ai
        working-directory: packages/vercel-ai
        run: npm ci && npm test

  a2a:
    name: A2A Bridge
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build SDK
        working-directory: packages/sdk-ts
        run: npm ci && npm run build
      - name: Install and test a2a
        working-directory: packages/a2a
        run: npm ci && npm test

  mcp:
    name: MCP Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build SDK
        working-directory: packages/sdk-ts
        run: npm ci && npm run build
      - name: Install and test mcp
        working-directory: packages/mcp
        run: npm ci && npm test

  mcp-auth:
    name: MCP Auth Server
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build SDK
        working-directory: packages/sdk-ts
        run: npm ci && npm run build
      - name: Install and test mcp-auth
        working-directory: packages/mcp-auth
        run: npm ci && npm test

  dpdp:
    name: DPDP Compliance
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build SDK
        working-directory: packages/sdk-ts
        run: npm ci && npm run build
      - name: Install and test dpdp
        working-directory: packages/dpdp
        run: npm ci && npm test

  mpp:
    name: MPP Package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build SDK
        working-directory: packages/sdk-ts
        run: npm ci && npm run build
      - name: Install and test mpp
        working-directory: packages/mpp
        run: npm ci && npm run typecheck && npm test

  # ─── Packages with no SDK dependency ──────────────────────────────────────

  destinations:
    name: Destinations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install and test destinations
        working-directory: packages/destinations
        run: npm ci && npm test

  conformance:
    name: Conformance Suite
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install and test conformance
        working-directory: packages/conformance
        run: npm ci && npm test

  gemma:
    name: Gemma Integration
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install and test gemma
        working-directory: packages/gemma
        run: npm ci && npm test

  # ─── Python integration packages ─────────────────────────────────────────

  python-integrations:
    name: Python Integrations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python SDK
        working-directory: packages/sdk-py
        run: pip install -e ".[dev]"

      - name: Test FastAPI middleware
        working-directory: packages/fastapi
        run: pip install -e ".[dev]" && pytest

      - name: Test CrewAI integration
        working-directory: packages/crewai
        run: pip install -e ".[dev]" && pytest

      - name: Test OpenAI Agents integration
        working-directory: packages/openai-agents
        run: pip install -e ".[dev]" && pytest

      - name: Test Google ADK integration
        working-directory: packages/google-adk
        run: pip install -e ".[dev]" && pytest

      - name: Test A2A Python bridge
        working-directory: packages/a2a-py
        run: pip install -e ".[dev]" && pytest

      - name: Test Gemma Python
        working-directory: packages/gemma-py
        run: pip install -e ".[dev]" && pytest

  portal:
    name: Developer Portal
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/portal
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
