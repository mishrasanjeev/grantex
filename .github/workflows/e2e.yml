name: E2E Integration Tests

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * *' # Every day at midnight UTC

jobs:
  e2e:
    name: E2E Smoke Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            package-lock.json
            packages/sdk-ts/package-lock.json

      - name: Install and build SDK
        run: cd packages/sdk-ts && npm ci && npm run build

      - name: Install root dependencies
        run: npm ci

      - name: Core auth flow
        env:
          E2E_BASE_URL: https://grantex-auth-dd4mtrt2gq-uc.a.run.app
        run: npx vitest run tests/e2e/e2e.test.ts

      - name: Portal features (full API surface)
        env:
          E2E_BASE_URL: https://grantex-auth-dd4mtrt2gq-uc.a.run.app
        run: npx vitest run tests/e2e/portal-features.test.ts

      - name: Scope enforcement
        env:
          E2E_BASE_URL: https://grantex-auth-dd4mtrt2gq-uc.a.run.app
        run: npx vitest run tests/e2e/enforce-integration.test.ts

